function togglePause() {
    if (gameState === 'MENU') return;
    if (gameState === 'PLAYING') { gameState = 'PAUSED'; document.getElementById('pause-screen').style.display = 'flex'; } 
    else { gameState = 'PLAYING'; document.getElementById('pause-screen').style.display = 'none'; requestAnimationFrame(update); }
}

function resize() {
    const targetRatio = 16 / 9;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let nextW = vw;
    let nextH = Math.floor(vw / targetRatio);
    if (nextH > vh) {
        nextH = vh;
        nextW = Math.floor(vh * targetRatio);
    }

    width = canvas.width = nextW;
    height = canvas.height = nextH;
    canvas.style.width = `${nextW}px`;
    canvas.style.height = `${nextH}px`;
    syncWindOverlayRect();
    syncWindVideoRect();

    groundH = height * 0.08; playerH = height * 0.11; 
    player.height = playerH; player.width = playerH * 0.85;
}
window.addEventListener('resize', resize);

const keys = {};
let jumpPressedLast = false;
window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Escape') togglePause(); });
window.addEventListener('keyup', e => keys[e.code] = false);

function tryStartVoidFall(topStair) {
    // 按需求移除“通天梯 -> 下坠 -> 第二关地面”的过渡触发
    return;
}

function update() {
    if (gameState !== 'PLAYING') return;

    if (!skyCurtain.active && player.x >= SCENE2_ARCH_BRIDGE_START_X - 80) {
        skyCurtain.active = true;
        skyCurtain.startX = player.x;
        skyCurtain.startedAt = performance.now();
    }

    if (player.x >= SCENE2_RAMP_START_X) {
        const rampNow = performance.now();
        if (!scene2Ramp.started) {
            scene2Ramp.started = true;
            scene2Ramp.startAt = rampNow;
            scene2Ramp.lastTick = rampNow;
            scene2Ramp.lastX = player.x;
        } else if (!scene2Ramp.flatUnlocked) {
            // 只统计“持续向前爬坡”的时间：中途停下不计时
            const dtMs = Math.max(0, rampNow - (scene2Ramp.lastTick || rampNow));
            const dx = player.x - (scene2Ramp.lastX || player.x);
            const inputForward = !!(keys['ArrowRight'] || keys['KeyD']);
            const climbingForward = dx > 0.015 && (inputForward || player.vx > 0.02);
            if (climbingForward) scene2Ramp.climbAccumMs += dtMs;
            scene2Ramp.lastTick = rampNow;
            scene2Ramp.lastX = player.x;

            if (scene2Ramp.climbAccumMs >= SCENE2_RAMP_RUN_MS) {
                scene2Ramp.flatUnlocked = true;
                scene2Ramp.unlockedAt = rampNow;
                scene2Ramp.flatStartX = player.x; // 20秒到达的当前位置就是平地起点
                // 计算 45 度角的当前 Y 高度
                scene2Ramp.flatY = scene2RampEdgeY(player.x);
            }
        }
    }
    ensureScene2PlatformDecor();
    if (transition.scene2Blend > 0.01 || player.x >= SCENE2_BROKEN_PLATFORM_START_X - 800) {
        ensureBrokenBridgePlatforms();
    }
    if (transition.scene2Blend > 0.01 || player.x >= SCENE2_Z_FLOAT_START_X - 900) {
        ensureZFloatingPlatforms();
    }
    if (player.x >= SCENE2_Z_FLOAT_START_X - 60 && (!lateStageCheckpoint.valid || lateStageCheckpoint.x < SCENE2_Z_FLOAT_START_X - 20)) {
        const zEntry = getZFloatingEntryCheckpoint();
        lateStageCheckpoint.x = zEntry.x;
        lateStageCheckpoint.y = zEntry.y;
        lateStageCheckpoint.valid = true;
    }
    updateZOrganicTrees();

    tryStartWindTransition();
    updateWindTransition();
    updateAmbientWindBurst(performance.now());

    updateLandingFxDust();

    const topStair = skyStairs.find(s => s.isTop);
    const inVoidFall = voidFall.phase === 'falling';
    if (topStair && !windTransition.touchedStairTop) {
        const nearTop = Math.abs(player.x - topStair.x) < topStair.w * 0.55;
        const footY = player.y + player.height;
        if (nearTop && Math.abs(footY - topStair.y) < 46) windTransition.touchedStairTop = true;
    }
    if (!windTransition.armedAfterDrop) {
        const footY = player.y + player.height;
        const droppedFromTop = topStair && windTransition.touchedStairTop && player.grounded && footY > topStair.y + 140;
        const fallbackProgress = player.x > terrainParams.stairX + 920 && player.grounded;
        if (droppedFromTop || fallbackProgress) windTransition.armedAfterDrop = true;
    }

    let moving = false;
    const jumpDown = !!(keys['Space'] || keys['ArrowUp'] || keys['KeyW']);
    const jumpPressed = jumpDown && !jumpPressedLast;
    jumpPressedLast = jumpDown;
    const ambientSlowMul = ambientWindBurst.active ? 0.52 : 1;
    if (!player.inputLocked && !inVoidFall) {
        if (keys['ArrowRight'] || keys['KeyD']) { player.vx += player.accel * ambientSlowMul; player.facing = 1; moving = true; }
        if (keys['ArrowLeft'] || keys['KeyA']) { player.vx -= player.accel * ambientSlowMul; player.facing = -1; moving = true; }
        if (jumpPressed && player.jumpCount < player.maxJumps) {
            player.vy = player.jumpForce;
            player.grounded = false;
            player.jumpCount++;
        }
    }

    if (inVoidFall) {
        const elapsed = performance.now() - voidFall.startTime;
        const dt = 1 / 60;
        const footY = player.y + player.height;
        const realG = shapeCastGroundAtFeet(player.x, player.y, footY, player.width * 0.32);
        const rise = voidFall.risePad * Math.max(0, 1 - elapsed / VOID_FALL_MS);
        const effectiveG = realG + rise;

        camera.targetZoom = 1;
        camera.zoom = 1;
        camera.targetY = camera.y;

        if (voidFall.fallState === 'freeFall') {
            player.vx *= 0.93;
            player.x += player.vx;
            player.vy = Math.min(player.vy + VOID_GRAVITY, VOID_TERM_VELOCITY);
            player.y += player.vy;
            player.grounded = false;

            if (footY >= effectiveG - 1.5 && player.vy >= -0.5) {
                player.y = effectiveG - player.height;
                player.vy = 0;
                voidFall.fallState = 'hardLanding';
                voidFall.hardLandAt = performance.now();
                triggerVoidLandingEvent(player.x + player.width * 0.5, effectiveG);
            }
            if (elapsed >= VOID_FALL_MS - 40 && voidFall.fallState === 'freeFall') {
                player.y = realG - player.height;
                player.vy = 0;
                voidFall.fallState = 'hardLanding';
                voidFall.hardLandAt = performance.now();
                triggerVoidLandingEvent(player.x + player.width * 0.5, realG);
            }

            if (elapsed >= VOID_BG1_START_MS) transition.scene2Blend = 1;
            updateVoidLineMeteors(player.vy);
            updateVoidCapeChain();

            const camT = Math.min(1, elapsed / 620);
            const camEase = camT * camT * (3 - 2 * camT);
            const targetCamX = voidFall.camStartX + (player.x + player.width * 0.5 - width * 0.5 - voidFall.camStartX) * camEase;
            const targetCamYBase = voidFall.camStartY + (player.y + player.height * 0.5 - height * 0.5 - voidFall.camStartY) * camEase;
            const lookaheadY = Math.min(72, Math.max(0, player.vy * VOID_CAM_LOOKAHEAD_Y));
            const targetCamY = targetCamYBase + lookaheadY;
            const dampY = smoothDampScalarY(camera.y, targetCamY, voidFall.camVelY, VOID_CAM_SMOOTH_TIME, dt);
            camera.y = dampY.pos;
            voidFall.camVelY = dampY.vel;
            camera.x = targetCamX;
        } else if (voidFall.fallState === 'hardLanding') {
            player.vx *= 0.9;
            player.grounded = true;
            updateVoidLineMeteors(5);
            updateVoidCapeChain();
            const targetCamX = player.x + player.width * 0.5 - width * 0.5;
            const targetCamY = player.y + player.height * 0.5 - height * 0.5;
            const dampY = smoothDampScalarY(camera.y, targetCamY, voidFall.camVelY, VOID_CAM_LAND_SMOOTH_TIME, dt);
            camera.y = dampY.pos;
            voidFall.camVelY = dampY.vel;
            camera.x = targetCamX;
            if (performance.now() - voidFall.hardLandAt >= HARD_LANDING_MS) {
                voidFall.fallState = 'recoverStand';
                voidFall.recoverAt = performance.now();
            }
        } else if (voidFall.fallState === 'recoverStand') {
            player.vx *= 0.92;
            player.grounded = true;
            updateVoidLineMeteors(4);
            updateVoidCapeChain();
            const targetCamX = player.x + player.width * 0.5 - width * 0.5;
            const targetCamY = player.y + player.height * 0.5 - height * 0.5;
            const dampY = smoothDampScalarY(camera.y, targetCamY, voidFall.camVelY, VOID_CAM_LAND_SMOOTH_TIME, dt);
            camera.y = dampY.pos;
            voidFall.camVelY = dampY.vel;
            camera.x = targetCamX;
            if (performance.now() - voidFall.recoverAt >= RECOVER_STAND_MS) {
                voidFall.phase = 'eyeFollow';
                voidFall.fallState = 'idle';
                transition.scene2Blend = 1;
                player.y = shapeCastGroundAtFeet(player.x, player.y, player.y + player.height, player.width * 0.32) - player.height;
                player.vy = 0;
                player.vx *= 0.42;
                player.grounded = true;
                player.inputLocked = false;
                voidFall.prevPlayerX = player.x;
                voidFall.eyeFollowDist = 0;
                voidFall.camVelY = 0;
            }
        }
    } else {
        player.vx *= friction; player.vy += gravity; player.x += player.vx; player.y += player.vy;
        tryStartVoidFall(topStair);
        if (voidFall.phase !== 'falling') {
            // 断桥/悬浮平台区域使用脚底多点采样，避免在平台边缘单点判定坠落
            const inLateSceneDanger = player.x >= SCENE2_BROKEN_PLATFORM_START_X - 120;
            const currentGround = inLateSceneDanger
                ? shapeCastGroundAtFeet(
                    player.x + player.vx * 0.1,
                    player.y,
                    player.y + player.height,
                    player.width * 0.36
                )
                : getGroundHeight(player.x, player.y);
            if (player.y + player.height > currentGround) {
                player.y = currentGround - player.height;
                player.vy = 0; player.grounded = true;
            } else {
                player.grounded = false;
            }
        }
    }

    if (player.grounded) {
        player.jumpCount = 0;
        // 后段关卡记录最近安全站立点：踩空后可立即回退
        if (player.x >= SCENE2_BROKEN_PLATFORM_START_X - 120) {
            lateStageCheckpoint.x = player.x;
            lateStageCheckpoint.y = player.y;
            lateStageCheckpoint.valid = true;
        }
    }

    // 新逻辑：后段踩空后不持续下坠，直接回退到上一个安全坐标
    const inLateStage = player.x >= SCENE2_BROKEN_PLATFORM_START_X + 220;
    const inZFloatStage = player.x >= SCENE2_Z_FLOAT_START_X - 80;
    if (!inVoidFall && inLateStage && lateStageCheckpoint.valid && !player.grounded && player.vy > 0) {
        // 只有当人物真正掉到屏幕底部以下，且处于垂直下落状态时才回溯
        const isBelowScreen = player.y > height + 100;
        const isWayBelowPlatform = player.y > (lateStageCheckpoint.y + 600); // 增加容错高度到600
        if (isBelowScreen || isWayBelowPlatform) {
            for (let i = 0; i < 16; i++) {
                ringParticles.push({
                    x: player.x + player.width * 0.5 + (Math.random() - 0.5) * 26,
                    y: player.y + player.height * 0.52 + (Math.random() - 0.5) * 18,
                    vx: (Math.random() - 0.5) * 1.6,
                    vy: -0.9 - Math.random() * 1.5,
                    alpha: 0.7,
                    size: 1.5 + Math.random() * 2.1
                });
            }
            player.x = lateStageCheckpoint.x;
            player.y = lateStageCheckpoint.y;
            player.vx = 0;
            player.vy = 0;
            player.grounded = true;
            player.inputLocked = false;
            player.state = 'idle';
            if (inZFloatStage) {
                const zCamY = -(player.y - height * 0.65);
                camera.targetY = zCamY;
                camera.y = zCamY;
            } else {
                alignCameraInstant();
            }
        }
    }
    if (windTransition.phase !== 'idle' && !windTransition.done && !inVoidFall) {
        player.vx *= 0.72;
        player.facing = 1;
    }
    if (ambientWindBurst.active && !inVoidFall) {
        player.vx *= 0.92;
    }

    const transWindN = Math.max(0, Math.min(1, windTransition.intensity / 100));
    const burstWindN = Math.max(0, Math.min(1, ambientWindBurst.intensity / 100));
    const windN = Math.max(transWindN, burstWindN);
    const windActive = (windTransition.phase !== 'idle' && !windTransition.done) || ambientWindBurst.active;
    const gust = windActive ? 0.72 + 0.28 * Math.sin(performance.now() * 0.0018 + camera.x * 0.00015) : 1;
    const windDir = -1;

    // ✨ 收集粒子跟随逻辑（虚空下坠时由流星逻辑单独更新）
    const isPlayerStopped = !inVoidFall && Math.abs(player.vx) < 0.12 && player.grounded && !moving;
    const hasFourBodies = player.followingParticles.length >= 4;
    const waistAnchorY = player.y + player.height * 0.58;
    if (!inVoidFall) player.followingParticles.forEach((p, i) => {
        if (typeof p.seed !== "number") p.seed = Math.random() * Math.PI * 2;
        const t = Date.now() * 0.0042 + p.seed;
        const inStairJumpLift = !player.grounded && player.x > terrainParams.stairX - 900 && player.x < terrainParams.stairX + 1700;
        let targetX = player.x - 34 * player.facing;
        let targetY = waistAnchorY;
        let lerpX = 0.14;
        let lerpY = 0.14;

        if (hasFourBodies || isPlayerStopped) {
            // 静止时切到“三体”式互扰环绕：不同角速度+耦合项，形成非规则轨道。
            const nodeCount = Math.max(3, player.followingParticles.length);
            const phase = (Math.PI * 2 * i) / nodeCount;
            const baseR = hasFourBodies ? 28 : 22;
            const radius = baseR + (hasFourBodies ? 10 : 4) * Math.sin(t * 0.45 + phase * 1.6);
            const omega = (hasFourBodies ? 1.05 : 0.6) + i * (hasFourBodies ? 0.24 : 0.17);
            const coupledX = (hasFourBodies ? 14 : 9) * Math.sin(t * (0.53 + i * 0.08) + phase * 2.2);
            const coupledY = (hasFourBodies ? 12 : 8) * Math.cos(t * (0.61 + i * 0.05) - phase * 1.4);
            const spiralX = Math.cos(t * (hasFourBodies ? 2.4 : 1.9) + phase * 1.3) * ((hasFourBodies ? 7 : 4) + i * 1.5);
            const spiralY = Math.sin(t * (hasFourBodies ? 2.8 : 2.2) - phase) * ((hasFourBodies ? 6 : 3) + i * 1.1);
            targetX = player.x + player.width * 0.5;
            targetY = waistAnchorY;
            targetX += Math.cos(t * omega + phase) * radius + coupledX;
            targetY += Math.sin(t * (omega * 1.18) + phase * 0.7) * (8 + i * 2) + coupledY + spiralY;
            targetX += spiralX;
            lerpX = hasFourBodies ? 0.13 : 0.1;
            lerpY = hasFourBodies ? 0.13 : 0.1;
        } else {
            const nearRadius = inStairJumpLift ? (18 + i * 4) : (24 + i * 6);
            const orbitX = Math.cos(t * (0.8 + i * 0.08)) * nearRadius;
            const orbitY = Math.sin(t * (1.1 + i * 0.06)) * (inStairJumpLift ? 22 : 15);
            const randomJitterX = Math.sin(t * 1.7 + i) * 7;
            const randomJitterY = Math.cos(t * 1.3 - i * 0.6) * 5;
            targetX += orbitX + randomJitterX;
            targetY += orbitY + randomJitterY;
            if (inStairJumpLift) targetY -= 34 + i * 8;
            lerpX = inStairJumpLift ? 0.2 : 0.14;
            lerpY = inStairJumpLift ? 0.22 : 0.14;
        }

        p.x += (targetX - p.x) * lerpX;
        p.y += (targetY - p.y) * lerpY;
        if (windN > 0.01) {
            const gustPush = (22 + i * 2.2) * windN * gust;
            p.x += gustPush * windDir;
            p.y += Math.sin(Date.now() * 0.0065 + i * 0.9 + camera.x * 0.0002) * (1.35 + 0.9 * windN) * gust;
        }
        // 拖尾更新
        p.trail.unshift({x: p.x, y: p.y});
        if(p.trail.length > 24) p.trail.pop();
    });

    player.frameTimer = (player.frameTimer || 0) + 0.18;
    if (!player.grounded) player.state = 'jump';
    else if (moving || Math.abs(player.vx) > 0.5) player.state = 'run';
    else player.state = 'idle';
    if (inVoidFall && voidFall.fallState === 'freeFall') player.state = 'idle';
    const anim = images[player.state];
    if (anim && anim.length > 0) player.frame = Math.floor(player.frameTimer) % anim.length;

    if (!inVoidFall) {
        const targetCamX = player.x - width * 0.5;
        const inStairArea = player.x > terrainParams.stairX - 800;
        const inRampZone = player.x >= SCENE2_RAMP_START_X && player.x < SCENE2_Z_FLOAT_START_X;
        const inBrokenBridgeZone = player.x >= SCENE2_BROKEN_PLATFORM_START_X && player.x < SCENE2_BROKEN_PLATFORM_END_X;
        const inZFloatZone = false;
        const stairOffset = (inStairArea && player.y < height * 0.6) ? (height * 0.6 - player.y) : 0;
        const rampOffset = (inRampZone && player.y < height * 0.62) ? (height * 0.62 - player.y) : 0;
        const pts2 = getTerrainPoints(); const pts4 = getTerrain4Points();
        const inB1 = player.x > pts2.start - 100 && player.x < pts2.end + 600;
        const inB3 = player.x > terrainParams.bX3 - 100 && player.x < terrainParams.bX3 + terrainParams.w3 + 400;
        const inB4 = player.x > pts4.start - 100 && player.x < pts4.end + 600;

        // 纯坐标分水岭：斜坡模式与悬浮模式并存切换
        const baseTargetY = -Math.max(rampOffset, stairOffset);
        if (inZFloatZone) {
            camera.targetZoom = 1.0;
            const zFloatTargetY = -(player.y - height * 0.65);
            const deckY = getScene2ArchBridgeDeckY();
            const onZTransitionDeck = (player.x <= SCENE2_Z_FLOAT_START_X + 160) && player.grounded && ((player.y + player.height) >= deckY - 10);
            // 50000 过渡锁：仍在桥面过渡段时，不要让镜头突然下移
            camera.targetY = onZTransitionDeck ? Math.min(baseTargetY, zFloatTargetY) : zFloatTargetY;
        } else if (inRampZone) {
            camera.targetZoom = 1.0;
            const onRampTopPlatform = scene2Ramp.flatUnlocked && player.x >= scene2Ramp.flatStartX;
            if (onRampTopPlatform || inBrokenBridgeZone) {
                // 登上三角斜坡平台后镜头固定，不再随人物跳跃改变高度
                const fixedDeckY = inBrokenBridgeZone ? getScene2ArchBridgeDeckY() : scene2Ramp.flatY;
                const platformOffset = (fixedDeckY < height * 0.62) ? (height * 0.62 - fixedDeckY) : 0;
                // 固定模式下不能再叠加 stairOffset（它依赖 player.y，会导致跳跃时镜头抖动）
                camera.targetY = -platformOffset;
            } else {
                camera.targetY = baseTargetY;
            }
        } else {
            camera.targetZoom = (inB1 || inB3 || inB4) ? 0.42 : 1.0;
            camera.targetY = baseTargetY;
        }
        const isZoomedOut = camera.targetZoom < 1.0;
        const camXDeadzone = inZFloatZone ? 0 : (isZoomedOut ? 22 : 0);
        const dx = targetCamX - camera.x;
        if (Math.abs(dx) > camXDeadzone) {
            camera.x += (dx - Math.sign(dx) * camXDeadzone) * (inZFloatZone ? 0.12 : (isZoomedOut ? 0.038 : 0.08));
        }
        camera.zoom += (camera.targetZoom - camera.zoom) * (isZoomedOut ? 0.008 : 0.012);
        // 统一垂直平滑，避免被分支条件打断
        camera.y += (camera.targetY - camera.y) * 0.1;
    }

    // 50000 后坠落安全网：回到悬浮区起始平台中心，避免人物消失
    if (!inVoidFall && player.x >= SCENE2_Z_FLOAT_START_X && player.y > height + 200) {
        ensureZFloatingPlatforms();
        const back = getZFloatingEntryCheckpoint();
        player.x = back.x;
        player.y = back.y;
        player.vx = 0;
        player.vy = 0;
        player.grounded = true;
        player.inputLocked = false;
        player.state = 'idle';
        camera.targetY = -(player.y - height * 0.65);
        camera.y = camera.targetY;
    }

    // 诗篇逻辑
    if (!specialOrb.triggered && Math.abs(player.x - 6200) < 80 && player.grounded) {
        specialOrb.triggered = true; poemData.show = true; poemData.state = 'fadein'; poemData.isFirst = true;
        poemData.lines = ["立于高地，", "视线穿越尘世与心灵。", "曾被遮蔽的方向，", "在静默中显现。"];
        player.inputLocked = true; player.vx = 0;
        for (let i = 0; i < 3000; i++) { const a = (i/3000)*Math.PI*2, s=15+Math.random()*20; ringParticles.push({x:6200, y:height-groundH-height*0.55-50, vx:Math.cos(a)*s, vy:Math.sin(a)*s, alpha:1, size:1.2}); }
        giantBird.active = true; giantBird.x = width + 600; giantBird.y = height * 0.22;
    }
    if (!specialOrb2.triggered && Math.abs(player.x - specialOrb2.x) < 50 && Math.abs(player.y - (specialOrb2.y - player.height)) < 40) {
        specialOrb2.triggered = true; poemData.show = true; poemData.state = 'fadein'; poemData.isFirst = false;
        poemData.lines = ["阴影在穹顶溺亡时", "会折叠成新的对称", "石料们以克重", "计算千年后", "崩塌的环境"];
        player.inputLocked = true; player.vx = 0;
        for(let i=0; i<4; i++) expansionRings.push({ r: 0, dr: 10 + i*8, alpha: 1 });
    }
    if (!debrisOrb.triggered) {
        debrisOrb.pulse += 0.06;
        const dxDebris = player.x - debrisOrb.x;
        const dyDebris = (player.y + player.height * 0.5) - debrisOrb.y;
        if (Math.abs(dxDebris) < 65 && Math.abs(dyDebris) < 60 && !player.grounded) {
            debrisOrb.triggered = true;
            debrisOrb.finalized = true;
            for (let i = 0; i < 6; i++) {
                holyRings.push({
                    r: 20 + i * 24,
                    dr: 7 + i * 1.8,
                    alpha: 0.9 - i * 0.1,
                    lineW: 4 - i * 0.4
                });
            }
            if (player.followingParticles.length < 2) {
                player.followingParticles = [];
                ensureFollowingParticle(debrisOrb.x, debrisOrb.y);
                ensureFollowingParticle(6200, height-groundH-height*0.55-50);
            }
        }
    }
    const platformOrbPos = getPlatformTopOrbWorldPos();
    platformTopOrb.x = platformOrbPos.x;
    platformTopOrb.y = platformOrbPos.y;
    if (!platformTopOrb.triggered && scene2Ramp.flatUnlocked) {
        platformTopOrb.pulse += 0.06;
        const dxSummit = player.x - platformTopOrb.x;
        const dySummit = (player.y + player.height * 0.5) - platformTopOrb.y;
        if (Math.abs(dxSummit) < 70 && Math.abs(dySummit) < 70) {
            platformTopOrb.triggered = true;
            platformTopOrb.finalized = true;
            for (let i = 0; i < 5; i++) {
                expansionRings.push({
                    x: platformTopOrb.x,
                    y: platformTopOrb.y,
                    r: 20 + i * 22,
                    // 中心圈更慢，外圈更快，形成参考图那种层次扩散
                    dr: 0.7 + i * 0.62,
                    alpha: 0.74 - i * 0.09,
                    lineW: 2.4 - i * 0.24,
                    glowMul: 1 + i * 0.12
                });
            }
            ensureFollowingParticle(platformTopOrb.x, platformTopOrb.y);
            while (player.followingParticles.length < 4) {
                player.followingParticles.push({
                    x: player.x + player.width * 0.5 + (Math.random() - 0.5) * 18,
                    y: player.y + player.height * 0.55 + (Math.random() - 0.5) * 16,
                    trail: [],
                    seed: Math.random() * Math.PI * 2
                });
            }
            player.collectedCount = Math.max(player.collectedCount, 4);
        }
    }

    if (poemData.show) {
        if (poemData.state === 'fadein') { poemData.alpha += 0.005; if(poemData.alpha >= 1) poemData.state = 'stay'; poemData.timer = 300; }
        else if (poemData.state === 'stay') { poemData.timer--; if(poemData.timer <= 0) poemData.state = 'fadeout'; }
        else if (poemData.state === 'fadeout') { 
            poemData.alpha -= 0.01; 
            if(poemData.alpha <= 0) { 
                poemData.alpha = 0; poemData.state = 'end'; player.inputLocked = false; 
                // ✨ 文字消失后，粒子来到身后
                if(poemData.isFirst && !specialOrb.finalized) {
                    player.followingParticles.push({x: 6200, y: height-groundH-height*0.55-50, trail: [], seed: Math.random() * Math.PI * 2});
                    specialOrb.finalized = true;
                } else if(!poemData.isFirst && !specialOrb2.finalized) {
                    if (player.followingParticles.length < 2 && debrisOrb.finalized) {
                        ensureFollowingParticle(debrisOrb.x, debrisOrb.y);
                        ensureFollowingParticle(6200, height-groundH-height*0.55-50);
                    }
                    player.followingParticles.push({x: specialOrb2.x, y: specialOrb2.y, trail: [], seed: Math.random() * Math.PI * 2});
                    specialOrb2.finalized = true;
                }
            } 
        }
    }

    if (giantBird.active) { giantBird.x -= 2.8; giantBird.flap += 0.04; giantBird.alpha = Math.min(0.65, giantBird.alpha + 0.005); if (giantBird.x < -1500) giantBird.active = false; }
    ringParticles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vx *= 0.985; p.vy *= 0.985; p.alpha -= 0.008; if (p.alpha <= 0) ringParticles.splice(i, 1); });
    expansionRings.forEach((r, i) => { r.r += r.dr; r.alpha -= 0.006; if(r.alpha <= 0) expansionRings.splice(i, 1); });
    holyRings.forEach((r, i) => { r.r += r.dr; r.alpha -= 0.012; if (r.alpha <= 0) holyRings.splice(i, 1); });
    ambientStorm.forEach(p => {
        p.x += p.vx + (10 + 16 * windN) * gust * windDir;
        p.y += p.vy - 0.35 * windN * gust;
        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y > height) p.y = 0;
        if (p.y < 0) p.y = height;
    });
    const birdZones = [
        { name: "triangle", start: getTerrainPoints().start - 280, end: getTerrainPoints().end + 260 },
        { name: "building", start: terrainParams.bX5 - 450, end: terrainParams.bX5 + 1200 },
        { name: "stairs", start: terrainParams.stairX - 720, end: terrainParams.stairX + 1600 }
    ];
    const activeZone = birdZones.find(z => player.x >= z.start && player.x <= z.end);
    birdsSwarm.forEach((b, i) => {
        if (windN > 0.12 && !b.active && i % 3 === 0 && Math.random() < 0.09 + windN * 0.08) {
            b.active = true;
            b.dir = -1;
            b.x = camera.x + width + 80 + Math.random() * 180;
            b.y = height * (0.08 + Math.random() * 0.3);
            b.speed = 3 + Math.random() * 3;
        }
        if (activeZone && !b.active && i % 5 === 0 && Math.random() < 0.06) {
            b.active = true;
            b.zone = activeZone.name;
            b.dir = -1;
            b.x = camera.x + width + 120;
            b.y = height * (0.12 + Math.random() * 0.25);
            b.speed = 4 + Math.random() * 3;
        }
        if (!b.active) return;
        b.x += b.speed * b.dir + (14 + 26 * windN) * gust * windDir;
        b.offset += 0.22 + 0.32 * windN;
        b.y += Math.sin(b.offset * 0.82 + i * 0.7 + gust * 0.4) * (0.85 + 3.4 * windN) * gust;
        if (b.x < camera.x - 240 || b.x > camera.x + width + 240) b.active = false;
    });
    whiteBirds.forEach(wb => {
        wb.x += (-wb.speed + (8 + 22 * windN) * gust * windDir);
        wb.flap += 0.13 + 0.24 * windN * gust;
        wb.y += Math.sin(wb.flap * 0.88 + gust) * (0.18 + windN * 2.4) * gust;
        if (wb.x < camera.x - 220) {
            wb.x = camera.x + width + 220 + Math.random() * 320;
            wb.y = height * (0.08 + Math.random() * 0.34);
        }
        if (wb.x > camera.x + width + 260) {
            wb.x = camera.x - 220 - Math.random() * 180;
            wb.y = height * (0.08 + Math.random() * 0.34);
        }
    });
    watercolorBlobs.forEach(w => {
        w.x += w.vx;
        w.y += w.vy + Math.sin(Date.now() * 0.00025 + w.phase) * 0.01;
        if (w.x < -w.rx) w.x = width + w.rx;
        if (w.x > width + w.rx) w.x = -w.rx;
        if (w.y < -w.ry) w.y = height * 0.75 + w.ry * 0.2;
        if (w.y > height * 0.8 + w.ry) w.y = -w.ry * 0.3;
    });
    const shardsReadyToReveal = transition.scene2Blend >= SCENE2_SHARDS_SHOW_BLEND && windTransition.done;
    const nowMs = performance.now();
    floatingShards.forEach(s => {
        s.bob += 0.01 + s.bobAmp * 0.00006 + windN * 0.028 * gust;
        s.windOffset = (s.windOffset || 0) * (0.84 - windN * 0.26) + (16 + s.bobAmp * 0.95) * windN * gust * windDir;
        if (shardsReadyToReveal) {
            if (!s.revealStartAt) s.revealStartAt = nowMs + (s.revealDelayMs || 0);
            const p = Math.max(0, Math.min(1, (nowMs - s.revealStartAt) / Math.max(120, s.revealDurationMs || 1000)));
            s.revealProgress = Math.max(s.revealProgress || 0, p);
        } else {
            s.revealProgress = 0;
            s.revealStartAt = 0;
        }
    });
    // 已按需求移除人物投影和投影周围粒子
    rampTopShadowParticles = [];
    vegetation.forEach(v => { if (Math.abs(player.x - v.x) < 850) v.growth = Math.min(1, v.growth + 0.04); });
    skyStairs.forEach(s => { if(s.plant && Math.abs(player.x - s.x) < 300) s.plant.growth = Math.min(1, s.plant.growth + 0.05); });

    if (voidFall.phase === 'eyeFollow') {
        voidFall.eyeFollowDist += Math.abs(player.x - voidFall.prevPlayerX);
        voidFall.prevPlayerX = player.x;
        if (voidFall.eyeFollowDist >= VOID_EYE_FOLLOW_DIST) {
            voidFall.phase = 'eyeClose';
            voidFall.eyeCloseStart = performance.now();
        }
    } else if (voidFall.phase === 'eyeClose') {
        if (performance.now() - voidFall.eyeCloseStart >= VOID_EYE_CLOSE_MS) voidFall.phase = 'done';
    }

    draw();
    updateWindOverlayLifecycle();
    requestAnimationFrame(update);
}

function drawWeapon(w) {
    const rx = w.x - camera.x; if(rx < -300 || rx > width + 300) return;
    const ry = getGroundHeight(w.x, 9999);
    ctx.save();
    ctx.translate(rx, ry);
    ctx.rotate(w.rotation);
    ctx.scale(w.scale * 3, w.scale * 3);
    const t = transition.scene2Blend;
    const weaponColor = t > 0 ? lerpColor("111111", "ffffff", t) : "#111";
    ctx.fillStyle = weaponColor;

    if (w.type === 'sword') {
        // 剑身
        ctx.fillRect(-2, -60, 4, 60);
        // 护手
        ctx.fillRect(-8, -15, 16, 3);
        // 剑首
        ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
    } else {
        // 戟杆
        ctx.fillRect(-1.5, -90, 3, 90);
        // 戟头
        ctx.beginPath(); ctx.moveTo(0, -90); ctx.lineTo(-10, -75); ctx.lineTo(0, -65); ctx.lineTo(10, -75); ctx.closePath(); ctx.fill();
        // 侧刃 (圆弧几何)
        ctx.beginPath(); ctx.arc(-5, -78, 8, Math.PI*0.5, Math.PI*1.5); ctx.fill();
    }
    ctx.restore();
}

function drawSkyStair(stair) {
    const rx = stair.x - camera.x; if(rx < -500 || rx > width + 500) return;
    ctx.save(); ctx.translate(rx, stair.y);
    const t = transition.scene2Blend;
    const stairDark = t > 0 ? lerpColor("000000", "ffffff", t) : "#000";
    const stairMid = t > 0 ? lerpColor("1a1a1a", "f2f2f2", t) : "#1a1a1a";
    const stairLow = t > 0 ? lerpColor("0c0c0c", "e8e8e8", t) : "#0c0c0c";
    ctx.fillStyle = stairDark; ctx.beginPath(); ctx.rect(-stair.w / 2, 0, stair.w, stair.h); ctx.fill();
    ctx.fillStyle = stairMid; ctx.beginPath(); ctx.rect(-stair.w/2 + 8, 4, stair.w - 16, stair.h/2); ctx.fill();
    ctx.fillStyle = stairLow; ctx.beginPath(); ctx.moveTo(stair.w/2, stair.h); ctx.lineTo(stair.w/2+15, stair.h+15); ctx.lineTo(-stair.w/2+15, stair.h+15); ctx.lineTo(-stair.w/2, stair.h); ctx.fill();
    if (stair.plant && stair.plant.growth > 0) {
        ctx.save(); ctx.scale(1, stair.plant.growth); ctx.fillStyle = stairDark;
        const th = stair.plant.thickness, ph = stair.plant.h;
        ctx.beginPath(); ctx.moveTo(-th/2, 0); ctx.bezierCurveTo(-th*2, -ph*0.3, th*2, -ph*0.6, 0, -ph); ctx.bezierCurveTo(th, -ph*0.6, -th, -ph*0.3, th/2, 0); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, -ph); ctx.lineTo(0, -ph - stair.plant.antennaH); ctx.lineWidth = 0.8; ctx.strokeStyle = stairDark; ctx.stroke();
        ctx.restore();
    }
    ctx.restore();
}

function drawRomanColumn(col) {
    if (col.x >= SCENE2_RAMP_START_X) return;
    const rx = col.x - camera.x; if(rx < -500 || rx > width + 500) return;
    ctx.save(); ctx.translate(rx, getGroundHeight(col.x, 9999));
    ctx.fillStyle = transition.scene2Blend > 0.001 ? "#ffffff" : "#e5e5e5";
    const outlineAlpha = transition.scene2Blend > 0.001 ? 0.08 : 0.85;
    ctx.strokeStyle = `rgba(0,0,0,${outlineAlpha})`;
    ctx.lineWidth = 0.8;
    col.blocks.forEach(block => {
        ctx.beginPath();
        ctx.rect(-block.w / 2, block.y, block.w, block.h);
        ctx.fill();
        ctx.stroke();
    });
    ctx.restore();
}

function drawScene2SkyColumn() {
    if (transition.scene2Blend < 0.01) return;
    const x = SCENE2_SKY_COLUMN_X - camera.x;
    if (x < -240 || x > width + 240) return;

    const gY = getGroundHeight(SCENE2_SKY_COLUMN_X, 9999);
    const h = height * SCENE2_SKY_COLUMN_HEIGHT_RATIO;
    const bodyW = Math.max(28, width * 0.02);
    const capH = Math.max(24, height * 0.035);
    const baseH = Math.max(26, height * 0.04);

    ctx.save();
    ctx.translate(x, gY);
    const drawBlock = (x0, y0, w0, h0, shade, stroke = "rgba(132,94,104,0.42)") => {
        ctx.fillStyle = shade;
        ctx.fillRect(x0, y0, w0, h0);
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1;
        ctx.strokeRect(x0, y0, w0, h0);
    };
    const chipTopRight = (x0, y0, w0, h0, size) => {
        ctx.save();
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.moveTo(x0 + w0 - size, y0);
        ctx.lineTo(x0 + w0, y0);
        ctx.lineTo(x0 + w0, y0 + size);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    };
    const chipBottomLeft = (x0, y0, w0, h0, size) => {
        ctx.save();
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.moveTo(x0, y0 + h0 - size);
        ctx.lineTo(x0, y0 + h0);
        ctx.lineTo(x0 + size, y0 + h0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    };

    // 先画细长中轴，避免中段视觉断开
    drawBlock(-bodyW * 0.22, -h - capH, bodyW * 0.44, h + capH, "rgba(246,239,241,0.98)", "rgba(146,110,118,0.28)");

    // 由更小方块/矩形堆叠出更精细层数
    const layers = 22;
    let y = -h;
    for (let i = 0; i < layers; i++) {
        const hh = h * (0.026 + (i % 3) * 0.005);
        const widthScale = 0.66 + (i % 6) * 0.06;
        const ww = bodyW * widthScale;
        const xx = -ww * 0.5 + ((i % 2 === 0) ? -bodyW * 0.03 : bodyW * 0.03);
        const shade = (i % 2 === 0) ? "rgba(249,244,245,0.98)" : "rgba(242,234,237,0.97)";
        drawBlock(xx, y, ww, hh, shade);

        // 隔层叠加正方形块，提升“几何拼贴”密度
        if (i % 3 === 1) {
            const sq = Math.max(8, ww * 0.22);
            drawBlock(-sq * 0.5, y + hh * 0.14, sq, sq, "rgba(252,248,248,0.98)");
        }

        // 轻量边缘破损（三角镂空），避免打穿中轴
        const chip = Math.max(4, ww * 0.12);
        if (i % 4 === 0) chipTopRight(xx, y, ww, hh, chip);
        if (i % 5 === 2) chipBottomLeft(xx, y, ww, hh, chip * 0.88);
        y += hh;
    }

    // 顶部与底座压盖
    drawBlock(-bodyW * 0.95, -h - capH, bodyW * 1.9, capH, "rgba(250,246,246,0.99)");
    drawBlock(-bodyW * 0.88, -baseH, bodyW * 1.76, baseH, "rgba(247,240,241,0.99)");

    // 顶部锯齿三角：颜色取背景色，形成镂空错觉
    const bgColor = transition.scene2Blend > 0.01 ? "rgb(242,171,178)" : "rgb(238,234,230)";
    ctx.fillStyle = bgColor;
    const triY = -h - capH;
    const triW = bodyW * 0.22;
    const triH = capH * 0.42;
    for (let i = -3; i <= 3; i++) {
        const cx = i * triW * 0.85;
        ctx.beginPath();
        ctx.moveTo(cx - triW * 0.5, triY);
        ctx.lineTo(cx, triY + triH);
        ctx.lineTo(cx + triW * 0.5, triY);
        ctx.closePath();
        ctx.fill();
    }

    // 中轴分缝线
    ctx.strokeStyle = "rgba(138,104,112,0.24)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -h - capH + 2);
    ctx.lineTo(0, -2);
    ctx.stroke();
    ctx.restore();
}

function drawRuinColumnStack(worldX, heightRatio, widthRatio) {
    const x = worldX - camera.x;
    if (x < -240 || x > width + 240) return;
    // 实时采样地形高度，确保柱脚始终精准贴地（斜坡/平地都对齐）
    const gY = getGroundHeight(worldX, 9999);
    const h = height * heightRatio;
    const bodyW = Math.max(16, width * widthRatio);
    const segCount = 30;
    const segH = h / segCount;

    ctx.save();
    ctx.translate(x, gY);
    const drawBlock = (x0, y0, w0, h0, fill, stroke) => {
        ctx.fillStyle = fill;
        ctx.fillRect(x0, y0, w0, h0);
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1;
        ctx.strokeRect(x0, y0, w0, h0);
    };

    // 中轴骨架，保证高柱不会从中段视觉断裂
    drawBlock(-bodyW * 0.16, -h, bodyW * 0.32, h, "rgba(246,240,242,0.95)", "rgba(145,108,116,0.2)");

    let y = -h;
    for (let i = 0; i < segCount; i++) {
        const hh = segH * (0.68 + (i % 5) * 0.07);
        const ww = bodyW * (0.50 + (i % 7) * 0.06);
        const xx = -ww * 0.5 + ((i % 2) ? bodyW * 0.022 : -bodyW * 0.022);
        const fill = (i % 2)
            ? "rgba(252,248,248,0.98)"
            : "rgba(242,232,236,0.95)";
        drawBlock(xx, y, ww, hh, fill, "rgba(132,95,104,0.34)");

        // 小正方形插片，提升细碎层次
        if (i % 2 === 0) {
            const sq = Math.max(5, ww * (0.12 + (i % 3) * 0.03));
            const sx = (i % 4 < 2) ? (xx + ww * 0.18) : (xx + ww * 0.62 - sq);
            drawBlock(sx, y + hh * 0.2, sq, sq, "rgba(250,246,246,0.95)", "rgba(132,95,104,0.24)");
        }

        // 细边框条，模拟参考图的几何分段感
        if (i % 3 === 1) {
            const bandH = Math.max(2, hh * 0.12);
            drawBlock(xx - bodyW * 0.06, y + hh * 0.44, ww + bodyW * 0.12, bandH, "rgba(246,240,241,0.92)", "rgba(132,95,104,0.24)");
        }
        y += hh;
    }

    drawBlock(-bodyW * 0.92, -h - segH * 0.8, bodyW * 1.84, segH * 0.8, "rgba(250,246,246,0.98)", "rgba(132,95,104,0.30)");
    drawBlock(-bodyW * 0.84, -segH * 1.0, bodyW * 1.68, segH * 1.0, "rgba(248,242,243,0.98)", "rgba(132,95,104,0.30)");
    ctx.restore();
}

function getRampPlatformReveal01() {
    if (!scene2Ramp.flatUnlocked) return 0;
    const t = Math.max(0, Math.min(1, (performance.now() - scene2Ramp.unlockedAt) / SCENE2_PLATFORM_REVEAL_MS));
    return t * t * (3 - 2 * t);
}

function drawRampTurnpointColumnsBack() {
    if (!scene2Ramp.flatUnlocked) return;
    const reveal = getRampPlatformReveal01();
    if (reveal < 0.35) return;
    // 后景柱：稍细、稍矮、稍浅，制造纵深
    const xBack = scene2Ramp.flatStartX + 90;
    drawRuinColumnStack(xBack, 2.7, 0.0185);
}

function drawRampTurnpointColumnsFront() {
    if (!scene2Ramp.flatUnlocked) return;
    const reveal = getRampPlatformReveal01();
    if (reveal < 0.72) return;
    // 前景柱：更粗一点、层数更密（由 drawRuinColumnStack 内部分段保证）
    const xFront = scene2Ramp.flatStartX + 250;
    drawRuinColumnStack(xFront, 3.05, 0.022);
}

function drawRampTurnpointSymBuilding() {
    if (transition.scene2Blend < 0.01) return;
    if (!scene2Ramp.flatUnlocked) return;
    const img = images.s2_sym_building_01;
    if (!isImageReady(img)) return;

    // 大幅后移，确保出现在 2 根顶天立地遗迹柱后面
    const xBack = scene2Ramp.flatStartX + 90;
    const xFront = scene2Ramp.flatStartX + 250;
    const x = Math.max(xBack, xFront) + 800;
    const sx = x - camera.x;
    if (sx < -900 || sx > width + 900) return;

    // 严格对齐：图片底边与三角斜坡顶部平台同一高度
    const topAlignY = scene2Ramp.flatY;

    const ih = height * 0.34 * 2.5;
    const iw = ih * (img.width / img.height);
    // 图片底部与平台顶边齐平
    ctx.drawImage(img, sx - iw * 0.5, topAlignY - ih, iw, ih);
}

function drawGiantBird() {
    if (!giantBird.active) return;
    ctx.save(); ctx.globalAlpha = giantBird.alpha; ctx.fillStyle = "#111"; 
    const bx = giantBird.x, by = giantBird.y + Math.sin(giantBird.flap * 0.5) * 25, sc = width * 0.22, flap = Math.sin(giantBird.flap) * 0.5; 
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + sc * 0.6, by - sc * 0.02); ctx.lineTo(bx + sc * 0.6, by + sc * 0.02); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx - sc * 0.12, by + 10); ctx.lineTo(bx, by + 20); ctx.fill();
    ctx.save(); ctx.translate(bx + sc * 0.25, by); ctx.rotate(flap); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-sc * 0.4, -sc * 0.6); ctx.lineTo(sc * 0.1, -sc * 0.5); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(bx + sc * 0.35, by); ctx.rotate(-flap); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-sc * 0.4, sc * 0.6); ctx.lineTo(sc * 0.1, sc * 0.5); ctx.fill(); ctx.restore();
    ctx.restore();
}

function drawBirdSwarm() {
    birdsSwarm.forEach(b => {
        if (!b.active) return;
        const bx = b.x - camera.x;
        const by = b.y + Math.sin(b.offset) * 10;
        const wing = Math.sin(b.offset * 1.8) * (b.size * 2.6);
        ctx.save();
        ctx.translate(bx, by);
        ctx.scale(b.dir, 1);
        ctx.fillStyle = "#101010";
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-b.size * 5, -wing);
        ctx.lineTo(-b.size * 2.2, -b.size * 0.8);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-b.size * 5, wing);
        ctx.lineTo(-b.size * 2.2, b.size * 0.8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    });
    ctx.globalAlpha = 1.0;
}

function drawWhiteBirds() {
    whiteBirds.forEach(b => {
        const bx = b.x - camera.x;
        if (bx < -220 || bx > width + 220) return;
        const by = b.y + Math.sin(b.flap * 0.8) * 6;
        const wing = Math.sin(b.flap) * (b.size * 2.1);
        ctx.save();
        ctx.translate(bx, by);
        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-b.size * 4.2, -wing);
        ctx.lineTo(-b.size * 2.1, -b.size * 0.4);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-b.size * 4.2, wing);
        ctx.lineTo(-b.size * 2.1, b.size * 0.4);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    });
}

function drawWatercolorBlobs() {
    watercolorBlobs.forEach(w => {
        const t = Date.now() * 0.0002 + w.phase;
        const g = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, Math.max(w.rx, w.ry) * 1.2);
        g.addColorStop(0, `rgba(255,210,215,${w.a})`);
        g.addColorStop(0.55, `rgba(238,170,178,${w.a * 0.65})`);
        g.addColorStop(1, "rgba(230,150,162,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        const steps = 30;
        for (let i = 0; i <= steps; i++) {
            const a = (i / steps) * Math.PI * 2;
            const n1 = Math.sin(a * 3 + t + w.x * 0.0012) * 0.28;
            const n2 = Math.cos(a * 7 - t * 1.3 + w.y * 0.0009) * 0.18;
            const rx = w.rx * (1 + n1 + n2);
            const ry = w.ry * (1 + n1 * 0.8 - n2 * 0.6);
            const x = w.x + Math.cos(a) * rx;
            const y = w.y + Math.sin(a) * ry;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
    });
}

function drawMountainTrees(list, alphaMul = 1) {
    if (transition.scene2Blend < 0.01) return;
    list.forEach(t => {
        const x = t.x - camera.x;
        if (x < -120 || x > width + 120) return;
        const groundY = getGroundHeight(t.x, 9999);
        ctx.fillStyle = `rgba(255,255,255,${0.62 * alphaMul})`;
        const topX = x + t.lean * 10;
        const topY = groundY - t.h;
        ctx.beginPath();
        ctx.moveTo(x - t.w * 0.4, groundY);
        ctx.lineTo(x + t.w * 0.4, groundY);
        ctx.lineTo(topX + t.w * 0.65, topY);
        ctx.lineTo(topX - t.w * 0.65, topY);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.arc(topX, topY, t.w * 1.2, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawFloatingShards(frontLayer = false) {
    if (transition.scene2Blend < SCENE2_SHARDS_SHOW_BLEND || !windTransition.done) return;
    floatingShards.forEach(s => {
        if (!!s.frontLayer !== !!frontLayer) return;
        const rp = Math.max(0, Math.min(1, s.revealProgress || 0));
        if (rp <= 0.001) return;
        const x = s.x + (s.windOffset || 0) - camera.x;
        if (x < -260 || x > width + 260) return;
        const groundY = getGroundHeight(s.x, 9999);
        const entryEase = rp * rp * (3 - 2 * rp);
        const dropFromSky = (1 - entryEase) * (s.entryDropPx || (height * 0.2));
        const y = groundY - s.yOffset - dropFromSky + Math.sin(s.bob) * s.bobAmp;
        s.rot += s.rotSpd;
        const shardScale = 0.5;
        const lit = 0.5 + 0.5 * Math.sin(s.rot + s.x * 0.0002);
        const useAccent = s.colorGroup === 'frontAccent';
        const baseBody = useAccent
            ? [166 + Math.round(lit * 34), 70 + Math.round(lit * 18), 98 + Math.round(lit * 24)]
            : [132 + Math.round(lit * 30), 42 + Math.round(lit * 14), 62 + Math.round(lit * 20)];

        // 主体 + 分面 + 边缘高光，增强碎石立体感
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(s.rot);
        ctx.scale(shardScale, shardScale);
        ctx.globalAlpha = rp;

        ctx.fillStyle = `rgb(${baseBody[0]},${baseBody[1]},${baseBody[2]})`;
        ctx.beginPath();
        ctx.moveTo(s.poly[0].x, s.poly[0].y);
        for (let i=1; i<s.poly.length; i++) ctx.lineTo(s.poly[i].x, s.poly[i].y);
        ctx.closePath();
        ctx.fill();

        const cx = s.poly.reduce((sum, p) => sum + p.x, 0) / s.poly.length;
        const cy = s.poly.reduce((sum, p) => sum + p.y, 0) / s.poly.length;
        for (let i=0; i<s.poly.length; i++) {
            const a = s.poly[i];
            const b = s.poly[(i + 1) % s.poly.length];
            const faceLit = 0.5 + 0.5 * Math.sin(s.rot + i * 1.13);
            const fr = (useAccent ? 148 : 118) + Math.round(faceLit * (useAccent ? 44 : 42));
            const fg = (useAccent ? 56 : 34) + Math.round(faceLit * (useAccent ? 20 : 16));
            const fb = (useAccent ? 84 : 52) + Math.round(faceLit * (useAccent ? 28 : 24));
            ctx.fillStyle = `rgb(${fr},${fg},${fb})`;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.closePath();
            ctx.fill();
        }

        ctx.strokeStyle = useAccent ? 'rgb(246,206,214)' : 'rgb(224,176,186)';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(s.poly[0].x, s.poly[0].y);
        for (let i=1; i<s.poly.length; i++) ctx.lineTo(s.poly[i].x, s.poly[i].y);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    });
}

function drawRubbleDragonbonesMid() {
    if (transition.scene2Blend < 0.01) return;
    rubbleDragonbonesMid.forEach(b => {
        const x = b.x - camera.x;
        if (x < -180 || x > width + 180) return;
        const gY = getGroundHeight(b.x, 9999) - b.yLift;
        const h = b.h;
        const w = b.w;
        const lean = b.tilt;
        const topX = x + lean * h * 0.42;
        const baseL = x - w * 0.5;
        const baseR = x + w * 0.5;

        // 主体长三角（白色碎石龙骨）
        ctx.fillStyle = `rgba(${220 + Math.round(b.tone * 24)},${220 + Math.round(b.tone * 22)},${224 + Math.round(b.tone * 20)},${b.alpha})`;
        ctx.beginPath();
        ctx.moveTo(topX, gY - h);
        ctx.lineTo(baseR, gY);
        ctx.lineTo(baseL, gY);
        ctx.closePath();
        ctx.fill();

        // 四边形分面 1
        ctx.fillStyle = `rgba(${198 + Math.round(b.tone * 20)},${198 + Math.round(b.tone * 18)},${204 + Math.round(b.tone * 18)},${Math.min(1, b.alpha + 0.1)})`;
        ctx.beginPath();
        ctx.moveTo(topX - w * 0.08, gY - h * 0.78);
        ctx.lineTo(topX + w * 0.16, gY - h * 0.84);
        ctx.lineTo(x + w * 0.24, gY - h * 0.28);
        ctx.lineTo(x - w * 0.02, gY - h * 0.2);
        ctx.closePath();
        ctx.fill();

        // 四边形分面 2（暗面）
        ctx.fillStyle = `rgba(${170 + Math.round(b.tone * 16)},${170 + Math.round(b.tone * 14)},${178 + Math.round(b.tone * 14)},${Math.min(1, b.alpha + 0.12)})`;
        ctx.beginPath();
        ctx.moveTo(topX - w * 0.12, gY - h * 0.7);
        ctx.lineTo(topX - w * 0.02, gY - h * 0.76);
        ctx.lineTo(x - w * 0.16, gY - h * 0.12);
        ctx.lineTo(x - w * 0.32, gY - h * 0.08);
        ctx.closePath();
        ctx.fill();

        // 细长次级骨刺（三角）
        const sTopX = x + w * (0.55 + b.ridge * 0.2);
        const sTopY = gY - h * (0.45 + b.ridge * 0.35);
        ctx.fillStyle = `rgba(${228 + Math.round(b.tone * 16)},${228 + Math.round(b.tone * 14)},${232 + Math.round(b.tone * 14)},${Math.min(1, b.alpha + 0.06)})`;
        ctx.beginPath();
        ctx.moveTo(sTopX, sTopY);
        ctx.lineTo(x + w * 0.32, gY - h * 0.02);
        ctx.lineTo(x + w * 0.16, gY - h * 0.08);
        ctx.closePath();
        ctx.fill();

        // 组内“龙骨串”连接感
        ctx.strokeStyle = `rgba(152,152,160,${0.2 + b.alpha * 0.25})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(x - w * 0.42, gY - h * 0.06);
        ctx.lineTo(x + w * 0.44, gY - h * (0.08 + 0.04 * Math.sin((b.groupSeed || 0) * 6.3)));
        ctx.stroke();

        // 边线
        ctx.strokeStyle = `rgba(110,110,118,${0.22 + b.alpha * 0.24})`;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(topX, gY - h);
        ctx.lineTo(baseR, gY);
        ctx.lineTo(baseL, gY);
        ctx.closePath();
        ctx.stroke();
    });
}

function drawArchBridge() {
    if (transition.scene2Blend < 0.01) return;
    const bridgeDrawStartX = SCENE2_ARCH_BRIDGE_START_X;
    const bridgeDrawEndX = Math.min(SCENE2_ARCH_BRIDGE_END_X, SCENE2_BROKEN_PLATFORM_START_X);
    const bridgeStartSx = bridgeDrawStartX - camera.x;
    const bridgeEndSx = bridgeDrawEndX - camera.x;
    if (bridgeEndSx < -300 || bridgeStartSx > width + 300) return;

    const deckY = getScene2ArchBridgeDeckY();
    const deckTopY = deckY;
    const bridgeBodyW = bridgeEndSx - bridgeStartSx;
    if (bridgeBodyW <= 1) return;
    const bayW = SCENE2_ARCH_BRIDGE_WIDTH / SCENE2_ARCH_COUNT;
    const startBay = Math.max(0, Math.floor((bridgeDrawStartX - SCENE2_ARCH_BRIDGE_START_X) / bayW));
    const endBay = Math.min(SCENE2_ARCH_COUNT - 1, Math.ceil((bridgeDrawEndX - SCENE2_ARCH_BRIDGE_START_X) / bayW));
    const bodyColor = "rgba(252,252,252,0.98)";

    // 实心水平桥面（顶边与平台地面齐平，厚度向下）
    ctx.fillStyle = bodyColor;
    ctx.fillRect(bridgeStartSx, deckTopY, bridgeBodyW, SCENE2_ARCH_BRIDGE_DECK_THICKNESS);

    const drawBraceRect = (x1, y1, x2, y2, thickness, fill) => {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.hypot(dx, dy);
        if (len < 1) return;
        const ang = Math.atan2(dy, dx);
        ctx.save();
        ctx.translate(x1, y1);
        ctx.rotate(ang);
        ctx.fillStyle = fill;
        ctx.fillRect(0, -thickness * 0.5, len, thickness);
        ctx.restore();
    };

    // 中大边小：拱门尺寸向两侧递减 + 镂空框架
    for (let i = startBay; i <= endBay; i++) {
        const centerXWorld = SCENE2_ARCH_BRIDGE_START_X + bayW * (i + 0.5);
        const sx = centerXWorld - camera.x;
        if (sx < -bayW || sx > width + bayW) continue;
        const n = (i + 0.5) / SCENE2_ARCH_COUNT; // 0..1
        const centerFalloff = 1 - Math.abs(n - 0.5) * 2;
        const scale = 0.55 + centerFalloff * 0.7;
        const archR = bayW * (0.18 + 0.22 * scale);
        const archBaseY = deckY + archR + 48; // 拱门整体下移
        const legBottom = deckY + (SCENE2_ARCH_BRIDGE_HEIGHT * (0.5 + 0.42 * scale));
        const legW = Math.max(8, bayW * 0.08);

        // 左右立柱
        ctx.fillStyle = bodyColor;
        ctx.fillRect(sx - archR - legW, deckY, legW, legBottom - deckY);
        ctx.fillRect(sx + archR, deckY, legW, legBottom - deckY);

        // 拱门内部矩形钢架：交错斜撑 + 横向矩形梁（只填充，不描线）
        const leftIn = sx - archR + legW * 0.8;
        const rightIn = sx + archR - legW * 0.8;
        const topIn = deckY + 18;
        const midIn = archBaseY - archR * 0.18;
        const botIn = Math.min(legBottom - 10, archBaseY + archR * 0.22);
        const braceColor = "rgba(246,246,248,0.9)";
        const braceW = Math.max(2, bayW * 0.012);

        // 主 X 交叉
        drawBraceRect(leftIn, topIn, rightIn, botIn, braceW, braceColor);
        drawBraceRect(rightIn, topIn, leftIn, botIn, braceW, braceColor);
        // 二层交错
        drawBraceRect(leftIn + (rightIn - leftIn) * 0.16, topIn + 4, rightIn - (rightIn - leftIn) * 0.10, midIn, braceW * 0.82, braceColor);
        drawBraceRect(rightIn - (rightIn - leftIn) * 0.16, topIn + 4, leftIn + (rightIn - leftIn) * 0.10, midIn, braceW * 0.82, braceColor);
        // 横向矩形梁
        ctx.fillStyle = braceColor;
        const beamH = Math.max(2, braceW * 0.72);
        ctx.fillRect(leftIn + 6, midIn - beamH * 0.5, (rightIn - leftIn) - 12, beamH);
        ctx.fillRect(leftIn + 10, botIn - 6 - beamH * 0.5, (rightIn - leftIn) - 20, beamH);
        // 纵向短梁，增加块面细节
        const colW = Math.max(2, braceW * 0.55);
        ctx.fillRect(sx - colW * 0.5, topIn + 8, colW, botIn - topIn - 16);
        ctx.fillRect(sx - archR * 0.34, topIn + 12, colW, midIn - topIn - 6);
        ctx.fillRect(sx + archR * 0.34 - colW, topIn + 12, colW, midIn - topIn - 6);

        // 桥面附加细节：上缘分段压条 + 细块面，增强纪念性结构感
        const capY = deckY + 4 + (i % 2) * 1.5;
        const capW = bayW * 0.72;
        const capX = sx - capW * 0.5;
        ctx.fillStyle = "rgba(238,238,241,0.96)";
        ctx.fillRect(capX, capY, capW, Math.max(2, bayW * 0.015));
        ctx.fillStyle = "rgba(224,224,228,0.9)";
        const tileW = Math.max(8, bayW * 0.085);
        for (let tx = capX + 4; tx < capX + capW - 6; tx += tileW + 4) {
            ctx.fillRect(tx, capY + 4, tileW, Math.max(2, bayW * 0.012));
        }
    }
}

function drawBrokenBridgePlatforms() {
    if (transition.scene2Blend < 0.01) return;
    if (player.x >= SCENE2_Z_FLOAT_START_X) return; // 50000 后隐藏断桥
    if (!brokenBridgePlatforms.length) return;
    const deckY = getScene2ArchBridgeDeckY();
    const topColor = "rgba(252,252,252,0.98)";
    const bodyColor = "rgba(240,240,244,0.94)";
    const pierColor = "rgba(236,236,240,0.9)";
    const accentColor = "rgba(218,218,224,0.82)";

    brokenBridgePlatforms.forEach((p, idx) => {
        const x = p.x - camera.x;
        if (x > width + 260 || x + p.w < -260) return;
        const topY = deckY;
        const bodyH = SCENE2_ARCH_BRIDGE_DECK_THICKNESS + 12;

        ctx.fillStyle = bodyColor;
        ctx.fillRect(x, topY, p.w, bodyH);
        ctx.fillStyle = topColor;
        ctx.fillRect(x, topY, p.w, SCENE2_ARCH_BRIDGE_DECK_THICKNESS);

        // 顶面矩形块面细节
        const notchW = 26;
        ctx.fillStyle = accentColor;
        for (let nx = x + 12; nx < x + p.w - 16; nx += notchW + 10) {
            ctx.fillRect(nx, topY + 4 + ((idx + Math.floor(nx)) % 2), notchW, 4);
        }

        // 桥墩（双墩），保持与断桥矩形平台同构
        const pierW = Math.max(16, p.w * 0.12);
        const pierY = topY + bodyH - 2;
        const pierH = p.pierDepth;
        ctx.fillStyle = pierColor;
        ctx.fillRect(x + p.w * 0.22 - pierW * 0.5, pierY, pierW, pierH);
        ctx.fillRect(x + p.w * 0.78 - pierW * 0.5, pierY, pierW, pierH * 0.92);

        // 竖向压条，增加桥墩立体细节
        ctx.fillStyle = "rgba(222,222,228,0.88)";
        ctx.fillRect(x + p.w * 0.22 - pierW * 0.2, pierY + 6, pierW * 0.16, pierH - 10);
        ctx.fillRect(x + p.w * 0.78 - pierW * 0.2, pierY + 6, pierW * 0.16, pierH * 0.92 - 10);
    });
}

function drawZFloatingOrganicTrees() {
    if (!zOrganicTrees.length) return;
    zOrganicTrees.forEach((t) => {
        const sx = t.x - camera.x;
        if (sx < -200 || sx > width + 200) return;
        const unfold = t.unfold * t.unfold * (3 - 2 * t.unfold);
        if (unfold < 0.01) return;
        const h = t.h * (0.35 + unfold * 0.75);
        const sway = Math.sin(performance.now() * 0.0015 + t.seed) * 8 * unfold;
        const trunkW = 5 + unfold * 6;
        const colorL = Math.round(228 * t.tone);
        const colorM = Math.round(214 * t.tone);
        const colorD = Math.round(192 * t.tone);
        ctx.save();
        ctx.translate(sx, t.y + 1);
        ctx.fillStyle = `rgba(${colorL},${colorM},${colorD},0.92)`;
        ctx.beginPath();
        ctx.moveTo(-trunkW * 0.5, 0);
        ctx.bezierCurveTo(
            -trunkW * (0.5 + 0.8 * t.bend), -h * 0.24,
            trunkW * (0.4 + 0.7 * t.bend) + sway * 0.2, -h * 0.58,
            sway * 0.35, -h
        );
        ctx.bezierCurveTo(
            sway * 0.55 + trunkW * (0.7 - 0.4 * t.bend), -h * 0.54,
            -trunkW * (0.3 - 0.4 * t.bend), -h * 0.22,
            trunkW * 0.52, 0
        );
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(110,94,104,0.68)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, -h * 0.04);
        ctx.bezierCurveTo(trunkW * (0.7 + t.bend), -h * 0.28, -trunkW * (0.45 + t.bend), -h * 0.66, sway * 0.35, -h);
        ctx.stroke();

        const leafColor = "rgba(236,226,231,0.9)";
        ctx.fillStyle = leafColor;
        const leafN = 4;
        for (let i = 0; i < leafN; i++) {
            const lt = (i + 1) / (leafN + 1);
            const ly = -h * (0.18 + lt * 0.72);
            const lx = Math.sin(lt * Math.PI * (1.1 + t.bend)) * (12 + 16 * unfold) + sway * 0.22;
            const lw = 10 + unfold * 15 - i * 1.2;
            const lh = 5 + unfold * 8 - i * 0.8;
            ctx.beginPath();
            ctx.moveTo(lx - lw * 0.5, ly);
            ctx.lineTo(lx + lw * 0.52, ly - lh * 0.2);
            ctx.lineTo(lx + lw * 0.18, ly + lh * 0.7);
            ctx.lineTo(lx - lw * 0.64, ly + lh * 0.34);
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();
    });
}

function drawZFloatingPlatforms() {
    if (!zFloatingPlatforms.length) return;
    const bodyPalette = [
        [248, 244, 246],
        [244, 238, 242],
        [241, 235, 238]
    ];
    zFloatingPlatforms.forEach((p, i) => {
        const sx = p.x - camera.x;
        if (sx < -320 || sx > width + 320) return;
        ctx.save();
        ctx.translate(sx, p.y);

        const c = bodyPalette[i % bodyPalette.length];
        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.98)`;
        ctx.beginPath();
        ctx.moveTo(p.poly[0].x, p.poly[0].y);
        for (let k = 1; k < p.poly.length; k++) ctx.lineTo(p.poly[k].x, p.poly[k].y);
        ctx.closePath();
        ctx.fill();

        // 扁平分面：轻微明暗块面，避免大渐变
        const cx = p.poly.reduce((sum, n) => sum + n.x, 0) / p.poly.length;
        const cy = p.poly.reduce((sum, n) => sum + n.y, 0) / p.poly.length;
        for (let k = 0; k < p.poly.length; k++) {
            const a = p.poly[k];
            const b = p.poly[(k + 1) % p.poly.length];
            const lit = 0.86 + 0.08 * Math.sin(i * 0.9 + k * 1.2);
            const fr = Math.round(c[0] * lit);
            const fg = Math.round(c[1] * lit);
            const fb = Math.round(c[2] * lit);
            ctx.fillStyle = `rgba(${fr},${fg},${fb},0.32)`;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.closePath();
            ctx.fill();
        }

        // 细折线网格（深灰/暗红）
        ctx.strokeStyle = "rgba(116,88,98,0.42)";
        ctx.lineWidth = 0.8;
        p.patchLines.forEach((ln) => {
            ctx.beginPath();
            ctx.moveTo(ln.x0, ln.y0);
            ctx.lineTo(ln.x1, ln.y1);
            ctx.stroke();
        });

        // 外轮廓
        ctx.strokeStyle = "rgba(92,72,82,0.74)";
        ctx.lineWidth = 1.05;
        ctx.beginPath();
        ctx.moveTo(p.poly[0].x, p.poly[0].y);
        for (let k = 1; k < p.poly.length; k++) ctx.lineTo(p.poly[k].x, p.poly[k].y);
        ctx.closePath();
        ctx.stroke();

        // 伴随碎片
        p.shards.forEach((sPoly, idx) => {
            const tint = idx % 2 === 0 ? "rgba(244,238,241,0.92)" : "rgba(238,230,235,0.9)";
            ctx.fillStyle = tint;
            ctx.beginPath();
            ctx.moveTo(sPoly[0].x, sPoly[0].y);
            for (let m = 1; m < sPoly.length; m++) ctx.lineTo(sPoly[m].x, sPoly[m].y);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "rgba(100,82,92,0.62)";
            ctx.lineWidth = 0.8;
            ctx.stroke();
        });

        ctx.restore();
    });
}

function drawBridgeSkyCurtain() {
    return; // 按需求移除背景矩形横竖条天幕
    if (transition.scene2Blend < 0.01) return;
    if (!skyCurtain.active) return;
    if (player.x < SCENE2_ARCH_BRIDGE_START_X - 120) return;

    const elapsed = Math.max(0, performance.now() - (skyCurtain.startedAt || performance.now()));
    const runDist = Math.min(2600, elapsed * 0.9);
    const span = width * 1.4;
    const laneN = 22;
    const dark = "rgba(208,58,74,0.82)";
    const darker = "rgba(186,46,62,0.86)";

    ctx.save();
    for (let i = 0; i < laneN; i++) {
        const seed = i * 1.37 + 0.91;
        const sx = ((i / (laneN - 1)) * span - width * 0.2) + Math.sin(seed * 2.8) * 24;
        const w = 14 + (i % 4) * 10;
        const fallT = Math.max(0, Math.min(1, (runDist - i * 120) / 1400));
        const ease = fallT * fallT * (3 - 2 * fallT);
        const h = (height * (0.35 + (i % 5) * 0.11)) * ease;
        if (h <= 2) continue;

        ctx.fillStyle = (i % 3 === 0) ? darker : dark;
        ctx.fillRect(sx, -8, w, h);

    }

    // 横向拼接梁，随着奔跑逐段下落出现
    for (let j = 0; j < 3; j++) {
        const t = Math.max(0, Math.min(1, (runDist - 520 - j * 420) / 1200));
        if (t <= 0.01) continue;
        const e = t * t * (3 - 2 * t);
        const y = height * (0.18 + j * 0.14) * e;
        const x = width * (0.08 + j * 0.1);
        const w = width * (0.68 - j * 0.12);
        const h = 16 + j * 6;
        ctx.fillStyle = j === 1 ? darker : dark;
        ctx.fillRect(x, y, w, h);
    }
    ctx.restore();
}

function drawFarRectTriPeaks() {
    if (transition.scene2Blend < 0.01) return;
    farRectTriPeaks.forEach(p => {
        const x = p.x - camera.x;
        if (x < -460 || x > width + 460) return;
        const gY = getGroundHeight(p.x, 9999) - p.yLift;
        const topX = x + p.skew * p.h;
        const topY = gY - p.h;
        const halfW = p.w * 0.5;

        // 矩形化三角主峰
        ctx.fillStyle = `rgba(196,130,142,${p.alpha})`;
        ctx.beginPath();
        ctx.moveTo(topX - halfW * 0.05, topY);
        ctx.lineTo(x + halfW, gY);
        ctx.lineTo(x - halfW, gY);
        ctx.closePath();
        ctx.fill();

        // 切面矩形块，模拟参考图中的大片几何面
        ctx.fillStyle = `rgba(222,168,178,${p.alpha * 0.7})`;
        ctx.beginPath();
        ctx.moveTo(topX - halfW * 0.12, topY + p.h * 0.26);
        ctx.lineTo(topX + halfW * 0.33, topY + p.h * 0.22);
        ctx.lineTo(x + halfW * 0.19, gY - p.h * 0.08);
        ctx.lineTo(x - halfW * 0.24, gY - p.h * 0.02);
        ctx.closePath();
        ctx.fill();
    });
}

function drawWindInkOverlay() {
    const windN = Math.max(0, Math.min(1, windTransition.intensity / 100));
    if (windN < 0.02) return;
    const now = performance.now() * 0.001;
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    for (let i = 0; i < 7; i++) {
        const y = height * (0.12 + i * 0.16) + Math.sin(now * (1.1 + i * 0.2) + i * 1.7) * (12 + i * 8);
        const amp = (52 + i * 19) * windN;
        const xOffset = (now * (340 + i * 125) * windN) % (width + 380) - 190;
        const g = ctx.createLinearGradient(xOffset - amp, y - 24, xOffset + width * 0.75, y + 26);
        g.addColorStop(0, `rgba(70,40,52,${0.04 + windN * 0.08})`);
        g.addColorStop(0.5, `rgba(120,72,88,${0.08 + windN * 0.12})`);
        g.addColorStop(1, 'rgba(20,12,16,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(-220, y - 16);
        ctx.bezierCurveTo(width * 0.24, y - amp * 0.22, width * 0.56, y + amp * 0.18, width + 220, y + 12);
        ctx.lineTo(width + 220, y + 42);
        ctx.bezierCurveTo(width * 0.64, y + amp * 0.28, width * 0.25, y - amp * 0.12, -220, y + 22);
        ctx.closePath();
        ctx.fill();
    }
    ctx.restore();
}

function drawRampTopShadowAndParticles() {

function drawSnowAndFlowers() {
    if (transition.scene2Blend < 0.01) return;
    const baseGroundY = height - groundH;
    snowPiles.forEach(s => {
        const sx = s.x - camera.x;
        if (sx < -200 || sx > width + 200) return;
        const gy = getGroundHeight(s.x, 9999);
        if (gy > height + 1000) return;
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.beginPath();
        ctx.moveTo(sx - s.w * 0.5, gy);
        ctx.quadraticCurveTo(sx - s.w * 0.22, gy - s.h * 0.95, sx, gy - s.h);
        ctx.quadraticCurveTo(sx + s.w * 0.24, gy - s.h * 0.9, sx + s.w * 0.5, gy);
        ctx.closePath();
        ctx.fill();
    });
    redFlowers.forEach(f => {
        const fx = f.x - camera.x;
        if (fx < -50 || fx > width + 50) return;
        const gy = getGroundHeight(f.x, 9999);
        if (gy > height + 1000) return;
        if (Math.abs(gy - baseGroundY) > height * 4) return;
        const tipX = fx + Math.sin(f.tilt) * 2.6;
        const tipY = gy - f.h;
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(fx, gy);
        ctx.lineTo(tipX, tipY);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.beginPath();
        ctx.arc(tipX, tipY, f.r, 0, Math.PI * 2);
        ctx.fill();
    });
}
