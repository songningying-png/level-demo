function drawOrganicBranch(v) {
    const vx = v.x - camera.x; if(vx < -200 || vx > width + 200) return;
    const gy = getGroundHeight(v.x, 9999);
    if (gy > height + 1000) return;
    const t = transition.scene2Blend;
    const branchColor = t > 0 ? lerpColor("000000", "ffffff", t) : "#000";
    const slopeSinkY = (v.x >= SCENE2_RAMP_START_X) ? 12 : 0;
    ctx.save(); ctx.translate(vx, gy + slopeSinkY); ctx.scale(1, v.growth); ctx.fillStyle = branchColor;
    ctx.beginPath(); ctx.moveTo(-v.thickness / 2, 0); 
    ctx.bezierCurveTo(v.curvePoints[1].dx - v.thickness / 2.5, v.curvePoints[1].dy, v.curvePoints[2].dx - v.thickness / 6, v.curvePoints[2].dy, v.curvePoints[3].dx, v.curvePoints[3].dy);
    ctx.bezierCurveTo(v.curvePoints[2].dx + v.thickness / 10, v.curvePoints[2].dy, v.curvePoints[1].dx + v.thickness / 3, v.curvePoints[1].dy, v.thickness / 2, 0);
    ctx.closePath(); ctx.fill();
    ctx.restore();
}

function drawLinedMountain(speed, fill, stroke, baseY, amp, seed) {
    const worldOffset = camera.x * speed; ctx.beginPath(); ctx.moveTo(camera.x - width*5, height * 15);
    const pts = [];
    for (let x = camera.x - width*5; x < camera.x + width*5; x += 38) {
        const posX = x + worldOffset;
        const macro = Math.sin(posX * 0.00062 + seed * 1.17) * 1.15 + Math.sin(posX * 0.0017 + seed * 1.9) * 0.54;
        const jag = Math.sin(posX * 0.012 + seed * 3.7) * 0.22 + Math.sin(posX * 0.028 + seed * 1.6) * 0.12;
        const cusp = (Math.abs(Math.sin(posX * 0.007 + seed * 4.2)) - 0.5) * 0.34;
        const noise = macro + jag + cusp;
        pts.push({x: x - camera.x, y: baseY + noise * (amp * 0.82)});
    }
    pts.forEach(p => ctx.lineTo(p.x, p.y)); ctx.lineTo(camera.x + width*5, height * 15); ctx.fillStyle = fill; ctx.fill();
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); pts.forEach(p => ctx.lineTo(p.x, p.y)); ctx.strokeStyle = stroke; ctx.stroke();
}

function drawVoidFallBg0Only() {
    if (isImageReady(images.bg)) ctx.drawImage(images.bg, 0, 0, width, height);
    else {
        ctx.fillStyle = SKY_COLOR;
        ctx.fillRect(0, 0, width, height);
    }
}

/** 下坠段氛围：上深黑、下微紫，贴近参考竖线流星底衬 */
function drawVoidFallDepthGradient() {
    const g = ctx.createLinearGradient(0, 0, 0, height);
    g.addColorStop(0, 'rgba(0,0,0,0.42)');
    g.addColorStop(1, 'rgba(26,26,46,0.55)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, width, height);
}

function drawVoidFallBgsFromBg1(elapsedMs) {
    if (elapsedMs < VOID_BG1_START_MS || !isImageReady(images.bg1)) return;

    let rawU = (elapsedMs - VOID_BG1_START_MS) / (VOID_FALL_MS - VOID_BG1_START_MS);
    rawU = Math.max(0, Math.min(1, rawU));
    const u = rawU * rawU * (3 - 2 * rawU);

    if (u >= 0.995) {
        ctx.drawImage(images.bg1, 0, 0, width, height);
        return;
    }

    const feather = height * 0.55;
    const rise = u * (height + feather * 0.4);
    const edge = height - rise;

    ctx.save();
    ctx.globalAlpha = 0.1 * Math.pow(u, 0.85);
    ctx.drawImage(images.bg1, 0, 0, width, height);
    ctx.restore();

    const tc = getVoidBlendCanvas();
    const tctx = tc.getContext('2d');
    tctx.clearRect(0, 0, width, height);
    tctx.drawImage(images.bg1, 0, 0, width, height);
    tctx.globalCompositeOperation = 'destination-in';
    const y0 = Math.max(0, edge - feather);
    const g = tctx.createLinearGradient(0, y0, 0, height);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.15, `rgba(255,255,255,${0.08 + u * 0.18})`);
    g.addColorStop(0.38, `rgba(255,255,255,${0.28 + u * 0.32})`);
    g.addColorStop(0.62, `rgba(255,255,255,${0.55 + u * 0.28})`);
    g.addColorStop(0.84, `rgba(255,255,255,${0.82 + u * 0.12})`);
    g.addColorStop(1, 'rgba(255,255,255,1)');
    tctx.fillStyle = g;
    tctx.fillRect(0, 0, width, height);
    tctx.globalCompositeOperation = 'source-over';

    ctx.save();
    ctx.filter = 'blur(4px)';
    ctx.globalAlpha = 0.92 + u * 0.08;
    ctx.drawImage(tc, 0, 0);
    ctx.restore();
    ctx.filter = 'none';

    ctx.save();
    ctx.globalCompositeOperation = 'soft-light';
    ctx.globalAlpha = 0.07 * u;
    ctx.drawImage(images.bg1, 0, 0, width, height);
    ctx.restore();
}

function drawVoidFallAmbient(elapsedMs) {
    const driftUp = elapsedMs * 0.14 + (player.y - voidFall.startPlayerY) * 0.05;
    ambientStorm.forEach(p => {
        let py = (p.y - driftUp) % (height + 40);
        if (py < -5) py += height + 40;
        ctx.globalAlpha = Math.min(0.95, p.alpha * 1.35);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(p.x, py, p.size * 1.15, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

/** 人类式眨眼：快闭慢开，非正弦 */
function getEyeBlinkOpen(nowMs) {
    const c = 4000;
    const p = nowMs % c;
    if (p < 3100) return 1;
    if (p < 3185) {
        const u = (p - 3100) / 85;
        return 1 - u * u;
    }
    if (p < 3235) return 0.04;
    if (p < 3375) {
        const u = (p - 3235) / 140;
        return 0.04 + (1 - 0.04) * (1 - Math.pow(1 - u, 2.4));
    }
    return 1;
}

/**
 * 屏幕正中的几何「眼」：同心圆 + 中心品红晕 + 水平轴 + 虚线外环；眨眼表现为整体缩放/透明度。
 * fadeMul：渐显；close01：落地后闭合为线并消失；nowMs：眨眼时钟。
 */
function drawGiantVoidEyeScreenCenter(fadeMul, close01, nowMs) {
    if (fadeMul <= 0.02) return;
    const pClose = Math.max(0, close01 || 0);
    const cx = width * 0.5;
    const cy = height * 0.5;
    ctx.save();
    ctx.translate(cx, cy);

    if (pClose >= 0.18) {
        const u = Math.min(1, (pClose - 0.18) / 0.82);
        const halfW = width * 0.22 * (1 - u) * (1 - u * 0.18);
        ctx.globalAlpha = fadeMul * (1 - u * 0.22);
        ctx.strokeStyle = 'rgba(255,250,252,0.94)';
        ctx.lineWidth = Math.max(0.4, 2.8 * (1 - u * 0.88));
        ctx.beginPath();
        ctx.moveTo(-halfW, 0);
        ctx.lineTo(halfW, 0);
        ctx.stroke();
        ctx.restore();
        return;
    }

    const blinkOpen = getEyeBlinkOpen(nowMs) * Math.max(0.12, 1 - pClose * 3.2);
    const ringScale = blinkOpen * (1 - pClose * 0.95);
    const m = Math.min(width, height);

    ctx.save();
    ctx.scale(ringScale, ringScale);

    const glowR = m * 0.2;
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
    glow.addColorStop(0, 'rgba(255, 95, 210, 0.72)');
    glow.addColorStop(0.35, 'rgba(220, 50, 175, 0.38)');
    glow.addColorStop(0.72, 'rgba(150, 30, 120, 0.1)');
    glow.addColorStop(1, 'rgba(60, 8, 45, 0)');
    ctx.fillStyle = glow;
    ctx.globalAlpha = fadeMul * 0.9;
    ctx.beginPath();
    ctx.arc(0, 0, glowR * 1.06, 0, Math.PI * 2);
    ctx.fill();

    const radii = [m * 0.072, m * 0.118, m * 0.168, m * 0.218];
    ctx.lineJoin = 'round';
    radii.forEach((r, i) => {
        ctx.globalAlpha = fadeMul * (0.84 - i * 0.07);
        ctx.strokeStyle = 'rgba(255,255,255,0.93)';
        ctx.lineWidth = i === 0 ? 1.35 : 1.05;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
    });

    ctx.globalAlpha = fadeMul * 0.92;
    ctx.fillStyle = 'rgba(255,255,255,0.97)';
    const nodeR = Math.max(2.2, m * 0.0065);
    const nodeSpecs = [
        [1, 0],
        [1, Math.PI * 0.62],
        [1, Math.PI * 1.25],
        [2, Math.PI * 0.35],
        [2, Math.PI * 0.92],
        [2, Math.PI * 1.7],
        [3, Math.PI * 0.15],
        [3, Math.PI * 1.05]
    ];
    nodeSpecs.forEach(([ri, ang]) => {
        const r = radii[ri];
        ctx.beginPath();
        ctx.arc(Math.cos(ang) * r, Math.sin(ang) * r, nodeR, 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.globalAlpha = fadeMul * 0.78;
    ctx.strokeStyle = 'rgba(255,255,255,0.48)';
    ctx.lineWidth = 0.85;
    ctx.beginPath();
    ctx.moveTo(-m * 0.26, 0);
    ctx.lineTo(m * 0.26, 0);
    ctx.stroke();

    ctx.setLineDash([5, 9]);
    ctx.globalAlpha = fadeMul * 0.4;
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, radii[3] * 1.32, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
    ctx.restore();
}

function draw() {
    if (voidFall.phase === 'falling') {
        const fel = performance.now() - voidFall.startTime;
        const totalShake = transition.shake + camera.shakeLand;
        const shX = (Math.random() - 0.5) * totalShake;
        const shY = (Math.random() - 0.5) * totalShake * 0.82;
        drawVoidFallBg0Only();
        drawVoidFallDepthGradient();
        drawVoidFallBgsFromBg1(fel);
        drawVoidLineMeteorsScreen();
        drawVoidFallAmbient(fel);
        if (poemData.show && poemData.alpha > 0.001) {
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.globalAlpha = poemData.alpha; ctx.fillStyle = "#fff";
            const startY = poemData.isFirst ? height * 0.15 : height * 0.30;
            const textX = poemData.isFirst ? width / 2 : width / 2 + width * 0.08;
            poemData.lines.forEach((line, i) => {
                ctx.font = "100 20px 'Microsoft YaHei'";
                ctx.fillText(line, textX, startY + i * 48);
            });
            ctx.globalAlpha = 1.0;
        }
        if (fel >= VOID_EYE_MS) {
            const fade = Math.min(1, (fel - VOID_EYE_MS) / 1500);
            drawGiantVoidEyeScreenCenter(fade, 0, performance.now());
        }
        let squatY = 1;
        if (voidFall.fallState === 'hardLanding') squatY = 0.79;
        else if (voidFall.fallState === 'recoverStand' && voidFall.recoverAt > 0) {
            const rp = Math.min(1, (performance.now() - voidFall.recoverAt) / RECOVER_STAND_MS);
            squatY = 0.79 + 0.21 * (rp * rp * (3 - 2 * rp));
        }
        let fallRot = 0, fallSx = 1, fallSy = 1;
        if (voidFall.fallState === 'freeFall' && fel >= VOID_FALL_POSE_DELAY_MS) {
            const sp = Math.min(1, (fel - VOID_FALL_POSE_DELAY_MS) / 480);
            const vN = Math.min(1, Math.abs(player.vy) / VOID_TERM_VELOCITY);
            fallRot = player.facing * (0.11 + vN * 0.2) * sp;
            fallSx = 1 - (0.06 + vN * 0.05) * sp;
            fallSy = 1 + (0.05 + vN * 0.12) * sp;
        }
        ctx.save();
        ctx.translate(width / 2 + shX, height / 2 + shY);
        ctx.scale(camera.zoom, camera.zoom);
        ctx.translate(-width / 2, -height / 2 - camera.y);
        drawLandingDustWorld();
        drawVoidCapeBehindPlayer();
        const pImgsV = images[player.state];
        if (pImgsV && pImgsV[player.frame] && isImageReady(pImgsV[player.frame])) {
            const curImg = pImgsV[player.frame], px = player.x - camera.x + player.width / 2, py = player.y + player.height / 2;
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(player.rotation + fallRot);
            ctx.scale(player.facing * fallSx, fallSy * squatY);
            ctx.drawImage(curImg, -player.width / 2, -player.height / 2, player.width, player.height);
            ctx.restore();
        }
        ctx.restore();
        return;
    }

    ctx.fillStyle = SKY_COLOR; ctx.fillRect(0, 0, width, height);
    if (isImageReady(images.bg)) ctx.drawImage(images.bg, 0, 0, width, height);
    if (transition.scene2Blend > 0.001 && isImageReady(images.bg1)) {
        ctx.globalAlpha = transition.scene2Blend;
        ctx.drawImage(images.bg1, 0, 0, width, height);
        ctx.globalAlpha = 1.0;
    }
    // 旧版代码风大画面已停用，转场由视频层接管
    if (transition.scene2Blend > 0.01) drawWatercolorBlobs();
    
    ambientStorm.forEach(p => { ctx.globalAlpha = p.alpha; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
    ctx.globalAlpha = 1.0; drawGiantBird();
    if (transition.scene2Blend > 0.01) drawWhiteBirds();

    if (poemData.show && poemData.alpha > 0.001) {
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.globalAlpha = poemData.alpha; ctx.fillStyle = "#fff";
        const startY = poemData.isFirst ? height * 0.15 : height * 0.30;
        const textX = poemData.isFirst ? width / 2 : width / 2 + width * 0.08;
        poemData.lines.forEach((line, i) => { 
            ctx.font = "100 20px 'Microsoft YaHei'"; 
            ctx.fillText(line, textX, startY + i*48); 
        });
        ctx.globalAlpha = 1.0;
    }

    expansionRings.forEach(r => {
        const cx = (typeof r.x === 'number') ? (r.x - camera.x) : (width / 2);
        const cy = (typeof r.y === 'number') ? (r.y - camera.y) : (height / 2);
        const lw = r.lineW || 1.5;
        ctx.save();
        // 模糊外环（柔光层）
        ctx.strokeStyle = `rgba(255,245,248,${Math.max(0, r.alpha * 0.32)})`;
        ctx.lineWidth = lw * (1.9 + (r.glowMul || 1) * 0.15);
        ctx.shadowBlur = 12;
        ctx.shadowColor = `rgba(255,245,248,${Math.min(1, r.alpha * 0.85)})`;
        ctx.beginPath();
        ctx.arc(cx, cy, r.r + 0.6, 0, Math.PI * 2);
        ctx.stroke();

        // 核心细线环
        ctx.strokeStyle = `rgba(255,245,248,${r.alpha})`;
        ctx.lineWidth = lw;
        ctx.shadowBlur = 6;
        ctx.shadowColor = `rgba(255,245,248,${Math.min(1, r.alpha * 0.8)})`;
        ctx.beginPath();
        ctx.arc(cx, cy, r.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    });
    holyRings.forEach(r => {
        ctx.beginPath();
        ctx.arc(width / 2, height / 2, r.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,235,240,${r.alpha})`;
        ctx.lineWidth = r.lineW;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(width / 2, height / 2, r.r + 14, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,190,205,${r.alpha * 0.7})`;
        ctx.lineWidth = Math.max(1, r.lineW * 0.45);
        ctx.stroke();
    });

    let eyeCloseP = 0;
    if (voidFall.phase === 'eyeClose') {
        eyeCloseP = Math.min(1, (performance.now() - voidFall.eyeCloseStart) / VOID_EYE_CLOSE_MS);
    }
    if (voidFall.phase === 'eyeFollow' || voidFall.phase === 'eyeClose') {
        drawGiantVoidEyeScreenCenter(1, eyeCloseP, performance.now());
    }

    ctx.save();
    const shakeTotal = transition.shake + camera.shakeLand;
    const shakeX = (Math.random() - 0.5) * shakeTotal;
    const shakeY = (Math.random() - 0.5) * shakeTotal * 0.8;
    ctx.translate(width/2 + shakeX, height/2 + shakeY); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-width/2, -height/2 - camera.y);

    // 两关都保留线条山脉（第二关会按 blend 改变配色）
    const mtH11 = height * 0.04, mtH15 = height * 0.12;
    for (let i = 0; i < 10; i++) {
        const speed = i < 6 ? 0.008 + i * 0.01 : 0.08 + (i - 6) * 0.06;
        const baseY = height - groundH - (i < 6 ? mtH15 * (0.04 + i / 5 * 0.62) : mtH11 * (0.03 + (i - 6) / 3 * 0.72));
        if (i === 3 && transition.scene2Blend < 0.01) {
            mtn01Instances.forEach(inst => {
                if (isImageReady(images.mtn01)) {
                    const mh = height * 0.13;
                    ctx.drawImage(images.mtn01, inst.x - camera.x, baseY - mh + 40, mh * (images.mtn01.width / images.mtn01.height), mh);
                }
            });
        }
        const fillC = i < 6 ? lerpColor("ededed", "f4d6dc", transition.scene2Blend) : lerpColor("f7f7f7", "f8dfe4", transition.scene2Blend);
        const strokeAlpha = i < 6 ? 0.05 + i / 5 * 0.15 : 0.3 + (i - 6) / 3 * 0.3;
        const strokeR = Math.round(60 + (190 - 60) * transition.scene2Blend);
        const strokeG = Math.round(60 + (150 - 60) * transition.scene2Blend);
        const strokeB = Math.round(60 + (160 - 60) * transition.scene2Blend);
        drawLinedMountain(speed, fillC, `rgba(${strokeR},${strokeG},${strokeB},${strokeAlpha})`, baseY, i < 6 ? 20 + i * 5 : 35, i * 1234);
        if (i === 8 && transition.scene2Blend < 0.01) {
            mtn02Instances.forEach(inst => {
                if (isImageReady(images.mtn02)) {
                    const mh2 = height * 0.25;
                    ctx.drawImage(images.mtn02, inst.x - camera.x, height - groundH - mh2 + 50, mh2 * (images.mtn02.width / images.mtn02.height), mh2);
                }
            });
        }
    }
    drawMountainTrees(mountainTreesFar, 0.58);

    romanColumns.forEach(drawRomanColumn);
    drawWindTransitionColumn();
    drawScene2SkyColumn();
    drawRampTurnpointColumnsBack();
    drawScene2RuinMid();
    drawScene2PlatformColumns();
    
    // ✨ 远景/中景武器渲染
    weapons.filter(w => w.depth > 0.3).forEach(drawWeapon);

    skyStairs.forEach(drawSkyStair);
    ctx.fillStyle = transition.scene2Blend > 0 ? lerpColor("000000", "ffffff", transition.scene2Blend) : "#000";
    ctx.fillRect(camera.x - 50000, height - groundH, 250000, height * 20);
    if (player.x >= SCENE2_RAMP_START_X - width) {
        ctx.fillStyle = "rgba(255,255,255,1)";
        ctx.beginPath();
        const startX = SCENE2_RAMP_START_X - camera.x;
        const startY = scene2RampEdgeYVisual(SCENE2_RAMP_START_X);
        const rampDrawFarX = startX + width * SCENE2_RAMP_DRAW_EXTEND;
        const rampDrawFarY = scene2RampEdgeYVisual(SCENE2_RAMP_START_X + width * SCENE2_RAMP_DRAW_EXTEND);
        const revealEase = getRampPlatformReveal01();

        // 1. 回到地平线起点深处
        ctx.moveTo(startX, height + 5000); 
        // 2. 连接到斜坡起点
        ctx.lineTo(startX, startY); 

        if (scene2Ramp.flatUnlocked && revealEase >= 0.995) {
            const flatX = scene2Ramp.flatStartX - camera.x;
            const platformExtend = width * SCENE2_RAMP_DRAW_EXTEND * revealEase;
            const platformEndX = Math.min(flatX + platformExtend, SCENE2_ARCH_BRIDGE_START_X - camera.x);
            appendRampEdgePath(ctx, SCENE2_RAMP_START_X, scene2Ramp.flatStartX);
            // 3. 连到山顶边缘
            // 4. 平地向右延伸
            ctx.lineTo(platformEndX, scene2Ramp.flatY); 
            // 5. 沉入极深地底（向右下方收尾）
            ctx.lineTo(platformEndX, height + 5000); 
        } else {
            // 还在爬坡中，画一个向右无限延伸的缓坡
            // 3. 连到远方边缘
            appendRampEdgePath(ctx, SCENE2_RAMP_START_X, SCENE2_RAMP_START_X + width * SCENE2_RAMP_DRAW_EXTEND);
            // 4. 沉入极深地底（向右下方收尾）
            ctx.lineTo(rampDrawFarX, height + 5000);
        }
        ctx.closePath();
        ctx.fill();

        // 平台从转折点缓慢“长出”，避免瞬间出现
        if (scene2Ramp.flatUnlocked && revealEase > 0.01) {
            const flatX = scene2Ramp.flatStartX - camera.x;
            const platformExtend = width * SCENE2_RAMP_DRAW_EXTEND * revealEase;
            const platformEndX = Math.min(flatX + platformExtend, SCENE2_ARCH_BRIDGE_START_X - camera.x);
            ctx.fillStyle = "rgba(255,255,255,0.98)";
            ctx.beginPath();
            ctx.moveTo(flatX, height + 5000);
            ctx.lineTo(flatX, scene2Ramp.flatY);
            ctx.lineTo(platformEndX, scene2Ramp.flatY);
            ctx.lineTo(platformEndX, height + 5000);
            ctx.closePath();
            ctx.fill();
        }

        // 斜坡内部“窗洞”细节：用背景色模拟镂空，形成可透背景的孔洞感
        const holeWorldX = SCENE2_RAMP_START_X + width * 0.9;
        const holeX = holeWorldX - camera.x;
        const holeY = scene2RampEdgeYVisual(holeWorldX) + height * 0.12;
        const holeRx = Math.max(18, width * 0.026);
        const holeRy = Math.max(34, height * 0.08);
        const holeFill = transition.scene2Blend > 0.01
            ? "rgba(236,168,176,0.95)"
            : "rgba(234,226,222,0.95)";
        ctx.fillStyle = holeFill;
        ctx.beginPath();
        ctx.ellipse(holeX, holeY, holeRx, holeRy, Math.PI * 0.25, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(210,210,216,0.6)";
        ctx.lineWidth = 1.1;
        ctx.stroke();

        // 斜坡纹理：粉灰污渍 + 裂纹线（贴近参考图的纸面破裂感）
        const rand01 = (n) => {
            const v = Math.sin(n * 127.1 + 311.7) * 43758.5453123;
            return v - Math.floor(v);
        };
        const stainCount = 10;
        for (let i = 0; i < stainCount; i++) {
            const seed = i * 13.37 + 0.71;
            const wxRaw = SCENE2_RAMP_START_X + width * (0.48 + rand01(seed) * 2.0);
            const wx = Math.min(SCENE2_RAMP_START_X + width * 2.65, wxRaw);
            const sx = wx - camera.x;
            const sy = scene2RampEdgeYVisual(wx) + height * (0.06 + rand01(seed + 2.4) * 0.13);
            const rBase = width * (0.05 + rand01(seed + 4.8) * 0.055);
            const points = 8;
            ctx.fillStyle = `rgba(206,186,194,${0.09 + rand01(seed + 1.2) * 0.08})`;
            ctx.beginPath();
            for (let p = 0; p < points; p++) {
                const a = (p / points) * Math.PI * 2;
                const jitter = 0.68 + rand01(seed + p * 2.1) * 0.68;
                const rx = rBase * (0.95 + rand01(seed + p * 1.3) * 0.45);
                const ry = rBase * (0.55 + rand01(seed + p * 1.7) * 0.35);
                const px = sx + Math.cos(a) * rx * jitter;
                const py = sy + Math.sin(a) * ry * jitter;
                if (p === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
        }

        ctx.strokeStyle = "rgba(155,137,147,0.24)";
        ctx.lineWidth = 0.9;
        const crackSeeds = [0.22, 0.41, 0.57, 0.73, 0.88];
        crackSeeds.forEach((s, i) => {
            const wx = SCENE2_RAMP_START_X + width * (0.4 + s * 1.05);
            const x0 = wx - camera.x;
            const y0 = scene2RampEdgeYVisual(wx) + height * (0.07 + (i % 3) * 0.02);
            const dir = (i % 2 === 0) ? 1 : -1;
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x0 + dir * width * 0.045, y0 - height * 0.016);
            ctx.lineTo(x0 + dir * width * 0.082, y0 + height * 0.008);
            ctx.lineTo(x0 + dir * width * 0.11, y0 - height * 0.02);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x0 + dir * width * 0.05, y0 - height * 0.004);
            ctx.lineTo(x0 + dir * width * 0.07, y0 + height * 0.02);
            ctx.stroke();
        });

        // 斜坡边缘矩形锯齿：用小矩形拼出“台阶边”质感
        const edgeEndX = (scene2Ramp.flatUnlocked && revealEase >= 0.995) ? (scene2Ramp.flatStartX - camera.x) : rampDrawFarX;
        const edgeEndY = (scene2Ramp.flatUnlocked && revealEase >= 0.995) ? scene2Ramp.flatY : rampDrawFarY;
        const edgeDx = edgeEndX - startX;
        const edgeDy = edgeEndY - startY;
        const edgeLen = Math.hypot(edgeDx, edgeDy);
        const visibleDetailLen = Math.min(edgeLen, width * 1.8);
        if (visibleDetailLen > 8) {
            const edgeAng = Math.atan2(edgeDy, edgeDx);
            ctx.save();
            ctx.translate(startX, startY);
            ctx.rotate(edgeAng);
            ctx.fillStyle = "rgba(255,255,255,0.96)";
            const toothW = 12;
            const toothH = 10;
            const toothGap = 14;
            for (let d = 0; d < visibleDetailLen; d += toothGap) {
                ctx.fillRect(d, -toothH, toothW, toothH);
            }
            ctx.restore();
        }

        // 画一条边缘线强调踩踏感
        ctx.strokeStyle = "rgba(220,220,225,0.8)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        if (scene2Ramp.flatUnlocked && revealEase >= 0.995) {
            const flatX = scene2Ramp.flatStartX - camera.x;
            const platformExtend = width * SCENE2_RAMP_DRAW_EXTEND * revealEase;
            const platformEndX = Math.min(flatX + platformExtend, SCENE2_ARCH_BRIDGE_START_X - camera.x);
            appendRampEdgePath(ctx, SCENE2_RAMP_START_X, scene2Ramp.flatStartX);
            ctx.lineTo(platformEndX, scene2Ramp.flatY);
        } else {
            appendRampEdgePath(ctx, SCENE2_RAMP_START_X, SCENE2_RAMP_START_X + width * SCENE2_RAMP_DRAW_EXTEND);
        }
        ctx.stroke();

        if (scene2Ramp.flatUnlocked && revealEase > 0.01) {
            const flatX = scene2Ramp.flatStartX - camera.x;
            const platformExtend = width * SCENE2_RAMP_DRAW_EXTEND * revealEase;
            const platformEndX = Math.min(flatX + platformExtend, SCENE2_ARCH_BRIDGE_START_X - camera.x);
            ctx.strokeStyle = "rgba(228,228,232,0.85)";
            ctx.lineWidth = 1.35;
            ctx.beginPath();
            ctx.moveTo(flatX, scene2Ramp.flatY);
            ctx.lineTo(platformEndX, scene2Ramp.flatY);
            ctx.stroke();
        }
    }
    drawArchBridge();
    drawBrokenBridgePlatforms();
    drawZFloatingPlatforms();
    drawZFloatingOrganicTrees();
    // 放在白色斜坡地形之后绘制，避免被地形填充遮住
    drawRampTurnpointSymBuilding();
    drawSnowAndFlowers();
    drawFloatingShards(false);

    const pts2 = getTerrainPoints();
    const terrainBaseY = height - groundH;
    const seamFixY = terrainBaseY + 2;
    ctx.beginPath(); ctx.moveTo(pts2.start-camera.x, terrainBaseY); ctx.lineTo(pts2.peak-camera.x, terrainBaseY-pts2.h); ctx.lineTo(pts2.end-camera.x, terrainBaseY); ctx.fill();
    const mH = terrainParams.midHill; ctx.beginPath(); ctx.moveTo(mH.x-camera.x, seamFixY); ctx.lineTo(mH.x+mH.w*0.5-camera.x, terrainBaseY-mH.h); ctx.lineTo(mH.x+mH.w-camera.x, seamFixY); ctx.fill();
    const b3 = terrainParams; ctx.beginPath(); ctx.moveTo(b3.bX3-camera.x, height-groundH); ctx.lineTo(b3.bX3+b3.peakOffset3-camera.x, height-groundH-b3.h3); ctx.lineTo(b3.bX3+b3.w3-camera.x, height-groundH); ctx.fill();
    const pts4 = getTerrain4Points(); ctx.beginPath(); ctx.moveTo(pts4.start-camera.x, height-groundH); ctx.lineTo(pts4.peak-camera.x, height-groundH-pts4.h); ctx.lineTo(pts4.end-camera.x, height-groundH); ctx.fill();

    if (isImageReady(images.building02)) ctx.drawImage(images.building02, terrainParams.b2ImageX - camera.x, height - groundH - height * 1.6 + 45, height * 1.6 * (images.building02.width / images.building02.height), height * 1.6);
    if (isImageReady(images.building03)) ctx.drawImage(images.building03, b3.bX3-camera.x, height-groundH-b3.h3*2.2+38, b3.h3*2.2*(images.building03.width/images.building03.height), b3.h3*2.2);
    
    vegetation.filter(v => !v.isForeground).forEach(drawOrganicBranch);
    drawBirdSwarm();

    // ✨ 交互粒子 1 & 2
    if (!specialOrb.finalized) { ctx.fillStyle = "#fff"; ctx.shadowBlur = 15; ctx.shadowColor = "#fff"; ctx.beginPath(); ctx.arc(6200-camera.x, height-groundH-pts2.h-50, 6+Math.sin(Date.now()*0.005)*3, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
    if (!specialOrb2.finalized) { ctx.fillStyle = "#fff"; ctx.shadowBlur = 20; ctx.shadowColor = "#fff"; ctx.beginPath(); ctx.arc(specialOrb2.x-camera.x, specialOrb2.y, 8+Math.sin(Date.now()*0.006)*4, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
    if (!debrisOrb.finalized) {
        const orbSize = 9 + Math.sin(debrisOrb.pulse) * 2.4;
        ctx.fillStyle = "#ffe9ef";
        ctx.shadowBlur = 24;
        ctx.shadowColor = "#ffd6e2";
        ctx.beginPath();
        ctx.arc(debrisOrb.x - camera.x, debrisOrb.y, orbSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    if (!platformTopOrb.finalized && scene2Ramp.flatUnlocked) {
        const orbSize = 8 + Math.sin(platformTopOrb.pulse) * 2.1;
        ctx.fillStyle = "#ff5f74";
        ctx.shadowBlur = 22;
        ctx.shadowColor = "#ff5f74";
        ctx.beginPath();
        ctx.arc(platformTopOrb.x - camera.x, platformTopOrb.y, orbSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    ringParticles.forEach(p => { ctx.globalAlpha = p.alpha; ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(p.x-camera.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
    ctx.globalAlpha = 1.0;

    if (isImageReady(images.building04)) { const bH4 = pts4.h * 2.3; ctx.drawImage(images.building04, terrainParams.bX4 - 400 - camera.x, height - groundH - bH4 + 50, bH4 * (images.building04.width/images.building04.height), bH4); }

    drawRampTopShadowAndParticles();

    const pImgs = images[player.state];
    if (pImgs && pImgs[player.frame] && isImageReady(pImgs[player.frame])) {
        const curImg = pImgs[player.frame], px = player.x-camera.x+player.width/2, py = player.y+player.height/2;
        ctx.save(); ctx.translate(px, py); ctx.rotate(player.rotation); ctx.scale(player.facing, 1); ctx.drawImage(curImg, -player.width/2, -player.height/2, player.width, player.height); ctx.restore();
    }
    drawRampTurnpointColumnsFront();
    drawFloatingShards(true);

    // ✨ 绘制身后跟随的粒子及其白线拖尾
    player.followingParticles.forEach((p, i) => {
        const pulse = Date.now() * 0.004 + (p.seed || i);
        const allWhite = player.followingParticles.length >= 4;
        const coreHue = 358 + Math.sin(pulse) * 6; // red range
        // 拖尾线
        if(p.trail.length > 2) {
            for (let j = 0; j < p.trail.length - 1; j++) {
                const aPt = p.trail[j];
                const bPt = p.trail[j + 1];
                const tSeg = j / (p.trail.length - 1); // 0:靠近粒子本体, 1:尾端
                const segAlpha = (0.62 - tSeg * 0.5) * (0.8 + 0.2 * Math.sin(pulse * 0.9));
                const segWidth = 1.2 - tSeg * 0.95; // 尾端逐渐变细
                if (segWidth <= 0.08 || segAlpha <= 0.02) continue;
                ctx.beginPath();
                ctx.moveTo(aPt.x - camera.x, aPt.y);
                ctx.lineTo(bPt.x - camera.x, bPt.y);
                ctx.strokeStyle = allWhite
                    ? `rgba(255,255,255,${segAlpha})`
                    : `hsla(${coreHue}, 96%, 68%, ${segAlpha})`;
                ctx.lineWidth = segWidth;
                ctx.shadowBlur = 8 * (1 - tSeg);
                ctx.shadowColor = allWhite
                    ? "rgba(255,255,255,0.9)"
                    : `hsla(${coreHue}, 98%, 56%, 0.9)`;
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }
        // 粒子核心
        const px = p.x - camera.x;
        const py = p.y;
        ctx.fillStyle = allWhite ? "rgba(255,255,255,0.98)" : `hsla(${coreHue}, 98%, 70%, 0.98)`;
        ctx.shadowBlur = 16;
        ctx.shadowColor = allWhite ? "rgba(255,255,255,0.98)" : `hsla(${coreHue}, 98%, 56%, 0.98)`;
        ctx.beginPath(); ctx.arc(px, py, 4.2, 0, Math.PI*2); ctx.fill();
        // 红色能量外环
        ctx.strokeStyle = allWhite ? "rgba(255,255,255,0.62)" : `hsla(${coreHue + 8}, 98%, 66%, 0.62)`;
        ctx.lineWidth = 0.9;
        ctx.beginPath(); ctx.arc(px, py, 6.8 + Math.sin(pulse * 1.6) * 0.9, 0, Math.PI*2); ctx.stroke();
        ctx.shadowBlur = 0;
    });

    vegetation.filter(v => v.isForeground).forEach(drawOrganicBranch);
    drawMountainTrees(mountainTreesNear, 0.82);
    
    // ✨ 前景武器渲染
    weapons.filter(w => w.depth <= 0.3).forEach(drawWeapon);

    if (transition.scene2Blend < 0.01) {
        stones.sort((a,b)=>b.depth-a.depth).forEach(rock => {
            const rx = rock.x-camera.x, ry = getGroundHeight(rock.x, 9999); if(rx<-300||rx>width+300) return;
            const base = Math.round(25 + rock.depth * 105);
            ctx.save(); ctx.translate(rx, ry); ctx.scale(rock.scale, rock.scale); ctx.fillStyle = `rgb(${base},${base},${base})`;
            ctx.beginPath(); ctx.moveTo(rock.points[0].x, rock.points[0].y); rock.points.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.fill(); ctx.restore();
        });
    }
    if (isImageReady(images.ruinsDebris)) { const rdH = 600; ctx.drawImage(images.ruinsDebris, terrainParams.bX5 - camera.x, getGroundHeight(terrainParams.bX5, 9999) - rdH + 10, rdH * (images.ruinsDebris.width / images.ruinsDebris.height), rdH); }
    if (isImageReady(images.hand)) { const hh = height*0.45; ctx.drawImage(images.hand, 1500-camera.x, height-groundH-hh+10, hh*(images.hand.width/images.hand.height), hh); }
    ctx.restore();
    drawWindDebugHUD();
}

loadImages();
</script>
</body>
