            r: 14 + i * 22,
            dr: 9.2 + i * 2.1,
            alpha: 0.86 - i * 0.1,
            lineW: 1.3 - i * 0.1,
            delay: i * 5
        });
    }
    for (let i = 0; i < 6; i++) {
        expansionRings.push({
            x: endingLoreEvent.x,
            y: endingLoreEvent.y,
            r: 10 + i * 14,
            dr: 1.2 + i * 0.45,
            alpha: 0.78 - i * 0.1,
            lineW: 2.4 - i * 0.22
        });
    }
}

function updateLoreEvents() {
    const bridgeOrb = getBrokenBridgeLoreOrbPos();
    bridgeLoreEvent.x = bridgeOrb.x;
    bridgeLoreEvent.y = bridgeOrb.y;
    bridgeLoreEvent.pulse += 0.06;
    if (!bridgeLoreEvent.triggered && !endingLoreEvent.active) {
        const dx = player.x + player.width * 0.5 - bridgeLoreEvent.x;
        const dy = player.y + player.height * 0.5 - bridgeLoreEvent.y;
        if (!player.grounded && Math.abs(dx) < 70 && Math.abs(dy) < 72 && player.x >= SCENE2_BROKEN_PLATFORM_START_X - 120) {
            startBridgeLoreEvent();
        }
    }

    const endOrb = getEndpointLoreOrbPos();
    endingLoreEvent.x = endOrb.x;
    endingLoreEvent.y = endOrb.y;
    endingLoreEvent.pulse += 0.05;
    if (!endingLoreEvent.triggered && !bridgeLoreEvent.active) {
        const dx = player.x + player.width * 0.5 - endingLoreEvent.x;
        const dy = player.y + player.height * 0.5 - endingLoreEvent.y;
        const fp = getEndpointTwinStatueLayout().statue1.forearmPlatform;
        const forearmDrawY = fp.y + FOREARM_PLATFORM_DRAW_OFFSET_Y;
        const feetY = player.y + player.height;
        const inForearmZoneX = Math.abs((player.x + player.width * 0.5) - fp.x) < fp.w * 0.72;
        const inForearmZoneY = feetY >= (forearmDrawY - 120) && feetY <= (forearmDrawY + 96);
        const inForearmZone = inForearmZoneX && inForearmZoneY;
        if (inForearmZone && Math.abs(dx) < 112 && Math.abs(dy) < 148 && giantStatueEvent.active) {
            startEndingLoreEvent();
        }
    }

    const stepReveal = (evt, holdThenDone) => {
        if (!evt.active) return;
        player.inputLocked = true;
        player.vx = 0;
        player.vy = 0;
        lockCameraForLore(evt);
        if (evt.phase === 'reveal') {
            evt.revealTick += 1;
            if (evt.revealTick >= 2) {
                evt.revealTick = 0;
                const line = evt.lines[evt.revealLine] || '';
                evt.revealChar++;
                if (evt.revealChar > line.length) {
                    evt.revealLine++;
                    evt.revealChar = 0;
                    if (evt.revealLine >= evt.lines.length) {
                        evt.revealLine = evt.lines.length;
                        evt.phase = holdThenDone ? 'hold' : 'done';
                    }
                }
            }
        } else if (evt.phase === 'hold') {
            evt.holdFrames -= 1;
            if (evt.holdFrames <= 0) {
                evt.phase = 'done';
            }
        }
    };

    stepReveal(bridgeLoreEvent, true);
    if (bridgeLoreEvent.active && bridgeLoreEvent.phase === 'done') {
        bridgeLoreEvent.active = false;
        player.inputLocked = false;
    }

    if (endingLoreEvent.active) {
        player.inputLocked = true;
        player.vx = 0;
        player.vy = 0;
        lockCameraForLore(endingLoreEvent);
        if (endingLoreEvent.phase === 'white') {
            endingLoreEvent.whiteFade = Math.min(1, endingLoreEvent.whiteFade + 0.014);
            if (endingLoreEvent.whiteFade >= 1) {
                endingLoreEvent.phase = 'reveal';
                endingLoreEvent.revealLine = 0;
                endingLoreEvent.revealChar = 0;
                endingLoreEvent.revealTick = 0;
            }
        } else {
            endingLoreEvent.displayFade = Math.min(1, endingLoreEvent.displayFade + 0.01);
            stepReveal(endingLoreEvent, false);
            if (endingLoreEvent.phase === 'done') {
                if (endingLoreEvent.doneHoldFrames <= 0) endingLoreEvent.doneHoldFrames = 300; // 5s @ 60fps
                endingLoreEvent.doneHoldFrames -= 1;
                if (endingLoreEvent.doneHoldFrames <= 0) {
                    endingLoreEvent.phase = 'mainTextFadeOut';
                }
            } else if (endingLoreEvent.phase === 'mainTextFadeOut') {
                endingLoreEvent.textFade = Math.max(0, endingLoreEvent.textFade - 0.02);
                if (endingLoreEvent.textFade <= 0.001) {
                    endingLoreEvent.phase = 'creditsFadeIn';
                    endingLoreEvent.creditsFade = 0;
                    endingLoreEvent.creditsHoldFrames = 420; // 7s @ 60fps
                }
            } else if (endingLoreEvent.phase === 'creditsFadeIn') {
                endingLoreEvent.creditsFade = Math.min(1, endingLoreEvent.creditsFade + 0.02);
                if (endingLoreEvent.creditsFade >= 0.999) {
                    endingLoreEvent.phase = 'creditsHold';
                }
            } else if (endingLoreEvent.phase === 'creditsHold') {
                endingLoreEvent.creditsHoldFrames -= 1;
                if (endingLoreEvent.creditsHoldFrames <= 0) {
                    endingLoreEvent.phase = 'creditsFadeOut';
                }
            } else if (endingLoreEvent.phase === 'creditsFadeOut') {
                endingLoreEvent.creditsFade = Math.max(0, endingLoreEvent.creditsFade - 0.02);
                if (endingLoreEvent.creditsFade <= 0.001) {
                    endingLoreEvent.phase = 'logo';
                }
            } else if (endingLoreEvent.phase === 'logo') {
                endingLoreEvent.logoFade = Math.min(1, endingLoreEvent.logoFade + 0.02);
            }
        }
        if (endingLoreEvent.phase === 'logo') {
            showEndingActionButton(true);
        }
    } else {
        showEndingActionButton(false);
    }
}

function getLoreVisibleLines(evt) {
    const out = [];
    const fullLines = Math.max(0, evt.revealLine);
    for (let i = 0; i < Math.min(evt.lines.length, fullLines); i++) out.push(evt.lines[i]);
    if (evt.revealLine < evt.lines.length) {
        out.push(evt.lines[evt.revealLine].slice(0, Math.max(0, evt.revealChar)));
    }
    return out;
}

function drawLoreOverlay() {
    const drawTextBlock = (lines, baseY, color = '#ffffff', shadow = 'rgba(255,255,255,0.45)', alphaMul = 1) => {
        if (!lines.length) return;
        const drawSpacedCenteredText = (text, x, y, spacing) => {
            if (!text || spacing <= 0) {
                ctx.fillText(text, x, y);
                return;
            }
            let totalW = 0;
            for (let k = 0; k < text.length; k++) {
                totalW += ctx.measureText(text[k]).width;
            }
            totalW += Math.max(0, text.length - 1) * spacing;
            let cursorX = x - totalW * 0.5;
            for (let k = 0; k < text.length; k++) {
                const ch = text[k];
                ctx.fillText(ch, cursorX, y);
                cursorX += ctx.measureText(ch).width + spacing;
            }
        };
        ctx.save();
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = color;
        ctx.shadowBlur = 6;
        ctx.shadowColor = shadow;
        const lineGap = 52; // 缩小行距
        const charSpacing = 1.2; // 轻微增大字间距
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const alpha = Math.min(1, 0.32 + i * 0.14);
            ctx.globalAlpha = alpha * alphaMul;
            ctx.font = "100 22px 'Microsoft YaHei'";
            drawSpacedCenteredText(line, width * 0.5, baseY + i * lineGap, charSpacing);
        }
        ctx.restore();
    };
    const drawEndingGeometricRings = (cx, cy, alphaMul) => {
        const ringCount = 3;
        const now = performance.now() * 0.001;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.lineWidth = 0.5;
        ctx.shadowBlur = 2;
        ctx.shadowColor = `rgba(0,0,0,${0.18})`;

        for (let i = 0; i < ringCount; i++) {
            const radiusBase = (34 + i * 20) * 9;
            const breathAmp = 18 + i * 6;
            const breath = Math.sin(now * 1.08 + i * 0.75) * breathAmp;
            const radius = radiusBase + breath;
            const alphaBreath = 0.32 + 0.14 * (0.5 + 0.5 * Math.sin(now * 1.08 + i * 0.75));

            // odd: clockwise, even: counterclockwise
            const dir = (i % 2 === 1) ? 1 : -1;
            const rot = dir * now * (0.018 + i * 0.004); // very slow

            ctx.save();
            ctx.rotate(rot);
            ctx.strokeStyle = `rgba(0,0,0,${alphaBreath})`;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
        ctx.restore();
    };

    if (bridgeLoreEvent.active) {
        const lines = getLoreVisibleLines(bridgeLoreEvent);
        drawTextBlock(lines, height * 0.17);
    }

    if (endingLoreEvent.active) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, endingLoreEvent.whiteFade));
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);
        ctx.restore();
        if (endingLoreEvent.phase !== 'white') {
            const bg = images.ui_ending_screen_01;
            if (isImageReady(bg)) {
                ctx.save();
                ctx.globalAlpha = endingLoreEvent.displayFade;
                ctx.drawImage(bg, 0, 0, width, height);
                ctx.restore();
            }
            const cx = width * 0.5;
            const cy = height * 0.5;
            const textAlpha = endingLoreEvent.displayFade * endingLoreEvent.textFade;
            drawEndingGeometricRings(cx, cy, 1);
            const lines = getLoreVisibleLines(endingLoreEvent);
            drawTextBlock(lines, height * 0.32, '#111111', 'rgba(0,0,0,0.24)', textAlpha);
            const creditsAlpha = endingLoreEvent.displayFade * endingLoreEvent.creditsFade;
            drawTextBlock(
                endingLoreEvent.creditsLines,
                height * 0.42,
                '#111111',
                'rgba(0,0,0,0.24)',
                creditsAlpha
            );
            const logo = images.ui_ending_logo_01;
            if (isImageReady(logo) && endingLoreEvent.logoFade > 0.001) {
                const logoW = logo.width / 3;
                const logoH = logo.height / 3;
                const logoX = width * 0.5 - logoW * 0.5;
                const logoY = height * 0.5 - logoH * 0.5;
                ctx.save();
                ctx.globalAlpha = endingLoreEvent.logoFade * endingLoreEvent.displayFade;
                ctx.drawImage(logo, logoX, logoY, logoW, logoH);
                ctx.restore();
            }
        }
    }
}

function togglePause() {
    if (gameState === 'MENU') return;
    if (gameState === 'PLAYING') {
        gameState = 'PAUSED';
        refreshPauseScreenUI();
        document.getElementById('pause-screen').style.display = 'flex';
        if (pauseUI.ringsRAF) cancelAnimationFrame(pauseUI.ringsRAF);
        pauseUI.ringsRAF = requestAnimationFrame(pauseScreenLoop);
    } else {
        gameState = 'PLAYING';
        document.getElementById('pause-screen').style.display = 'none';
        if (pauseUI.ringsRAF) {
            cancelAnimationFrame(pauseUI.ringsRAF);
            pauseUI.ringsRAF = 0;
        }
        scheduleGameLoop();
    }
}

function resize() {
    const targetRatio = LOGIC_W / LOGIC_H;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let nextW = vw;
    let nextH = Math.floor(vw / targetRatio);
    if (nextH > vh) {
        nextH = vh;
        nextW = Math.floor(vh * targetRatio);
    }
    const displayX = Math.floor((vw - nextW) * 0.5);
    const displayY = Math.floor((vh - nextH) * 0.5);

    // 固定逻辑尺寸 + 3x 渲染像素密度
    width = LOGIC_W;
    height = LOGIC_H;
    canvas.width = Math.round(LOGIC_W * RENDER_SCALE);
    canvas.height = Math.round(LOGIC_H * RENDER_SCALE);
    canvas.style.width = `${nextW}px`;
    canvas.style.height = `${nextH}px`;
    applyStartScreenLayout(displayX, displayY, nextW, nextH);
    syncWindOverlayRect();
    syncWindVideoRect();
    syncLeafFallVideoRect();
    if (gameState === 'PAUSED') drawPauseRings(performance.now());

    groundH = LOGIC_H * 0.08;
    playerH = LOGIC_H * 0.11;
    player.height = playerH; player.width = playerH * 0.85;
    updateAudioDebug();
}

const audioRegistry = {
    unlocked: false,
    bgmEls: {},
    bgmBaseVolume: {},
    activeBgmKeys: [],
    sfxMap: {},
    currentBgmKey: '',
    missing: [],
    reportMissing(kind, key, src) {
        const token = `${kind}:${key}:${src}`;
        if (this.missing.includes(token)) return;
        this.missing.push(token);
        const short = this.missing.slice(-2).join(' || ');
        updateAudioDebug(`missing ${short}`);
    },
    init() {
        Object.entries(AUDIO_MANIFEST.bgm).forEach(([key, src]) => {
            const el = new Audio(src);
            el.loop = true;
            el.preload = 'auto';
            const baseVol = this.getBgmBaseVolume(key);
            el.volume = baseVol;
            this.bgmBaseVolume[key] = baseVol;
            el.addEventListener('error', () => this.reportMissing('bgm', key, src));
            this.bgmEls[key] = el;
        });
        Object.entries(AUDIO_MANIFEST.sfx).forEach(([key, sources]) => {
            const list = Array.isArray(sources) ? sources : [sources];
            this.sfxMap[key] = list.map((src, idx) => {
                const el = new Audio(src);
                el.preload = 'auto';
                el.volume = 0.85;
                if (key === 'run_step') el.volume = 0.1375;
                el.addEventListener('error', () => this.reportMissing('sfx', `${key}[${idx}]`, src));
                return el;
            });
        });
    },
    unlock() {
        this.unlocked = true;
    },
    getBgmBaseVolume(key) {
        if (key === 'scene1_layer2') return 0.42;
        if (key === 'transition_scene2') return 0.3;
        return 0.65;
    },
    fadeBgmTo(key, targetVol, durationMs, stopWhenZero) {
        const el = this.bgmEls[key];
        if (!el) return;
        const fadeId = (el._fadeId = (el._fadeId || 0) + 1);
        const myId = fadeId;
        const startVol = el.volume;
        const startAt = performance.now();
        const step = () => {
            if (el._fadeId !== myId) return;
            const t = Math.min(1, (performance.now() - startAt) / Math.max(1, durationMs));
            el.volume = startVol + (targetVol - startVol) * t;
            if (t < 1) {
                requestAnimationFrame(step);
            } else if (stopWhenZero && targetVol <= 0.001) {
                el.pause();
                el.currentTime = 0;
            }
        };
        step();
    },
    playBgm(key) {
        if (!this.unlocked) return false;
        const targetKeys = key === 'scene1_main' ? ['scene1_main', 'scene1_layer2'] : [key];
        const nextKeys = targetKeys.filter((k) => !!this.bgmEls[k]);
        if (!nextKeys.length) return false;
        const sameSet = this.activeBgmKeys.length === nextKeys.length && this.activeBgmKeys.every((k) => nextKeys.includes(k));
        if (sameSet) return false;
        const prevKeys = [...this.activeBgmKeys];
        prevKeys.forEach((k) => this.fadeBgmTo(k, 0, 850, true));
        this.activeBgmKeys = [...nextKeys];
        this.currentBgmKey = key;
        nextKeys.forEach((k) => {
            const el = this.bgmEls[k];
            const baseVol = this.bgmBaseVolume[k] ?? this.getBgmBaseVolume(k);
            el.volume = 0.001;
            el.currentTime = 0;
            el.play().catch(() => {});
            this.fadeBgmTo(k, baseVol, 1200, false);
        });
        return true;
    },
    ensureActiveBgmPlaying() {
        if (!this.unlocked || !this.activeBgmKeys.length) return;
        this.activeBgmKeys.forEach((k) => {
            const el = this.bgmEls[k];
            if (!el) return;
            if (el.paused) {
                el.play().catch(() => {});
            }
        });
    },
    playSfx(key) {
        if (!this.unlocked) return false;
        const pool = this.sfxMap[key];
        if (!pool || !pool.length) return false;
        const base = pool[Math.floor(Math.random() * pool.length)];
        const el = base.cloneNode();
        el.volume = base.volume;
        el.play().catch(() => {});
        return true;
    }
};

function updateAudioDebug(extra = '') {

function initAudioSystem() {
    if (audioSys.ready) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) {
        updateAudioDebug('AudioContext unsupported');
        return;
    }
    audioSys.ctx = new AC();
    audioSys.master = audioSys.ctx.createGain();
    audioSys.musicGain = audioSys.ctx.createGain();
    audioSys.sfxGain = audioSys.ctx.createGain();
    audioSys.reverb = createReverb(audioSys.ctx, 2.8, 2.2);
    audioSys.master.gain.value = 0.92;
    audioSys.musicGain.gain.value = 0.34;
    audioSys.sfxGain.gain.value = 0.5;
    audioSys.musicGain.connect(audioSys.master);
    audioSys.sfxGain.connect(audioSys.master);
    audioSys.musicGain.connect(audioSys.reverb);
    audioSys.reverb.connect(audioSys.master);
    audioSys.master.connect(audioSys.ctx.destination);

    // Eb major ambient pad (Eb + Bb), slowly breathing.
    audioSys.padGain = audioSys.ctx.createGain();
    audioSys.padGain.gain.value = 0.0001;
    audioSys.padGain.connect(audioSys.musicGain);
    const padA = audioSys.ctx.createOscillator();
    const padB = audioSys.ctx.createOscillator();
    padA.type = 'triangle';
    padB.type = 'sine';
    padA.frequency.value = 155.56; // Eb3
    padB.frequency.value = 233.08; // Bb3
    padA.connect(audioSys.padGain);
    padB.connect(audioSys.padGain);
    padA.start();
    padB.start();
    audioSys.padOscA = padA;
    audioSys.padOscB = padB;

    audioSys.pianoGain = audioSys.ctx.createGain();
    audioSys.celloGain = audioSys.ctx.createGain();
    audioSys.pianoGain.gain.value = 0.0001;
    audioSys.celloGain.gain.value = 0.0001;
    audioSys.pianoGain.connect(audioSys.musicGain);
    audioSys.celloGain.connect(audioSys.musicGain);

    audioSys.ready = true;
    rampParam(audioSys.padGain.gain, 0.22, 1.8);
    updateAudioDebug('initialized');
}

function createReverb(ctx, seconds, decay) {
    const len = Math.floor(ctx.sampleRate * seconds);
    const impulse = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
        const data = impulse.getChannelData(ch);
        for (let i = 0; i < len; i++) {
            const t = i / len;
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
        }
    }
    const conv = ctx.createConvolver();
    conv.buffer = impulse;
    return conv;
}

function rampParam(param, value, time = 0.12) {
    const t = audioSys.ctx.currentTime;
    param.cancelScheduledValues(t);
    param.setTargetAtTime(value, t, Math.max(0.02, time * 0.35));
}

function playSfx(freq = 440, duration = 0.16, volume = 0.18, type = 'sine', detune = 0) {
    if (!audioSys.ready || !audioSys.unlocked || !audioSys.ctx) return;
    const t = audioSys.ctx.currentTime;
    const osc = audioSys.ctx.createOscillator();
    const gain = audioSys.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    osc.detune.value = detune;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.connect(gain);
    gain.connect(audioSys.sfxGain);
    osc.start(t);
    osc.stop(t + duration + 0.02);
}

function playPianoNote(freq, gainMul = 1) {
    if (!audioSys.ready || !audioSys.unlocked || !audioSys.ctx) return;
    const t = audioSys.ctx.currentTime;
    const osc = audioSys.ctx.createOscillator();
    const g = audioSys.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.09 * gainMul, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.2);
    osc.connect(g);
    g.connect(audioSys.pianoGain);
    g.connect(audioSys.reverb);
    osc.start(t);
    osc.stop(t + 1.25);
}

function pulseCello(freq = 77.78) { // Eb2
    if (!audioSys.ready || !audioSys.unlocked || !audioSys.ctx) return;
    const t = audioSys.ctx.currentTime;
    const osc = audioSys.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    const lp = audioSys.ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 260;
    const g = audioSys.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.08, t + 0.08);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.5);
    osc.connect(lp);
    lp.connect(g);
    g.connect(audioSys.celloGain);
    g.connect(audioSys.reverb);
    osc.start(t);
    osc.stop(t + 1.6);
}

function updateMusicLayers() {
    if (!audioRegistry.unlocked) return;
    if (transition.scene2Blend > 0.08 && transition.scene2Blend < 0.98) {
        audioRegistry.playBgm('transition_scene2');
    } else if (transition.scene2Blend >= 0.98 || player.x >= SCENE2_RAMP_START_X - 200) {
        audioRegistry.playBgm('scene2_main');
    } else {
        audioRegistry.playBgm('scene1_main');
    }
    audioRegistry.ensureActiveBgmPlaying();
}

function unlockAudioSystem() {
    audioRegistry.unlock();
    updateAudioDebug('unlocked');
}

window.addEventListener('pointerdown', unlockAudioSystem);
window.addEventListener('keydown', unlockAudioSystem);
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
        audioRegistry.ensureActiveBgmPlaying();
    }
});

function tryStartVoidFall(topStair) {
    // 按需求移除“通天�?-> 下坠 -> 第二关地面”的过渡触发
    return;
}

function update() {
    gameLoopRAF = 0;
    if (gameState !== 'PLAYING') return;
    updateMusicLayers();

    if (!skyCurtain.active && player.x >= SCENE2_ARCH_BRIDGE_START_X - 80) {
        skyCurtain.active = true;
        skyCurtain.startX = player.x;
        skyCurtain.startedAt = performance.now();
    }

    if (player.x >= SCENE2_RAMP_START_X) {
        const rampNow = performance.now();
        if (!scene2Ramp.started) {
            scene2Ramp.started = true;
            scene2Ramp.startAt = rampNow;
            scene2Ramp.lastTick = rampNow;
            scene2Ramp.lastX = player.x;
        } else if (!scene2Ramp.flatUnlocked) {
            // 只统计“持续向前爬坡”的时间：中途停下不计时
            const dtMs = Math.max(0, rampNow - (scene2Ramp.lastTick || rampNow));
            const dx = player.x - (scene2Ramp.lastX || player.x);
            const inputForward = !!(keys['ArrowRight'] || keys['KeyD']);
            const climbingForward = dx > 0.015 && (inputForward || player.vx > 0.02);
            if (climbingForward) scene2Ramp.climbAccumMs += dtMs;
            scene2Ramp.lastTick = rampNow;
            scene2Ramp.lastX = player.x;

            if (scene2Ramp.climbAccumMs >= SCENE2_RAMP_RUN_MS) {
                scene2Ramp.flatUnlocked = true;
                scene2Ramp.unlockedAt = rampNow;
                scene2Ramp.flatStartX = player.x; // 20秒到达的当前位置就是平地起点
                // 计算 45 度角的当前 Y 高度
                scene2Ramp.flatY = scene2RampEdgeY(player.x);
                // 清除可能在 flatUnlocked=false 时提前生成的旧平台（高度错误），
                // 下一帧 ensureBrokenBridgePlatforms 将按正确的 flatY 重新生成
                brokenBridgePlatforms = [];
            }
        }
    }
    ensureScene2PlatformDecor();
    if (transition.scene2Blend > 0.01 || player.x >= SCENE2_BROKEN_PLATFORM_START_X - 800) {
        ensureBrokenBridgePlatforms();
    }
    if (transition.scene2Blend > 0.01 || player.x >= SCENE2_Z_FLOAT_START_X - 900) {
        ensureZFloatingPlatforms();
    }
    updateGiantStatueEvent();
    updateGiantStardustPath();
    if (player.x >= SCENE2_Z_FLOAT_START_X - 60 && (!lateStageCheckpoint.valid || lateStageCheckpoint.x < SCENE2_Z_FLOAT_START_X - 20)) {
        const zEntry = getZFloatingEntryCheckpoint();
        lateStageCheckpoint.x = zEntry.x;
        lateStageCheckpoint.y = zEntry.y;
        lateStageCheckpoint.valid = true;
    }
    updateZOrganicTrees();

    tryStartWindTransition();
    updateWindTransition();
    updateAmbientWindBurst(performance.now());
    updateLeafFallVideoEvent(performance.now());
    updateB3TreeVideoEvent();

    updateLandingFxDust();
    updateDownhillDustFx();

    const topStair = skyStairs.find(s => s.isTop);
    const inVoidFall = voidFall.phase === 'falling';
    if (topStair && !windTransition.touchedStairTop) {
        const nearTop = Math.abs(player.x - topStair.x) < topStair.w * 0.55;
        const footY = player.y + player.height;
        if (nearTop && Math.abs(footY - topStair.y) < 46) windTransition.touchedStairTop = true;
    }
    if (!windTransition.armedAfterDrop) {
        const footY = player.y + player.height;
        const droppedFromTop = topStair && windTransition.touchedStairTop && player.grounded && footY > topStair.y + 140;
        const fallbackProgress = player.x > terrainParams.stairX + 920 && player.grounded;
        if (droppedFromTop || fallbackProgress) windTransition.armedAfterDrop = true;
    }

    let moving = false;
    const jumpDown = !!(keys['Space'] || keys['ArrowUp'] || keys['KeyW']);
    const jumpPressed = jumpDown && !jumpPressedLast;
    jumpPressedLast = jumpDown;
    const ambientSlowMul = 1;
    if (!player.inputLocked && !inVoidFall) {
        const caveSpeedMul = isPlayerInScene1Cave() ? 1.22 : 1;
        if (keys['ArrowRight'] || keys['KeyD']) { player.vx += player.accel * ambientSlowMul * caveSpeedMul; player.facing = 1; moving = true; }
        if (keys['ArrowLeft'] || keys['KeyA']) { player.vx -= player.accel * ambientSlowMul * caveSpeedMul; player.facing = -1; moving = true; }
        if (jumpPressed && player.jumpCount < player.maxJumps) {
            player.vy = player.jumpForce;
            player.grounded = false;
            player.jumpCount++;
            playJumpWhoosh();
        }
    }

    // Magical footsteps on sky stairs / ramp when grounded and moving.
    const movingHoriz = Math.abs(player.vx) > 0.5;
    const onStairLike = player.x >= terrainParams.stairX - 80 && player.x < SCENE2_BROKEN_PLATFORM_START_X;
    const isScene1 = transition.scene2Blend < 0.01;
    if (isScene1 && player.grounded && movingHoriz && onStairLike && audioRegistry.unlocked) {
        const beatStep = (60 / 85) * 0.5;
        const nowSec = performance.now() / 1000;
        if (nowSec >= audioSys.nextFootstepAt) {
            audioSys.nextFootstepAt = nowSec + beatStep;
            playMagicalFootstep();
        }
    }
    // 第二关禁用人物跑步/脚步音效，仅第一关保留此段楼梯魔法脚步声

    if (inVoidFall) {
        const elapsed = performance.now() - voidFall.startTime;
        const dt = 1 / 60;
        const footY = player.y + player.height;
        const realG = shapeCastGroundAtFeet(player.x, player.y, footY, player.width * 0.32);
        const rise = voidFall.risePad * Math.max(0, 1 - elapsed / VOID_FALL_MS);
        const effectiveG = realG + rise;

        camera.targetZoom = 1;
        camera.zoom = 1;
        camera.targetY = camera.y;

        if (voidFall.fallState === 'freeFall') {
            player.vx *= 0.93;
            player.x += player.vx;
            player.vy = Math.min(player.vy + VOID_GRAVITY, VOID_TERM_VELOCITY);
            player.y += player.vy;
            player.grounded = false;

            if (footY >= effectiveG - 1.5 && player.vy >= -0.5) {
                player.y = effectiveG - player.height;
                player.vy = 0;
                voidFall.fallState = 'hardLanding';
                voidFall.hardLandAt = performance.now();
                triggerVoidLandingEvent(player.x + player.width * 0.5, effectiveG);
            }
            if (elapsed >= VOID_FALL_MS - 40 && voidFall.fallState === 'freeFall') {
                player.y = realG - player.height;
                player.vy = 0;
                voidFall.fallState = 'hardLanding';
                voidFall.hardLandAt = performance.now();
                triggerVoidLandingEvent(player.x + player.width * 0.5, realG);
            }

            if (elapsed >= VOID_BG1_START_MS) transition.scene2Blend = 1;
            updateVoidLineMeteors(player.vy);
            updateVoidCapeChain();

            const camT = Math.min(1, elapsed / 620);
            const camEase = camT * camT * (3 - 2 * camT);
            const targetCamX = voidFall.camStartX + (player.x + player.width * 0.5 - width * 0.5 - voidFall.camStartX) * camEase;
            const targetCamYBase = voidFall.camStartY + (player.y + player.height * 0.5 - height * 0.5 - voidFall.camStartY) * camEase;
            const lookaheadY = Math.min(72, Math.max(0, player.vy * VOID_CAM_LOOKAHEAD_Y));
            const targetCamY = targetCamYBase + lookaheadY;
            const dampY = smoothDampScalarY(camera.y, targetCamY, voidFall.camVelY, VOID_CAM_SMOOTH_TIME, dt);
            camera.y = dampY.pos;
            voidFall.camVelY = dampY.vel;
            camera.x = targetCamX;
        } else if (voidFall.fallState === 'hardLanding') {
            player.vx *= 0.9;
            player.grounded = true;
            updateVoidLineMeteors(5);
            updateVoidCapeChain();
            const targetCamX = player.x + player.width * 0.5 - width * 0.5;
            const targetCamY = player.y + player.height * 0.5 - height * 0.5;
            const dampY = smoothDampScalarY(camera.y, targetCamY, voidFall.camVelY, VOID_CAM_LAND_SMOOTH_TIME, dt);
            camera.y = dampY.pos;
            voidFall.camVelY = dampY.vel;
            camera.x = targetCamX;
            if (performance.now() - voidFall.hardLandAt >= HARD_LANDING_MS) {
                voidFall.fallState = 'recoverStand';
                voidFall.recoverAt = performance.now();
            }
        } else if (voidFall.fallState === 'recoverStand') {
            player.vx *= 0.92;
            player.grounded = true;
            updateVoidLineMeteors(4);
            updateVoidCapeChain();
            const targetCamX = player.x + player.width * 0.5 - width * 0.5;
            const targetCamY = player.y + player.height * 0.5 - height * 0.5;
            const dampY = smoothDampScalarY(camera.y, targetCamY, voidFall.camVelY, VOID_CAM_LAND_SMOOTH_TIME, dt);
            camera.y = dampY.pos;
            voidFall.camVelY = dampY.vel;
            camera.x = targetCamX;
            if (performance.now() - voidFall.recoverAt >= RECOVER_STAND_MS) {
                voidFall.phase = 'eyeFollow';
                voidFall.fallState = 'idle';
                transition.scene2Blend = 1;
                player.y = shapeCastGroundAtFeet(player.x, player.y, player.y + player.height, player.width * 0.32) - player.height;
                player.vy = 0;
                player.vx *= 0.42;
                player.grounded = true;
                player.inputLocked = false;
                voidFall.prevPlayerX = player.x;
                voidFall.eyeFollowDist = 0;
                voidFall.camVelY = 0;
            }
        }
    } else {
        player.vx *= friction; player.vy += gravity; player.x += player.vx; player.y += player.vy;
        tryStartVoidFall(topStair);
        if (voidFall.phase !== 'falling') {
            // 激活前不进入”硬防坠”模式，避免终点平台处悬浮影响起跳触碰锚
            const inGiantGuide = giantStatueEvent.active && giantStatueEvent.activated && !giantStatueEvent.finalJumpStarted;
            // 路径行走期：�?activated 解耦（落地�?activated �?false，仍须贴合星尘路径直�?completed
            const inStardustWalk = giantStatueEvent.active && giantStatueEvent.finalJumpStarted && !giantStatueEvent.completed;
            // 断桥/悬浮平台区域使用脚底多点采样，避免在平台边缘单点判定坠落
            const inLateSceneDanger = inGiantGuide || inStardustWalk || player.x >= SCENE2_BROKEN_PLATFORM_START_X - 120;
            const currentGround = inLateSceneDanger
                ? shapeCastGroundAtFeet(
                    player.x + player.vx * 0.1,
                    player.y,
                    player.y + player.height,
                    player.width * 0.36
                )
                : getGroundHeight(player.x, player.y);
            if (inGiantGuide) {
                // 引导期间硬防坠落：只要进入导引状态，始终锁定在可站立高度之上
                const safeGround = Number.isFinite(currentGround) && currentGround < height + 1200
                    ? currentGround
                    : (giantStatueEvent.pathPoints[0]?.y ?? (height - groundH));
                if (player.y + player.height >= safeGround - 6) {
                    player.y = safeGround - player.height;
                    player.vy = 0;
                    player.grounded = true;
                } else if (player.vy > 0) {
                    // 向下速度在引导期钳制，防止单帧判空造成坠落
                    player.vy = 0;
                }
            } else if (inStardustWalk) {
                // 星尘路径行走期间：强制跟随路径斜面，避免陡坡脱离导致人物漂浮
                const probeX = player.x + player.width * 0.5 + player.vx * 0.35;
                const roadY = getStardustRoadY(probeX);
                const footY = player.y + player.height;
                const canMagnetToRoad = roadY != null && (player.vy > -4.5 || footY > roadY + 2);
                if (canMagnetToRoad) {
                    // 贴合路径：陡坡单帧下落过大时也拉回，避免“看得见线却踩不上
                    player.y = roadY - player.height;
                    player.vy = 0;
                    player.grounded = true;
                } else if (player.y + player.height > currentGround) {
                    player.y = currentGround - player.height;
                    player.vy = 0; player.grounded = true;
                } else {
                    player.grounded = false;
                }
            } else if (player.y + player.height > currentGround) {
                player.y = currentGround - player.height;
                player.vy = 0; player.grounded = true;
            } else {
                player.grounded = false;
            }
        }
    }

    if (player.grounded) {
        player.jumpCount = 0;
        // 后段关卡记录最近安全站立点：踩空后可立即回退
        if (player.x >= SCENE2_BROKEN_PLATFORM_START_X - 120) {
            lateStageCheckpoint.x = player.x;
            lateStageCheckpoint.y = player.y;
            lateStageCheckpoint.valid = true;
        }
    }

    // 新逻辑：后段踩空后不持续下坠，直接回退到上一个安全坐
    const inLateStage = player.x >= SCENE2_BROKEN_PLATFORM_START_X + 220;
    const inZFloatStage = player.x >= SCENE2_Z_FLOAT_START_X - 80;
    if (!inVoidFall && inLateStage && lateStageCheckpoint.valid && !player.grounded && player.vy > 0 && !(giantStatueEvent.active || giantStatueEvent.activated || giantStatueEvent.finalJumpStarted)) {
        // 只有当人物真正掉到屏幕底部以下，且处于垂直下落状态时才回
        const isBelowScreen = player.y > height + 100;
        const isWayBelowPlatform = player.y > (lateStageCheckpoint.y + 600); // 增加容错高度�?00
        if (isBelowScreen || isWayBelowPlatform) {
            for (let i = 0; i < 16; i++) {
                ringParticles.push({
                    x: player.x + player.width * 0.5 + (Math.random() - 0.5) * 26,
                    y: player.y + player.height * 0.52 + (Math.random() - 0.5) * 18,
                    vx: (Math.random() - 0.5) * 1.6,
                    vy: -0.9 - Math.random() * 1.5,
                    alpha: 0.7,
                    size: 1.5 + Math.random() * 2.1
                });
            }
            player.x = lateStageCheckpoint.x;
            player.y = lateStageCheckpoint.y;
            player.vx = 0;
            player.vy = 0;
            player.grounded = true;
            player.inputLocked = false;
            player.state = 'idle';
            if (inZFloatStage) {
                const zCamY = player.y - height * 0.65;
                camera.targetY = zCamY;
                camera.y = zCamY;
            } else {
                alignCameraInstant();
            }
        }
    }
    if (windTransition.phase !== 'idle' && !windTransition.done && !inVoidFall) {
        player.vx *= 0.72;
        player.facing = 1;
    }
    if (ambientWindBurst.active && !inVoidFall) {
        player.vx *= 0.92;
    }

    const transWindN = Math.max(0, Math.min(1, windTransition.intensity / 100));
    const burstWindN = Math.max(0, Math.min(1, ambientWindBurst.intensity / 100));
    const windN = Math.max(transWindN, burstWindN);
    const windActive = (windTransition.phase !== 'idle' && !windTransition.done) || ambientWindBurst.active;
    const gust = windActive ? 0.72 + 0.28 * Math.sin(performance.now() * 0.0018 + camera.x * 0.00015) : 1;
    const windDir = -1;
    updateB3LeafBlows(windN, gust, windDir);
    updateScene1CaveRiseParticles(windN);
    updateScene1ForegroundDust(windN, gust);

    // �?收集粒子跟随逻辑（虚空下坠时由流星逻辑单独更新
    const isPlayerStopped = !inVoidFall && Math.abs(player.vx) < 0.12 && player.grounded && !moving;
    const hasFourBodies = player.followingParticles.length >= 4;
    const waistAnchorY = player.y + player.height * 0.58;
    if (!inVoidFall) player.followingParticles.forEach((p, i) => {
        if (giantStatueEvent.activated && !giantStatueEvent.completed) {
            const idx = Math.max(0, Math.min(giantStatueEvent.pathPoints.length - 1, p.stardustTarget || 0));
            const pt = giantStatueEvent.pathPoints[idx];
            if (pt) {
                if (p.stardustPinned) {
                    p.x = pt.x + Math.sin(Date.now() * 0.004 + idx) * 1.4;
                    p.y = pt.y + Math.cos(Date.now() * 0.0045 + idx * 0.8) * 1.1;
                } else {
                    p.x += (pt.x - p.x) * 0.12;
                    p.y += (pt.y - p.y) * 0.12;
                }
            }
            p.trail.unshift({ x: p.x, y: p.y });
            if (p.trail.length > 14) p.trail.pop();
            return;
        }
        if (typeof p.seed !== "number") p.seed = Math.random() * Math.PI * 2;
        const t = Date.now() * 0.0042 + p.seed;
        const inStairJumpLift = !player.grounded && player.x > terrainParams.stairX - 900 && player.x < terrainParams.stairX + 1700;
        let targetX = player.x - 34 * player.facing;
        let targetY = waistAnchorY;
        let lerpX = 0.14;
        let lerpY = 0.14;

        if (hasFourBodies || isPlayerStopped) {
            // 静止时切到“三体”式互扰环绕：不同角速度+耦合项，形成非规则轨道
            const nodeCount = Math.max(3, player.followingParticles.length);
            const phase = (Math.PI * 2 * i) / nodeCount;
            const baseR = hasFourBodies ? 28 : 22;
            const radius = baseR + (hasFourBodies ? 10 : 4) * Math.sin(t * 0.45 + phase * 1.6);
            const omega = (hasFourBodies ? 1.05 : 0.6) + i * (hasFourBodies ? 0.24 : 0.17);
            const coupledX = (hasFourBodies ? 14 : 9) * Math.sin(t * (0.53 + i * 0.08) + phase * 2.2);
            const coupledY = (hasFourBodies ? 12 : 8) * Math.cos(t * (0.61 + i * 0.05) - phase * 1.4);
            const spiralX = Math.cos(t * (hasFourBodies ? 2.4 : 1.9) + phase * 1.3) * ((hasFourBodies ? 7 : 4) + i * 1.5);
            const spiralY = Math.sin(t * (hasFourBodies ? 2.8 : 2.2) - phase) * ((hasFourBodies ? 6 : 3) + i * 1.1);
            targetX = player.x + player.width * 0.5;
            targetY = waistAnchorY;
            targetX += Math.cos(t * omega + phase) * radius + coupledX;
            targetY += Math.sin(t * (omega * 1.18) + phase * 0.7) * (8 + i * 2) + coupledY + spiralY;
            targetX += spiralX;
            lerpX = hasFourBodies ? 0.13 : 0.1;
            lerpY = hasFourBodies ? 0.13 : 0.1;
        } else {
            const nearRadius = inStairJumpLift ? (18 + i * 4) : (24 + i * 6);
            const orbitX = Math.cos(t * (0.8 + i * 0.08)) * nearRadius;
            const orbitY = Math.sin(t * (1.1 + i * 0.06)) * (inStairJumpLift ? 22 : 15);
            const randomJitterX = Math.sin(t * 1.7 + i) * 7;
            const randomJitterY = Math.cos(t * 1.3 - i * 0.6) * 5;
            targetX += orbitX + randomJitterX;
            targetY += orbitY + randomJitterY;
            if (inStairJumpLift) targetY -= 34 + i * 8;
            lerpX = inStairJumpLift ? 0.2 : 0.14;
            lerpY = inStairJumpLift ? 0.22 : 0.14;
        }

        p.x += (targetX - p.x) * lerpX;
        p.y += (targetY - p.y) * lerpY;
        if (windN > 0.01) {
            const gustPush = (22 + i * 2.2) * windN * gust;
            p.x += gustPush * windDir;
            p.y += Math.sin(Date.now() * 0.0065 + i * 0.9 + camera.x * 0.0002) * (1.35 + 0.9 * windN) * gust;
        }
        // 拖尾更新
        p.trail.unshift({x: p.x, y: p.y});
        if(p.trail.length > 24) p.trail.pop();
    });

    const prevState = player.state;
    const downhillMove = isPlayerMovingDownhill();
    const triangleDownhill = isOnTriangleDownhillSegment();
    const downhillNowMs = performance.now();
    if (triangleDownhill || downhillMove) downhillAnimHoldUntil = downhillNowMs + 140;
    // 缓坡（23°）坡度下落速率（≈2.15px/帧）> 重力（0.7px/帧），玩家每6帧振荡一次离地，
    // 导致 downhill→jump 快速切换引起动画闪烁。去除grounded限制并用 |vy|<8 代替：
    // 振荡离地时 vy 仅 0.7~4.2（<8）→ 保持下坡动画；
    // 真实跳跃 vy=-16（|vy|≥8）→ 正常显示跳跃帧；定时器在真实跳跃顶点前早已超时，
    // 下落阶段 vy>0 时 keepDownhillAnim 必为 false，不影响跳跃落地动画。
    const keepDownhillAnim = Math.abs(player.vx) > 0.18 && downhillNowMs < downhillAnimHoldUntil && Math.abs(player.vy) < 8;
    if (!player.grounded && !keepDownhillAnim) player.state = 'jump';
    else if (triangleDownhill || downhillMove || keepDownhillAnim) player.state = 'downhill';
    else if (moving || Math.abs(player.vx) > 0.5) player.state = 'run';
    else player.state = 'idle';
    if (inVoidFall && voidFall.fallState === 'freeFall') player.state = 'idle';
    if (player.state !== prevState) {
        player.frameTimer = 0;
        if (player.state === 'jump') {
            player.jumpVisualVy = player.vy;
        } else if (prevState === 'jump') {
            player.jumpLandingBuffer = 0;
        }
    }
    const anim = getPlayableFrames(player.state);
    if (anim && anim.length > 0) {
        if (player.state === 'jump') {
            // Jump smoothing: velocity low-pass + frame hysteresis + landing buffer.
            const jumpFrames = anim.length;
            if (typeof player.jumpVisualVy !== 'number') player.jumpVisualVy = player.vy;
            player.jumpVisualVy += (player.vy - player.jumpVisualVy) * 0.28;
            const v = player.jumpVisualVy;
            let idx = 0;
            if (jumpFrames <= 3) {
                // 新版 3 帧：上升 / 顶点 / 下落
                if (v < -2.0) idx = 0;
                else if (v < 2.0) idx = 1;
                else idx = 2;
            } else {
                if (player.grounded && v > 0.6) {
                    player.jumpLandingBuffer = Math.max(player.jumpLandingBuffer, 6);
                }
                if (player.jumpLandingBuffer > 0) {
                    idx = jumpFrames - 1;
                    player.jumpLandingBuffer -= 1;
                } else {
                    // 多帧序列：按垂直速度在整段 0..N-1 上映射（起跳负 vy → 前几帧，顶点 → 中段，下落 → 后段）
                    const vyLo = -18;
                    const vyHi = 15;
                    let u = (v - vyLo) / (vyHi - vyLo);
                    u = Math.max(0, Math.min(1, u));
                    let targetIdx = Math.round(u * (jumpFrames - 1));
                    const prevJumpIdx = Math.max(0, Math.min(jumpFrames - 1, player.frame || 0));
                    const maxStep = jumpFrames > 16 ? 5 : jumpFrames > 8 ? 3 : 1;
                    if (Math.abs(targetIdx - prevJumpIdx) > maxStep) {
                        targetIdx = prevJumpIdx + Math.sign(targetIdx - prevJumpIdx) * maxStep;
                    }
                    idx = targetIdx;
                }
            }
            player.frame = Math.max(0, Math.min(jumpFrames - 1, idx));
        } else if (player.state === 'downhill') {
            // 下坡状态固定首帧，避免坡面/平地交界处动画闪烁
            player.frame = 0;
            player.frameTimer = 0;
        } else {
            const step = player.state === 'run' ? 0.22 : 0.12;
            player.frameTimer = (player.frameTimer || 0) + step;
            player.frame = Math.floor(player.frameTimer) % anim.length;
        }
    }

    if (!inVoidFall) {
        const targetCamX = player.x - width * 0.5;
        const inStairArea = player.x > terrainParams.stairX - 800;
        const inRampZone = player.x >= SCENE2_RAMP_START_X && player.x < SCENE2_Z_FLOAT_START_X;
        const inBrokenBridgeZone = player.x >= SCENE2_BROKEN_PLATFORM_START_X && player.x < SCENE2_BROKEN_PLATFORM_END_X;
        const inZFloatZone = player.x >= SCENE2_Z_FLOAT_START_X && !giantStatueEvent.completed;
        const inStardustDescent = giantStatueEvent.active && !giantStatueEvent.completed;
        const stairOffset = (inStairArea && player.y < height * 0.6) ? (height * 0.6 - player.y) : 0;
        const rampOffset = (inRampZone && player.y < height * 0.62) ? (height * 0.62 - player.y) : 0;
        const pts2 = getTerrainPoints(); const pts4 = getTerrain4Points();
        const inB1 = player.x > pts2.start - 100 && player.x < pts2.end + 600;
        const inB3 = player.x > terrainParams.bX3 - 100 && player.x < terrainParams.bX3 + terrainParams.w3 + 400;
        const inB4 = player.x > pts4.start - 100 && player.x < pts4.end + 600;
        // 第一关：过第一个三角高地（pts2 右端）之后、通天梯抬镜之�?�?起跳时垂直镜头不跟人物，仅水平跟
        const scene1AfterFirstTriFixedY =
            transition.scene2Blend < 0.01 &&
            player.x > pts2.end &&
            player.x < terrainParams.stairX - 800;

        // 纯坐标分水岭：斜坡模式与悬浮模式并存切换
        const baseTargetY = -Math.max(rampOffset, stairOffset);
        if (inStardustDescent) {
            // 星尘天梯下降期：取消额外上下限限制，线性跟随玩家回
            camera.targetZoom = 0.56;
            camera.targetY = player.y - height * 0.56;
        } else if (inZFloatZone) {
            camera.targetZoom = 1.0;
            const zFloatTargetY = player.y - height * 0.65;
            const deckY = getScene2ArchBridgeDeckY();
            const onZTransitionDeck = (player.x <= SCENE2_Z_FLOAT_START_X + 160) && player.grounded && ((player.y + player.height) >= deckY - 10);
            // 50000 过渡锁：仍在桥面过渡段时，不要让镜头突然下移
            camera.targetY = onZTransitionDeck ? Math.min(baseTargetY, zFloatTargetY) : zFloatTargetY;
        } else if (inRampZone) {
            camera.targetZoom = 1.0;
            const onRampTopPlatform = scene2Ramp.flatUnlocked && player.x >= scene2Ramp.flatStartX;
            if (onRampTopPlatform || inBrokenBridgeZone) {
                // 三角斜坡顶部与断桥段均使用固定平台镜头
                const fixedDeckY = inBrokenBridgeZone ? getScene2ArchBridgeDeckY() : scene2Ramp.flatY;
                const platformOffset = (fixedDeckY < height * 0.62) ? (height * 0.62 - fixedDeckY) : 0;
                // 固定模式下不能再叠加 stairOffset（它依赖 player.y，会导致跳跃时镜头抖动）
                camera.targetY = -platformOffset;
            } else {
                camera.targetY = baseTargetY;
            }
        } else {
            camera.targetZoom = inB1 ? 0.42 : (inB4 ? 0.45 : 1.0);
            let ty = baseTargetY;
            if (inB4) {
                // 第四三角区：镜头Y轴固定，不跟随人物脚步
                ty = baseTargetY;
            } else if (scene1AfterFirstTriFixedY && !player.grounded) {
                ty = camera.y;
            }
            camera.targetY = ty;
        }
        const isZoomedOut = camera.targetZoom < 1.0;
        const camXDeadzone = inZFloatZone ? 0 : (isZoomedOut ? 22 : 0);
        const dx = targetCamX - camera.x;
        if (Math.abs(dx) > camXDeadzone) {
            camera.x += (dx - Math.sign(dx) * camXDeadzone) * (inZFloatZone ? 0.12 : (isZoomedOut ? 0.038 : 0.08));
        }
        const zoomDelta = camera.targetZoom - camera.zoom;
        const zoomEase = isZoomedOut ? 0.0024 : 0.012;
        const maxZoomStep = isZoomedOut ? 0.006 : 0.014;
        const zoomStep = Math.max(-maxZoomStep, Math.min(maxZoomStep, zoomDelta * zoomEase));
        camera.zoom += zoomStep;
        // 统一垂直平滑，避免被分支条件打断
        camera.y += (camera.targetY - camera.y) * 0.1;
    }
    sanitizeCameraState();

    updateLoreEvents();

    // 50000 后坠落安全网：仅非星尘事件阶段启
    if (!inVoidFall && player.x >= SCENE2_Z_FLOAT_START_X && player.y > height + 200 && !(giantStatueEvent.active || giantStatueEvent.activated || giantStatueEvent.finalJumpStarted)) {
        ensureZFloatingPlatforms();
        const back = getZFloatingEntryCheckpoint();
        player.x = back.x;
        player.y = back.y;
        player.vx = 0;
        player.vy = 0;
        player.grounded = true;
        player.inputLocked = false;
        player.state = 'idle';
        camera.targetY = player.y - height * 0.65;
        camera.y = camera.targetY;
    }

    // 诗篇逻辑
    if (!specialOrb.triggered && Math.abs(player.x - 6200) < 80 && player.grounded) {
        specialOrb.triggered = true; specialOrb.ringBurstAt = performance.now(); poemData.show = true; poemData.state = 'fadein'; poemData.isFirst = true;
        audioRegistry.playSfx('particle_touch');
        playStardustLitChime();
        poemData.lines = ["霓虹遗忘灰烬，", "世人畏你如怪谈。", "但这折翼之鸟，", "仍守着你渴望天空的温柔"];
        player.inputLocked = true; player.vx = 0;
        // 触碰后：多重同心圆向全屏扩散（极简白线）
        for (let i = 0; i < 4; i++) {
            specialOrbScreenRings.push({
                x: 6200,
                y: height - groundH - height * 0.55 - 50,
                r: 10 + i * 14,
                dr: 9.5 + i * 1.6,
                alpha: 0.78 - i * 0.1,
                lineW: 1.05 - i * 0.12,
                delay: i * 7
            });
        }
        giantBird.active = true;
        giantBird.x = width + 600;
        giantBird.y = height * 0.22;
        giantBird.alpha = 0;
        giantBird.flap = Math.random() * Math.PI * 2;
        giantBird.frameTimer = Math.random() * giantBird.frameCount;
        giantBird.frame = Math.floor(giantBird.frameTimer) % giantBird.frameCount;
        giantBird.vy = 0;
        giantBird.bank = 0;
        giantBird.trail = [];
    }
    if (!specialOrb2.triggered && !player.grounded && Math.abs(player.x - specialOrb2.x) < 50 && Math.abs(player.y - (specialOrb2.y - player.height)) < 40) {
        specialOrb2.triggered = true; specialOrb2.ringBurstAt = performance.now(); poemData.show = true; poemData.state = 'fadein'; poemData.isFirst = false;
        playStardustLitChime();
        poemData.lines = ["狂风剥落理智", "契约殿堂化作残垣。", "诅咒吞噬内心，", "风中微光证明你仍在苦撑。"];
        player.inputLocked = true; player.vx = 0;
        for(let i=0; i<4; i++) expansionRings.push({ r: 0, dr: 10 + i*8, alpha: 1 });
    }
    if (!debrisOrb.triggered) {
        debrisOrb.pulse += 0.06;
        const dxDebris = player.x - debrisOrb.x;
        const dyDebris = (player.y + player.height * 0.5) - debrisOrb.y;
        if (Math.abs(dxDebris) < 65 && Math.abs(dyDebris) < 60 && !player.grounded) {
            debrisOrb.triggered = true;
            debrisOrb.finalized = true;
            audioRegistry.playSfx('particle_touch');
            playStardustLitChime();
            for (let i = 0; i < 6; i++) {
                holyRings.push({
                    r: 20 + i * 24,
                    dr: 7 + i * 1.8,
                    alpha: 0.9 - i * 0.1,
                    lineW: 4 - i * 0.4
                });
            }
            if (player.followingParticles.length < 2) {
                player.followingParticles = [];
                ensureFollowingParticle(debrisOrb.x, debrisOrb.y);
                ensureFollowingParticle(6200, height-groundH-height*0.55-50);
            }
        }
    }
    const platformOrbPos = getPlatformTopOrbWorldPos();
    platformTopOrb.x = platformOrbPos.x;
    platformTopOrb.y = platformOrbPos.y;
    if (!platformTopOrb.triggered && scene2Ramp.flatUnlocked) {
        platformTopOrb.pulse += 0.06;
        const dxSummit = player.x - platformTopOrb.x;
        const dySummit = (player.y + player.height * 0.5) - platformTopOrb.y;
        if (Math.abs(dxSummit) < 70 && Math.abs(dySummit) < 70) {
            platformTopOrb.triggered = true;
            platformTopOrb.finalized = true;
            playStardustLitChime();
            for (let i = 0; i < 6; i++) {
                specialOrbScreenRings.push({
                    x: platformTopOrb.x,
                    y: platformTopOrb.y,
                    r: 16 + i * 20,
                    dr: 8.8 + i * 2.0,
                    alpha: 0.82 - i * 0.1,
                    lineW: 1.25 - i * 0.1,
                    delay: i * 5
                });
            }
            ensureFollowingParticle(platformTopOrb.x, platformTopOrb.y);
            while (player.followingParticles.length < 4) {
                player.followingParticles.push({
                    x: player.x + player.width * 0.5 + (Math.random() - 0.5) * 18,
                    y: player.y + player.height * 0.55 + (Math.random() - 0.5) * 16,
                    trail: [],
                    seed: Math.random() * Math.PI * 2
                });
            }
            player.collectedCount = Math.max(player.collectedCount, 4);
        }
    }

    if (poemData.show) {
        if (poemData.state === 'fadein') { poemData.alpha += 0.005; if(poemData.alpha >= 1) poemData.state = 'stay'; poemData.timer = 300; }
        else if (poemData.state === 'stay') { poemData.timer--; if(poemData.timer <= 0) poemData.state = 'fadeout'; }
        else if (poemData.state === 'fadeout') { 
            poemData.alpha -= 0.01; 
            if(poemData.alpha <= 0) { 
                poemData.alpha = 0; poemData.state = 'end'; player.inputLocked = false; 
                // �?文字消失后，粒子来到身后
                if(poemData.isFirst && !specialOrb.finalized) {
                    player.followingParticles.push({x: 6200, y: height-groundH-height*0.55-50, trail: [], seed: Math.random() * Math.PI * 2});
                    specialOrb.finalized = true;
                } else if(!poemData.isFirst && !specialOrb2.finalized) {
                    if (player.followingParticles.length < 2 && debrisOrb.finalized) {
                        ensureFollowingParticle(debrisOrb.x, debrisOrb.y);
                        ensureFollowingParticle(6200, height-groundH-height*0.55-50);
                    }
                    player.followingParticles.push({x: specialOrb2.x, y: specialOrb2.y, trail: [], seed: Math.random() * Math.PI * 2});
                    specialOrb2.finalized = true;
                }
            } 
        }
    }

    if (giantBird.active) {
        giantBird.y = height * 0.22;
        const flapForce = Math.sin(giantBird.flap * 0.9);
        const travelSpeed = 2.8 + 0.45 * Math.sin(giantBird.flap * 0.35 + 0.6);
        giantBird.x -= travelSpeed;
        giantBird.flap += 0.085;
        giantBird.vy = 0;
        giantBird.bank = 0;
        giantBird.alpha = Math.min(0.65, giantBird.alpha + 0.005);
        const frameSpeedMul = 1 + 0.28 * Math.abs(flapForce);
        giantBird.frameTimer += (giantBird.fps / 60) * frameSpeedMul;
        giantBird.frame = Math.floor(giantBird.frameTimer) % giantBird.frameCount;
        giantBird.trail.push({
            x: giantBird.x,
            y: giantBird.y,
            bank: giantBird.bank,
            alpha: giantBird.alpha * 0.22
        });
        if (giantBird.trail.length > 6) giantBird.trail.shift();
        if (giantBird.x < -1500) giantBird.active = false;
    }
    for (let i = ringParticles.length - 1; i >= 0; i--) { const p = ringParticles[i]; p.x += p.vx; p.y += p.vy; p.vx *= 0.985; p.vy *= 0.985; p.alpha -= 0.008; if (p.alpha <= 0) ringParticles.splice(i, 1); }
    for (let i = specialOrbScreenRings.length - 1; i >= 0; i--) {
        const r = specialOrbScreenRings[i];
        if (r.delay > 0) { r.delay -= 1; continue; }
        r.r += r.dr;
        r.alpha -= 0.012;
        if (r.alpha <= 0) specialOrbScreenRings.splice(i, 1);
    }
    for (let i = expansionRings.length - 1; i >= 0; i--) { const r = expansionRings[i]; r.r += r.dr; r.alpha -= 0.006; if(r.alpha <= 0) expansionRings.splice(i, 1); }
    for (let i = holyRings.length - 1; i >= 0; i--) { const r = holyRings[i]; r.r += r.dr; r.alpha -= 0.012; if (r.alpha <= 0) holyRings.splice(i, 1); }
    ambientStorm.forEach(p => {
        p.x += p.vx + (10 + 16 * windN) * gust * windDir;
        p.y += p.vy - 0.35 * windN * gust;
        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y > height) p.y = 0;
        if (p.y < 0) p.y = height;
    });
    const birdZones = [
        { name: "triangle", start: getTerrainPoints().start - 280, end: getTerrainPoints().end + 260 },
        { name: "building", start: terrainParams.bX5 - 450, end: terrainParams.bX5 + 1200 },
        { name: "stairs", start: terrainParams.stairX - 720, end: terrainParams.stairX + 1600 }
    ];
    const activeZone = birdZones.find(z => player.x >= z.start && player.x <= z.end);
    birdsSwarm.forEach((b, i) => {
        if (windN > 0.12 && !b.active && i % 3 === 0 && Math.random() < 0.09 + windN * 0.08) {
            b.active = true;
            b.dir = -1;
            b.x = camera.x + width + 80 + Math.random() * 180;
            b.y = height * (0.08 + Math.random() * 0.3);
            b.speed = 3 + Math.random() * 3;
        }
        if (activeZone && !b.active && i % 5 === 0 && Math.random() < 0.06) {
            b.active = true;
            b.zone = activeZone.name;
            b.dir = -1;
            b.x = camera.x + width + 120;
            b.y = height * (0.12 + Math.random() * 0.25);
            b.speed = 4 + Math.random() * 3;
        }
        if (!b.active) return;
        b.x += b.speed * b.dir + (14 + 26 * windN) * gust * windDir;
        b.offset += 0.22 + 0.32 * windN;
        b.y += Math.sin(b.offset * 0.82 + i * 0.7 + gust * 0.4) * (0.85 + 3.4 * windN) * gust;
        if (b.x < camera.x - 240 || b.x > camera.x + width + 240) b.active = false;
    });
    whiteBirds.forEach(wb => {
        wb.x += (-wb.speed + (8 + 22 * windN) * gust * windDir);
        wb.flap += 0.13 + 0.24 * windN * gust;
        wb.y += Math.sin(wb.flap * 0.88 + gust) * (0.18 + windN * 2.4) * gust;
        if (wb.x < camera.x - 220) {
            wb.x = camera.x + width + 220 + Math.random() * 320;
            wb.y = height * (0.08 + Math.random() * 0.34);
        }
        if (wb.x > camera.x + width + 260) {
            wb.x = camera.x - 220 - Math.random() * 180;
            wb.y = height * (0.08 + Math.random() * 0.34);
        }
    });
    watercolorBlobs.forEach(w => {
        w.x += w.vx;
        w.y += w.vy + Math.sin(Date.now() * 0.00025 + w.phase) * 0.01;
        if (w.x < -w.rx) w.x = width + w.rx;
        if (w.x > width + w.rx) w.x = -w.rx;
        if (w.y < -w.ry) w.y = height * 0.75 + w.ry * 0.2;
        if (w.y > height * 0.8 + w.ry) w.y = -w.ry * 0.3;
    });
    const shardsReadyToReveal = transition.scene2Blend >= SCENE2_SHARDS_SHOW_BLEND && windTransition.done;
    const nowMs = performance.now();
    floatingShards.forEach(s => {
        s.bob += 0.01 + s.bobAmp * 0.00006 + windN * 0.028 * gust;
        s.windOffset = (s.windOffset || 0) * (0.84 - windN * 0.26) + (16 + s.bobAmp * 0.95) * windN * gust * windDir;
        if (shardsReadyToReveal) {
            if (!s.revealStartAt) s.revealStartAt = nowMs + (s.revealDelayMs || 0);
            const p = Math.max(0, Math.min(1, (nowMs - s.revealStartAt) / Math.max(120, s.revealDurationMs || 1000)));
            s.revealProgress = Math.max(s.revealProgress || 0, p);
        } else {
            s.revealProgress = 0;
            s.revealStartAt = 0;
        }
    });
    // 已按需求移除人物投影和投影周围粒子
    rampTopShadowParticles = [];
    vegetation.forEach(v => { if (Math.abs(player.x - v.x) < 850) v.growth = Math.min(1, v.growth + 0.04); });
    skyStairs.forEach(s => { if(s.plant && Math.abs(player.x - s.x) < 300) s.plant.growth = Math.min(1, s.plant.growth + 0.05); });

    if (voidFall.phase === 'eyeFollow') {
        voidFall.eyeFollowDist += Math.abs(player.x - voidFall.prevPlayerX);
        voidFall.prevPlayerX = player.x;
        if (voidFall.eyeFollowDist >= VOID_EYE_FOLLOW_DIST) {
            voidFall.phase = 'eyeClose';
            voidFall.eyeCloseStart = performance.now();
        }
    } else if (voidFall.phase === 'eyeClose') {
        if (performance.now() - voidFall.eyeCloseStart >= VOID_EYE_CLOSE_MS) voidFall.phase = 'done';
    }

    draw();
    updateWindOverlayLifecycle();
    scheduleGameLoop();
}

function drawWeapon(w) {
    if (isSkyPathForbiddenForProps(w.x)) return;
    const rx = w.x - camera.x; if(rx < -300 || rx > width + 300) return;
    const ry = getGroundHeight(w.x, 9999);
    const baseGroundY = height - groundH;
    // 第一关：黑色剑戟不出现在空中与障碍手上
    if (transition.scene2Blend < 0.01) {
        if (ry < baseGroundY - 140) return;
        if (getHandObstacleY(w.x) != null) return;
    }
    ctx.save();
    ctx.translate(rx, ry);
    ctx.rotate(w.rotation);
    ctx.scale(w.scale * 3, w.scale * 3);
    const t = transition.scene2Blend;
    const weaponColor = t > 0 ? lerpColor("111111", "ffffff", t) : "#111";
    ctx.fillStyle = weaponColor;

    if (w.type === 'sword') {
        // 剑身
        ctx.fillRect(-2, -60, 4, 60);
        // 护手
        ctx.fillRect(-8, -15, 16, 3);
        // 剑首
        ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
    } else {
        // 戟杆
        ctx.fillRect(-1.5, -90, 3, 90);
        // 戟头
        ctx.beginPath(); ctx.moveTo(0, -90); ctx.lineTo(-10, -75); ctx.lineTo(0, -65); ctx.lineTo(10, -75); ctx.closePath(); ctx.fill();
        // 侧刃 (圆弧几何)
        ctx.beginPath(); ctx.arc(-5, -78, 8, Math.PI*0.5, Math.PI*1.5); ctx.fill();
    }
    ctx.restore();
}

function drawSkyStair(stair) {
    const rx = stair.x - camera.x; if(rx < -500 || rx > width + 500) return;
    ctx.save(); ctx.translate(rx, stair.y);
    const t = transition.scene2Blend;
    const stairDark = t > 0 ? lerpColor("000000", "ffffff", t) : "#000";
    const stairMid = t > 0 ? lerpColor("1a1a1a", "f2f2f2", t) : "#1a1a1a";
    const stairLow = t > 0 ? lerpColor("0c0c0c", "e8e8e8", t) : "#0c0c0c";
    ctx.fillStyle = stairDark; ctx.beginPath(); ctx.rect(-stair.w / 2, 0, stair.w, stair.h); ctx.fill();
    ctx.fillStyle = stairMid; ctx.beginPath(); ctx.rect(-stair.w/2 + 8, 4, stair.w - 16, stair.h/2); ctx.fill();
    ctx.fillStyle = stairLow; ctx.beginPath(); ctx.moveTo(stair.w/2, stair.h); ctx.lineTo(stair.w/2+15, stair.h+15); ctx.lineTo(-stair.w/2+15, stair.h+15); ctx.lineTo(-stair.w/2, stair.h); ctx.fill();
    if (stair.plant && stair.plant.growth > 0) {
        ctx.save(); ctx.scale(1, stair.plant.growth); ctx.fillStyle = stairDark;
        const th = stair.plant.thickness, ph = stair.plant.h;
        ctx.beginPath(); ctx.moveTo(-th/2, 0); ctx.bezierCurveTo(-th*2, -ph*0.3, th*2, -ph*0.6, 0, -ph); ctx.bezierCurveTo(th, -ph*0.6, -th, -ph*0.3, th/2, 0); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, -ph); ctx.lineTo(0, -ph - stair.plant.antennaH); ctx.lineWidth = 0.8; ctx.strokeStyle = stairDark; ctx.stroke();
        ctx.restore();
    }
    ctx.restore();

function drawScene2SkyColumn() {
    if (transition.scene2Blend < 0.01) return;
    const x = SCENE2_SKY_COLUMN_X - camera.x;
    if (x < -240 || x > width + 240) return;

    const gY = getGroundHeight(SCENE2_SKY_COLUMN_X, 9999);
    const h = height * SCENE2_SKY_COLUMN_HEIGHT_RATIO;
    const bodyW = Math.max(28, width * 0.02);
    const capH = Math.max(24, height * 0.035);
    const baseH = Math.max(26, height * 0.04);

    ctx.save();
    ctx.translate(x, gY);
    const drawBlock = (x0, y0, w0, h0, shade, stroke = "rgba(132,94,104,0.42)") => {
        ctx.fillStyle = shade;
        ctx.fillRect(x0, y0, w0, h0);
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1;
        ctx.strokeRect(x0, y0, w0, h0);
    };
    const chipTopRight = (x0, y0, w0, h0, size) => {
        ctx.save();
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.moveTo(x0 + w0 - size, y0);
        ctx.lineTo(x0 + w0, y0);
        ctx.lineTo(x0 + w0, y0 + size);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    };
    const chipBottomLeft = (x0, y0, w0, h0, size) => {
        ctx.save();
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.moveTo(x0, y0 + h0 - size);
        ctx.lineTo(x0, y0 + h0);
        ctx.lineTo(x0 + size, y0 + h0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    };

    // 先画细长中轴，避免中段视觉断开
    drawBlock(-bodyW * 0.22, -h - capH, bodyW * 0.44, h + capH, "rgba(246,239,241,0.98)", "rgba(146,110,118,0.28)");

    // 由更小方�?矩形堆叠出更精细层数
    const layers = 22;
    let y = -h;
    for (let i = 0; i < layers; i++) {
        const hh = h * (0.026 + (i % 3) * 0.005);
        const widthScale = 0.66 + (i % 6) * 0.06;
        const ww = bodyW * widthScale;
        const xx = -ww * 0.5 + ((i % 2 === 0) ? -bodyW * 0.03 : bodyW * 0.03);
        const shade = (i % 2 === 0) ? "rgba(249,244,245,0.98)" : "rgba(242,234,237,0.97)";
        drawBlock(xx, y, ww, hh, shade);

        // 隔层叠加正方形块，提升“几何拼贴”密
        if (i % 3 === 1) {
            const sq = Math.max(8, ww * 0.22);
            drawBlock(-sq * 0.5, y + hh * 0.14, sq, sq, "rgba(252,248,248,0.98)");
        }

        // 轻量边缘破损（三角镂空），避免打穿中
        const chip = Math.max(4, ww * 0.12);
        if (i % 4 === 0) chipTopRight(xx, y, ww, hh, chip);
        if (i % 5 === 2) chipBottomLeft(xx, y, ww, hh, chip * 0.88);
        y += hh;
    }

    // 顶部与底座压
    drawBlock(-bodyW * 0.95, -h - capH, bodyW * 1.9, capH, "rgba(250,246,246,0.99)");
    drawBlock(-bodyW * 0.88, -baseH, bodyW * 1.76, baseH, "rgba(247,240,241,0.99)");

    // 顶部锯齿三角：颜色取背景色，形成镂空错觉
    const bgColor = transition.scene2Blend > 0.01 ? "rgb(242,171,178)" : "rgb(238,234,230)";
    ctx.fillStyle = bgColor;
    const triY = -h - capH;
    const triW = bodyW * 0.22;
    const triH = capH * 0.42;
    for (let i = -3; i <= 3; i++) {
        const cx = i * triW * 0.85;
        ctx.beginPath();
        ctx.moveTo(cx - triW * 0.5, triY);
        ctx.lineTo(cx, triY + triH);
        ctx.lineTo(cx + triW * 0.5, triY);
        ctx.closePath();
        ctx.fill();
    }

    // 中轴分缝
    ctx.strokeStyle = "rgba(138,104,112,0.24)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -h - capH + 2);
    ctx.lineTo(0, -2);
    ctx.stroke();
    ctx.restore();
}

function drawRuinColumnStack(worldX, heightRatio, widthRatio) {
    const x = worldX - camera.x;
    if (x < -240 || x > width + 240) return;
    // 实时采样地形高度，确保柱脚始终精准贴地（斜坡/平地都对齐）
    const gY = getGroundHeight(worldX, 9999);
    const h = height * heightRatio;
    const bodyW = Math.max(16, width * widthRatio);
    const segCount = 30;
    const segH = h / segCount;

    ctx.save();
    ctx.translate(x, gY);
    const drawBlock = (x0, y0, w0, h0, fill, stroke) => {
        ctx.fillStyle = fill;
        ctx.fillRect(x0, y0, w0, h0);
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1;
        ctx.strokeRect(x0, y0, w0, h0);
    };

    // 中轴骨架，保证高柱不会从中段视觉断裂
    drawBlock(-bodyW * 0.16, -h, bodyW * 0.32, h, "rgba(246,240,242,0.95)", "rgba(145,108,116,0.2)");

    let y = -h;
    for (let i = 0; i < segCount; i++) {
        const hh = segH * (0.68 + (i % 5) * 0.07);
        const ww = bodyW * (0.50 + (i % 7) * 0.06);
        const xx = -ww * 0.5 + ((i % 2) ? bodyW * 0.022 : -bodyW * 0.022);
        const fill = (i % 2)
            ? "rgba(252,248,248,0.98)"
            : "rgba(242,232,236,0.95)";
        drawBlock(xx, y, ww, hh, fill, "rgba(132,95,104,0.34)");

        // 小正方形插片，提升细碎层
        if (i % 2 === 0) {
            const sq = Math.max(5, ww * (0.12 + (i % 3) * 0.03));
            const sx = (i % 4 < 2) ? (xx + ww * 0.18) : (xx + ww * 0.62 - sq);
            drawBlock(sx, y + hh * 0.2, sq, sq, "rgba(250,246,246,0.95)", "rgba(132,95,104,0.24)");
        }

        // 细边框条，模拟参考图的几何分段感
        if (i % 3 === 1) {
            const bandH = Math.max(2, hh * 0.12);
            drawBlock(xx - bodyW * 0.06, y + hh * 0.44, ww + bodyW * 0.12, bandH, "rgba(246,240,241,0.92)", "rgba(132,95,104,0.24)");
        }
        y += hh;
    }

    drawBlock(-bodyW * 0.92, -h - segH * 0.8, bodyW * 1.84, segH * 0.8, "rgba(250,246,246,0.98)", "rgba(132,95,104,0.30)");
    drawBlock(-bodyW * 0.84, -segH * 1.0, bodyW * 1.68, segH * 1.0, "rgba(248,242,243,0.98)", "rgba(132,95,104,0.30)");
    ctx.restore();
}

function drawScene1Clouds() {
    if (transition.scene2Blend > 0.2) return;
    const img = images.clouds_far;
    if (!isImageReady(img)) return;

    // Keep original aspect ratio and use fixed cloud instances to avoid per-frame popping/flicker.
    const baseW = width * 1.05;
    const baseH = baseW * (img.height / img.width);
    const fade = (1 - transition.scene2Blend * 0.7);
    const t = performance.now();
    const layers = [
        { y: height * 0.06, scale: 1.0, speed: 0.0042, parallax: 0.05, alpha: 0.22, phase: 0, density: 0.5 },
        { y: height * 0.11, scale: 0.92, speed: 0.0065, parallax: 0.09, alpha: 0.16, phase: baseW * 0.37, density: 0.5 }
    ];
    const stableRand01 = (n) => {
        const v = Math.sin(n * 12.9898) * 43758.5453;
        return v - Math.floor(v);
    };
    if (!drawScene1Clouds._instances) {
        // Build once: slot-based cloud positions to avoid overlap.
        drawScene1Clouds._instances = layers.map((layer, li) => {
            const arr = [];
            const slots = 10; // in a 3-screen-wide strip
            for (let i = 0; i < slots; i++) {
                const r = stableRand01((li + 1) * 1000 + i * 17);
                if (r > layer.density) continue; // keep about half, but never overlap slots
                const center = -1 + (i + 0.5) * (3 / slots); // [-1,2] range
                const xJitter = (stableRand01((li + 1) * 2100 + i * 19) - 0.5) * 0.08;
                arr.push({
                    xNorm: center + xJitter,
                    yJitter: (stableRand01((li + 1) * 3000 + i * 31) - 0.5) * 24,
                    scaleJitter: 0.82 + stableRand01((li + 1) * 4000 + i * 37) * 0.28,
                    alphaJitter: 0.72 + stableRand01((li + 1) * 6000 + i * 43) * 0.22,
                    flipX: stableRand01((li + 1) * 5000 + i * 41) > 0.5
                });
            }
            return arr;
        });
    }

    ctx.save();
    layers.forEach((layer, li) => {
        const w = baseW * layer.scale;
        const h = baseH * layer.scale;
        const drift = ((t * layer.speed) + layer.phase);
        const parallaxX = camera.x * layer.parallax;
        ctx.globalAlpha = layer.alpha * fade;
        const instances = drawScene1Clouds._instances[li] || [];
        instances.forEach((inst) => {
            const iw = w * inst.scaleJitter;
            const ih = h * inst.scaleJitter;
            // World movement is smooth; each instance keeps identity, so no flicker.
            const x = (inst.xNorm * width) - parallaxX - drift;
            // Wrap into visible neighborhood
            let sx = x;
            const wrapW = width * 3;
            while (sx < -iw - width) sx += wrapW;
            while (sx > width + iw) sx -= wrapW;
            const sy = layer.y + inst.yJitter;
            ctx.globalAlpha = layer.alpha * fade * inst.alphaJitter * 0.8;
            if (inst.flipX) {
                ctx.save();
                ctx.translate(sx + iw, sy);
                ctx.scale(-1, 1);
                ctx.drawImage(img, 0, 0, iw, ih);
                ctx.restore();
            } else {
                ctx.drawImage(img, sx, sy, iw, ih);
            }
        });
    });
    ctx.restore();
}

function drawMidHillSun() {
    // 仅第一关显示：在到达中央丘陵时缓慢出现
    if (transition.scene2Blend > 0.01) return;
    const hill = terrainParams.midHill;
    const fadeInStart = 9900;
    const fadeInEnd = fadeInStart + hill.w * 0.45;
    const t = (player.x - fadeInStart) / Math.max(1, (fadeInEnd - fadeInStart));
    const fadeInAlpha = Math.max(0, Math.min(1, t));
    // 20000 后开始缓慢消失
    const fadeOutStart = 20000;
    const fadeOutEnd = 20330;
    const fadeOutT = (player.x - fadeOutStart) / Math.max(1, (fadeOutEnd - fadeOutStart));
    const fadeOutAlpha = 1 - Math.max(0, Math.min(1, fadeOutT));
    const alpha = fadeInAlpha * fadeOutAlpha;
    if (alpha <= 0.001) return;

    // 太阳保持“画面居中偏下”，并有轻微随人物位移的跟随
    const hillCenterX = hill.x + hill.w * 0.5;
    const followX = Math.max(-width * 0.12, Math.min(width * 0.12, (player.x - hillCenterX) * 0.03));
    const sunX = width * 0.5 + followX;
    const sunY = height - groundH - height * 0.23;
    const r = Math.min(height * 0.36, 380);

    ctx.save();
    ctx.globalAlpha = alpha;
    // 外发光层（渐变缓存：sunX 变化 < 2px 时复用，避免每帧分配）
    const cache = drawMidHillSun;
    if (!cache._g || Math.abs((cache._gx || 0) - sunX) > 2 || (cache._gr || 0) !== r) {
        cache._g = ctx.createRadialGradient(sunX, sunY, r * 0.1, sunX, sunY, r * 1.95);
        cache._g.addColorStop(0.0, 'rgba(255,255,255,0.34)');
        cache._g.addColorStop(0.45, 'rgba(255,255,255,0.20)');
        cache._g.addColorStop(1.0, 'rgba(255,255,255,0)');
        cache._gx = sunX; cache._gr = r;
    }
    ctx.fillStyle = cache._g;
    ctx.beginPath();
    ctx.arc(sunX, sunY, r * 1.95, 0, Math.PI * 2);
    ctx.fill();

    // 实体太阳
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'rgba(255,255,255,0.72)';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function updateB3LeafBlows(windN, gust, windDir) {
    if (DISABLE_SCENE1_TREE_LEAF_PARTICLES) {
        b3LeafBlows.length = 0;
        return;
    }
    if (transition.scene2Blend >= 0.01) {
        b3LeafBlows.length = 0;
        return;
    }
    const movingFast = Math.abs(player.vx) > 1.0;
    const anchors = getB3TreeAnchors();
    const nearAnyTree = anchors.some(t => Math.abs(player.x - t.x) < 760);
    const now = performance.now();
    if (nearAnyTree && movingFast && now >= b3LeafNextSpawnAt) {
        const near = anchors.slice().sort((a, b) => Math.abs(player.x - a.x) - Math.abs(player.x - b.x))[0];
        const baseY = height - groundH;
        const canopyY = baseY - height * near.hMul * 0.76;
        const n = 4 + Math.floor(Math.random() * 4);
        for (let i = 0; i < n; i++) {
            const side = (player.x >= near.x) ? -1 : 1;
            const spread = 24 + Math.random() * 110;
            b3LeafBlows.push({
                x: near.x + side * spread + (Math.random() - 0.5) * 34,
                y: canopyY + (Math.random() - 0.5) * 85,
                vx: (1.5 + Math.random() * 2.3) * side + (10 + 14 * windN) * gust * windDir * 0.1,
                vy: -0.55 - Math.random() * 1.25,
                size: 4.2 + Math.random() * 4.8,
                alpha: 0.9 + Math.random() * 0.16,
                rot: Math.random() * Math.PI * 2,
                vr: (Math.random() - 0.5) * 0.18
            });
        }
        b3LeafNextSpawnAt = now + 35;
    }

    for (let i = b3LeafBlows.length - 1; i >= 0; i--) {
        const p = b3LeafBlows[i];
        p.x += p.vx + (7 + 16 * windN) * gust * windDir * 0.15;
        p.y += p.vy;
        p.vy += 0.035;
        p.vx *= 0.992;
        p.rot += p.vr;
        p.alpha -= 0.008;
        if (p.alpha <= 0.02 || p.y > height - groundH + 20 || p.x < camera.x - 220 || p.x > camera.x + width + 220) {
            b3LeafBlows.splice(i, 1);
        }
    }
}

function drawB3LeafBlows() {
    if (DISABLE_SCENE1_TREE_LEAF_PARTICLES) return;
    if (transition.scene2Blend >= 0.01 || !b3LeafBlows.length) return;
    ctx.save();
    for (let i = 0; i < b3LeafBlows.length; i++) {
        const p = b3LeafBlows[i];
        const sx = p.x - camera.x;
        if (sx < -40 || sx > width + 40) continue;
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, p.alpha));
        ctx.translate(sx, p.y);
        ctx.rotate(p.rot);
        ctx.shadowBlur = 18;
        ctx.shadowColor = "rgba(240,245,248,0.9)";
        ctx.fillStyle = "rgba(232,236,240,0.9)";
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size * 1.45, p.size * 0.78, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(248,250,252,0.75)";
        ctx.beginPath();
        ctx.ellipse(p.size * 0.18, -p.size * 0.1, p.size * 0.44, p.size * 0.22, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawB3ToPts4ForegroundOccluder() {
    if (transition.scene2Blend >= 0.01) return;
    const img = images.b3FgOccluder01;
    if (!isImageReady(img)) return;
    const pts4 = getTerrain4Points();
    const spanStart = terrainParams.bX3 - 80;

    if (player.x < spanStart || player.x > spanEnd) return;

    const occluderX = terrainParams.bX3 + terrainParams.w3 + 820;
    if (occluderX < spanStart || occluderX > spanEnd) return;
