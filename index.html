}

function drawScene1CaveLayer(isForeground = false) {
    if (transition.scene2Blend >= 0.01) return;
    const img = isForeground ? images.lv1_cave_fg_01 : images.lv1_cave_bg_01;
    if (!isImageReady(img)) return;

    const caveX = SCENE1_CAVE_X;
    // 固定等比绘制：后续不压扁/不拉伸；并在当前基础上放大 1 倍（2x）
    const baseH = height;
    const scale = 2.0;
    const drawH = baseH * scale;
    const drawW = drawH * (img.width / Math.max(1, img.height));
    const sx = (caveX - camera.x) - drawW * 0.5;
    const sy = height - drawH;
    ctx.drawImage(img, sx, sy, drawW, drawH);
}

function isPlayerInScene1Cave() {
    if (transition.scene2Blend >= 0.01) return false;
    const caveStartX = SCENE1_CAVE_X - 760;
    return player.x >= caveStartX && player.x <= SCENE1_CAVE_BEAM_END_X;
}

function updateScene1CaveRiseParticles(windN) {
    return;
    if (transition.scene2Blend >= 0.01) {
        caveRiseParticles.length = 0;
        return;
    }
    const caveStartX = SCENE1_CAVE_X - 900;
    const inCaveRange = player.x >= caveStartX && player.x <= SCENE1_CAVE_BEAM_END_X;
    const now = performance.now();
    if (inCaveRange && now >= caveRiseNextSpawnAt) {
        const spawnN = 1 + Math.floor(Math.random() * 2);
        for (let i = 0; i < spawnN; i++) {
            caveRiseParticles.push({
                x: player.x + player.width * 0.5 + (Math.random() - 0.5) * 220,
                y: player.y + player.height - (4 + Math.random() * 10),
                vx: (Math.random() - 0.5) * 0.35,
                vy: -0.8 - Math.random() * 1.1,
                size: 0.9 + Math.random() * 1.4,
                alpha: 0.48 + Math.random() * 0.26,
                pulse: Math.random() * Math.PI * 2
            });
        }
        caveRiseNextSpawnAt = now + 80;
    }
    if (caveRiseParticles.length > CAVE_RISE_PARTICLE_MAX) {
        caveRiseParticles.splice(0, caveRiseParticles.length - CAVE_RISE_PARTICLE_MAX);
    }
    for (let i = caveRiseParticles.length - 1; i >= 0; i--) {
        const p = caveRiseParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy -= 0.008;
        p.alpha -= 0.0045 + windN * 0.0013;
        p.pulse += 0.08;
        if (p.alpha <= 0.02 || p.y < -220) caveRiseParticles.splice(i, 1);
    }
}

function drawScene1CaveRiseParticles() {
    return;
    if (transition.scene2Blend >= 0.01 || !caveRiseParticles.length) return;
    ctx.save();
    for (let i = 0; i < caveRiseParticles.length; i++) {
        const p = caveRiseParticles[i];
        const sx = p.x - camera.x;
        if (sx < -20 || sx > width + 20) continue;
        const rr = p.size * (0.9 + 0.28 * Math.sin(p.pulse));
        ctx.globalAlpha = Math.max(0, Math.min(1, p.alpha));
        ctx.shadowBlur = 8;
        ctx.shadowColor = "rgba(255,255,255,0.9)";
        ctx.fillStyle = "rgba(245,248,252,0.95)";
        ctx.beginPath();
        ctx.arc(sx, p.y, rr, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
}

function updateScene1ForegroundDust(windN, gust) {
    return;
    if (transition.scene2Blend >= 0.01) {
        scene1FgDust.length = 0;
        return;
    }
    const now = performance.now();
    if (now >= scene1FgDustNextSpawnAt) {
        const spawnN = 3 + Math.floor(Math.random() * 3);
        for (let i = 0; i < spawnN; i++) {
            const yMin = height * 0.08;
            const yMax = height - groundH - 24;
            scene1FgDust.push({
                x: camera.x + width + 20 + Math.random() * 180,
                y: yMin + Math.random() * (yMax - yMin),
                vx: -(4.8 + Math.random() * 4.2 + windN * 2.8 * gust),
                vy: (Math.random() - 0.5) * 0.22,
                life: 40 + Math.random() * 38,
                size: 0.55 + Math.random() * 1.1
            });
        }
        scene1FgDustNextSpawnAt = now + 34;
    }

    for (let i = scene1FgDust.length - 1; i >= 0; i--) {
        const p = scene1FgDust[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
        if (p.life <= 0 || p.x < camera.x - 120) scene1FgDust.splice(i, 1);
    }
}

function drawScene1ForegroundDust() {
    return;
    if (transition.scene2Blend >= 0.01 || !scene1FgDust.length) return;
    ctx.save();
    for (let i = 0; i < scene1FgDust.length; i++) {
        const p = scene1FgDust[i];
        const sx = p.x - camera.x;
        if (sx < -20 || sx > width + 20) continue;
        const a = Math.max(0, Math.min(1, p.life / 60));
        ctx.globalAlpha = 0.18 + a * 0.42;
        ctx.strokeStyle = "rgba(238,242,246,0.95)";
        ctx.lineWidth = p.size;
        ctx.beginPath();
        ctx.moveTo(sx, p.y);
        ctx.lineTo(sx + 5 + p.size * 2.8, p.y - 0.3);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawScene1CaveFollowBeams() {
    if (!isPlayerInScene1Cave()) return;
    const beamFadeInStartX = 22222;
    const beamFadeInEndX = 23120;
    const beamFadeInT = Math.max(0, Math.min(1, (player.x - beamFadeInStartX) / (beamFadeInEndX - beamFadeInStartX)));
    const beamFadeInAlpha = beamFadeInT * beamFadeInT * (3 - 2 * beamFadeInT);
    const beamFadeStartX = 26000;
    const beamFadeEndX = 26626;
    const beamFadeT = (player.x - beamFadeStartX) / (beamFadeEndX - beamFadeStartX);
    const beamFadeAlpha = 1 - Math.max(0, Math.min(1, beamFadeT));
    const beamAlpha = beamFadeInAlpha * beamFadeAlpha;
    if (beamAlpha <= 0.001) return;
    // 光束跟随人物，同时叠加微小视差（与山洞背景不同步）
    const beamParallax = camera.x * 0.01 + Math.sin(performance.now() * 0.0013 + 0.7) * 4;
    const baseX = player.x - camera.x + player.width * 0.5 + beamParallax;
    const baseY = -height * 0.08;
    const beamImg = images.lv1_cave_beam_left_01;
    if (isImageReady(beamImg)) {
        // 使用上传图片：仅保留左束；透明度降低一半
        const drawH = height * 1.05;
        const drawW = drawH * (beamImg.width / Math.max(1, beamImg.height));
        const topY = -height * 0.02;

        ctx.save();
        ctx.globalAlpha = 0.5 * beamAlpha;
        const leftX = baseX - drawW * 0.62;
        ctx.drawImage(beamImg, leftX, topY, drawW, drawH);
        ctx.globalAlpha = 1.0;
        ctx.restore();
        return;
    }

    // 回退：程序化单束 45° 光束（半透明）
    const t = performance.now() * 0.0018;
    const beamLen = height * 1.35;
    const beamW = Math.max(28, width * 0.025);
    ctx.save();
    const flicker = 0.85 + 0.15 * Math.sin(t * 1.2 + 1.3);
    ctx.globalAlpha = 0.5 * beamAlpha;
    ctx.translate(baseX - 70, baseY);
    ctx.rotate(Math.PI * 0.25);
    const g = ctx.createLinearGradient(0, 0, 0, beamLen);
    g.addColorStop(0.0, `rgba(245,248,255,${0.22 * flicker})`);
    g.addColorStop(0.55, `rgba(225,232,242,${0.22 * 0.52 * flicker})`);
    g.addColorStop(1.0, "rgba(210,220,232,0)");
    ctx.fillStyle = g;
    ctx.shadowBlur = 12;
    ctx.shadowColor = `rgba(238,244,252,${0.55 * flicker})`;
    ctx.fillRect(-beamW * 0.5, 0, beamW, beamLen);
    ctx.globalAlpha = 1.0;
    ctx.restore();
}

function drawBirdSwarm() {
    birdsSwarm.forEach(b => {

        ctx.moveTo(0, 0);

function drawWhiteBirds() {

function drawWatercolorBlobs() {
    watercolorBlobs.forEach(w => {
        const t = Date.now() * 0.0002 + w.phase;
        const g = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, Math.max(w.rx, w.ry) * 1.2);
        g.addColorStop(0, `rgba(255,210,215,${w.a})`);
        g.addColorStop(0.55, `rgba(238,170,178,${w.a * 0.65})`);
        g.addColorStop(1, "rgba(230,150,162,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        const steps = 30;
        for (let i = 0; i <= steps; i++) {
            const a = (i / steps) * Math.PI * 2;
            const n1 = Math.sin(a * 3 + t + w.x * 0.0012) * 0.28;
            const n2 = Math.cos(a * 7 - t * 1.3 + w.y * 0.0009) * 0.18;
            const rx = w.rx * (1 + n1 + n2);
            const ry = w.ry * (1 + n1 * 0.8 - n2 * 0.6);
            const x = w.x + Math.cos(a) * rx;
            const y = w.y + Math.sin(a) * ry;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
    });
}

function drawMountainTrees(list, alphaMul = 1) {
    if (transition.scene2Blend < 0.01) return;
    list.forEach(t => {
        const x = t.x - camera.x;
        if (x < -120 || x > width + 120) return;
        const groundY = getGroundHeight(t.x, 9999);
        ctx.fillStyle = `rgba(255,255,255,${0.62 * alphaMul})`;
        const topX = x + t.lean * 10;
        const topY = groundY - t.h;
        ctx.beginPath();
        ctx.moveTo(x - t.w * 0.4, groundY);
        ctx.lineTo(x + t.w * 0.4, groundY);
        ctx.lineTo(topX + t.w * 0.65, topY);
        ctx.lineTo(topX - t.w * 0.65, topY);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.arc(topX, topY, t.w * 1.2, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawFloatingShards(frontLayer = false) {
    if (transition.scene2Blend < SCENE2_SHARDS_SHOW_BLEND || !windTransition.done) return;
    floatingShards.forEach(s => {
        if (!!s.frontLayer !== !!frontLayer) return;
        const rp = Math.max(0, Math.min(1, s.revealProgress || 0));
        if (rp <= 0.001) return;
        const x = s.x + (s.windOffset || 0) - camera.x;
        if (x < -260 || x > width + 260) return;
        const groundY = getGroundHeight(s.x, 9999);
        const entryEase = rp * rp * (3 - 2 * rp);
        const dropFromSky = (1 - entryEase) * (s.entryDropPx || (height * 0.2));
        const y = groundY - s.yOffset - dropFromSky + Math.sin(s.bob) * s.bobAmp;
        s.rot += s.rotSpd;
        const shardScale = 0.5;
        const lit = 0.5 + 0.5 * Math.sin(s.rot + s.x * 0.0002);
        const useAccent = s.colorGroup === 'frontAccent';
        const baseBody = useAccent
            ? [232 + Math.round(lit * 18), 224 + Math.round(lit * 14), 228 + Math.round(lit * 14)]
            : [220 + Math.round(lit * 16), 212 + Math.round(lit * 12), 218 + Math.round(lit * 12)];

        // 主体 + 分面 + 边缘高光，增强碎石立体感
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(s.rot);
        ctx.scale(shardScale, shardScale);
        ctx.globalAlpha = rp;

        ctx.fillStyle = `rgb(${baseBody[0]},${baseBody[1]},${baseBody[2]})`;
        ctx.beginPath();
        ctx.moveTo(s.poly[0].x, s.poly[0].y);
        for (let i=1; i<s.poly.length; i++) ctx.lineTo(s.poly[i].x, s.poly[i].y);
        ctx.closePath();
        ctx.fill();

        const cx = s.poly.reduce((sum, p) => sum + p.x, 0) / s.poly.length;
        const cy = s.poly.reduce((sum, p) => sum + p.y, 0) / s.poly.length;
        for (let i=0; i<s.poly.length; i++) {
            const a = s.poly[i];
            const b = s.poly[(i + 1) % s.poly.length];
            const faceLit = 0.5 + 0.5 * Math.sin(s.rot + i * 1.13);
            const fr = (useAccent ? 224 : 212) + Math.round(faceLit * (useAccent ? 20 : 18));
            const fg = (useAccent ? 214 : 204) + Math.round(faceLit * (useAccent ? 16 : 14));
            const fb = (useAccent ? 220 : 210) + Math.round(faceLit * (useAccent ? 16 : 14));
            ctx.fillStyle = `rgb(${fr},${fg},${fb})`;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();
    });
}

function drawRubbleDragonbonesMid() {
    if (transition.scene2Blend < 0.01) return;
    rubbleDragonbonesMid.forEach(b => {
        const x = b.x - camera.x;
        if (x < -180 || x > width + 180) return;
        const gY = getGroundHeight(b.x, 9999) - b.yLift;
        const h = b.h;
        const w = b.w;
        const lean = b.tilt;
        const topX = x + lean * h * 0.42;
        const baseL = x - w * 0.5;
        const baseR = x + w * 0.5;

        // 主体长三角（白色碎石龙骨
        ctx.fillStyle = `rgba(${220 + Math.round(b.tone * 24)},${220 + Math.round(b.tone * 22)},${224 + Math.round(b.tone * 20)},${b.alpha})`;
        ctx.beginPath();
        ctx.moveTo(topX, gY - h);
        ctx.lineTo(baseR, gY);
        ctx.lineTo(baseL, gY);
        ctx.closePath();
        ctx.fill();

        // 四边形分�?1
        ctx.fillStyle = `rgba(${198 + Math.round(b.tone * 20)},${198 + Math.round(b.tone * 18)},${204 + Math.round(b.tone * 18)},${Math.min(1, b.alpha + 0.1)})`;
        ctx.beginPath();
        ctx.moveTo(topX - w * 0.08, gY - h * 0.78);
        ctx.lineTo(topX + w * 0.16, gY - h * 0.84);
        ctx.lineTo(x + w * 0.24, gY - h * 0.28);
        ctx.lineTo(x - w * 0.02, gY - h * 0.2);
        ctx.closePath();
        ctx.fill();

        // 四边形分�?2（暗面）
        ctx.fillStyle = `rgba(${170 + Math.round(b.tone * 16)},${170 + Math.round(b.tone * 14)},${178 + Math.round(b.tone * 14)},${Math.min(1, b.alpha + 0.12)})`;
        ctx.beginPath();
        ctx.moveTo(topX - w * 0.12, gY - h * 0.7);
        ctx.lineTo(topX - w * 0.02, gY - h * 0.76);
        ctx.lineTo(x - w * 0.16, gY - h * 0.12);
        ctx.lineTo(x - w * 0.32, gY - h * 0.08);
        ctx.closePath();
        ctx.fill();

        // 细长次级骨刺（三角）
        const sTopX = x + w * (0.55 + b.ridge * 0.2);
        const sTopY = gY - h * (0.45 + b.ridge * 0.35);
        ctx.fillStyle = `rgba(${228 + Math.round(b.tone * 16)},${228 + Math.round(b.tone * 14)},${232 + Math.round(b.tone * 14)},${Math.min(1, b.alpha + 0.06)})`;
        ctx.beginPath();
        ctx.moveTo(sTopX, sTopY);
        ctx.lineTo(x + w * 0.32, gY - h * 0.02);
        ctx.lineTo(x + w * 0.16, gY - h * 0.08);
        ctx.closePath();
        ctx.fill();

        // 组内“龙骨串”连接感
        ctx.strokeStyle = `rgba(152,152,160,${0.2 + b.alpha * 0.25})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(x - w * 0.42, gY - h * 0.06);
        ctx.lineTo(x + w * 0.44, gY - h * (0.08 + 0.04 * Math.sin((b.groupSeed || 0) * 6.3)));
        ctx.stroke();

        // 边线
        ctx.strokeStyle = `rgba(110,110,118,${0.22 + b.alpha * 0.24})`;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(topX, gY - h);
        ctx.lineTo(baseR, gY);
        ctx.lineTo(baseL, gY);
        ctx.closePath();
        ctx.stroke();
    });
}

function drawArchBridge() {
    if (transition.scene2Blend < 0.01) return;
    const bridgeDrawStartX = SCENE2_ARCH_BRIDGE_START_X;
    const bridgeDrawEndX = Math.min(SCENE2_ARCH_BRIDGE_END_X, SCENE2_BROKEN_PLATFORM_START_X);
    const bridgeStartSx = bridgeDrawStartX - camera.x;
    const bridgeEndSx = bridgeDrawEndX - camera.x;
    const bayW = SCENE2_ARCH_BRIDGE_WIDTH / SCENE2_ARCH_COUNT;
    const startBay = Math.max(0, Math.floor((bridgeDrawStartX - SCENE2_ARCH_BRIDGE_START_X) / bayW));
    const endBay = Math.min(SCENE2_ARCH_COUNT - 1, Math.ceil((bridgeDrawEndX - SCENE2_ARCH_BRIDGE_START_X) / bayW));
    // 以最后实际绘制的 bay 右端为剔除基准，避免超出 bridgeDrawEndX �?bay 桥墩突然闪失
    const actualRightSx = SCENE2_ARCH_BRIDGE_START_X + (endBay + 1) * bayW - camera.x;
    if (actualRightSx < -300 || bridgeStartSx > width + 300) return;

    const deckY = getScene2ArchBridgeDeckY();
    const deckTopY = deckY;
    const bridgeBodyW = bridgeEndSx - bridgeStartSx;
    const bodyColor = "rgba(252,252,252,0.98)";

    // 实心水平桥面（顶边与平台地面齐平，厚度向下）
    if (bridgeBodyW > 0) {
        ctx.fillStyle = bodyColor;
        ctx.fillRect(bridgeStartSx, deckTopY, bridgeBodyW, SCENE2_ARCH_BRIDGE_DECK_THICKNESS);
    }

    const drawBraceRect = (x1, y1, x2, y2, thickness, fill) => {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.hypot(dx, dy);
        if (len < 1) return;
        const ang = Math.atan2(dy, dx);
        ctx.save();
        ctx.translate(x1, y1);
        ctx.rotate(ang);
        ctx.fillStyle = fill;
        ctx.fillRect(0, -thickness * 0.5, len, thickness);
        ctx.restore();
    };

    // 中大边小：拱门尺寸向两侧递减 + 镂空框架
    for (let i = startBay; i <= endBay; i++) {
        const centerXWorld = SCENE2_ARCH_BRIDGE_START_X + bayW * (i + 0.5);
        const sx = centerXWorld - camera.x;
        if (sx < -bayW || sx > width + bayW) continue;
        const n = (i + 0.5) / SCENE2_ARCH_COUNT; // 0..1
        const centerFalloff = 1 - Math.abs(n - 0.5) * 2;
        const scale = 0.55 + centerFalloff * 0.7;
        const archR = bayW * (0.18 + 0.22 * scale);
        const archBaseY = deckY + archR + 48; // 拱门整体下移
        const legBottom = deckY + (SCENE2_ARCH_BRIDGE_HEIGHT * (0.5 + 0.42 * scale));
        const legW = Math.max(8, bayW * 0.08);

        // 左右立柱
        ctx.fillStyle = bodyColor;
        ctx.fillRect(sx - archR - legW, deckY, legW, legBottom - deckY);
        ctx.fillRect(sx + archR, deckY, legW, legBottom - deckY);

        // 拱门内部矩形钢架：交错斜�?+ 横向矩形梁（只填充，不描线）
        const leftIn = sx - archR + legW * 0.8;
        const rightIn = sx + archR - legW * 0.8;
        const topIn = deckY + 18;
        const midIn = archBaseY - archR * 0.18;
        const botIn = Math.min(legBottom - 10, archBaseY + archR * 0.22);
        const braceColor = "rgba(246,246,248,0.9)";
        const braceW = Math.max(2, bayW * 0.012);

        // �?X 交叉
        drawBraceRect(leftIn, topIn, rightIn, botIn, braceW, braceColor);
        drawBraceRect(rightIn, topIn, leftIn, botIn, braceW, braceColor);
        // 二层交错
        drawBraceRect(leftIn + (rightIn - leftIn) * 0.16, topIn + 4, rightIn - (rightIn - leftIn) * 0.10, midIn, braceW * 0.82, braceColor);
        drawBraceRect(rightIn - (rightIn - leftIn) * 0.16, topIn + 4, leftIn + (rightIn - leftIn) * 0.10, midIn, braceW * 0.82, braceColor);
        // 横向矩形
        ctx.fillStyle = braceColor;
        const beamH = Math.max(2, braceW * 0.72);
        ctx.fillRect(leftIn + 6, midIn - beamH * 0.5, (rightIn - leftIn) - 12, beamH);
        ctx.fillRect(leftIn + 10, botIn - 6 - beamH * 0.5, (rightIn - leftIn) - 20, beamH);
        // 纵向短梁，增加块面细
        const colW = Math.max(2, braceW * 0.55);
        ctx.fillRect(sx - colW * 0.5, topIn + 8, colW, botIn - topIn - 16);
        ctx.fillRect(sx - archR * 0.34, topIn + 12, colW, midIn - topIn - 6);
        ctx.fillRect(sx + archR * 0.34 - colW, topIn + 12, colW, midIn - topIn - 6);

        // 桥面附加细节：上缘分段压�?+ 细块面，增强纪念性结构感
        const capY = deckY + 4 + (i % 2) * 1.5;
        const capW = bayW * 0.72;
        const capX = sx - capW * 0.5;
        ctx.fillStyle = "rgba(238,238,241,0.96)";
        ctx.fillRect(capX, capY, capW, Math.max(2, bayW * 0.015));
        ctx.fillStyle = "rgba(224,224,228,0.9)";
        const tileW = Math.max(8, bayW * 0.085);
        for (let tx = capX + 4; tx < capX + capW - 6; tx += tileW + 4) {
            ctx.fillRect(tx, capY + 4, tileW, Math.max(2, bayW * 0.012));
        }
    }
}

function drawBrokenBridgePlatforms() {
    if (transition.scene2Blend < 0.01) return;
    if (player.x >= SCENE2_BROKEN_PLATFORM_END_X + 220) return; // 过了断桥末端后再隐藏，避�?50000 前后突然消失
    if (!brokenBridgePlatforms.length) return;
    const deckY = getScene2ArchBridgeDeckY();
    const topColor = "rgba(252,252,252,0.98)";
    const bodyColor = "rgba(240,240,244,0.94)";
    const pierColor = "rgba(236,236,240,0.9)";
    const accentColor = "rgba(218,218,224,0.82)";

    brokenBridgePlatforms.forEach((p, idx) => {
        const x = p.x - camera.x;
        if (x > width + 260 || x + p.w < -260) return;
        const topY = deckY;
        const bodyH = SCENE2_ARCH_BRIDGE_DECK_THICKNESS + 12;

        ctx.fillStyle = bodyColor;
        ctx.fillRect(x, topY, p.w, bodyH);
        ctx.fillStyle = topColor;
        ctx.fillRect(x, topY, p.w, SCENE2_ARCH_BRIDGE_DECK_THICKNESS);

        // 顶面矩形块面细节
        const notchW = 26;
        ctx.fillStyle = accentColor;
        for (let nx = x + 12; nx < x + p.w - 16; nx += notchW + 10) {
            ctx.fillRect(nx, topY + 4 + ((idx + Math.floor(nx)) % 2), notchW, 4);
        }

        // 桥墩（双墩），保持与断桥矩形平台同构
        const pierW = Math.max(16, p.w * 0.12);
        const pierY = topY + bodyH - 2;
        const pierH = p.pierDepth;
        ctx.fillStyle = pierColor;
        ctx.fillRect(x + p.w * 0.22 - pierW * 0.5, pierY, pierW, pierH);
        ctx.fillRect(x + p.w * 0.78 - pierW * 0.5, pierY, pierW, pierH * 0.92);

        // 竖向压条，增加桥墩立体细
        ctx.fillStyle = "rgba(222,222,228,0.88)";
        ctx.fillRect(x + p.w * 0.22 - pierW * 0.2, pierY + 6, pierW * 0.16, pierH - 10);
        ctx.fillRect(x + p.w * 0.78 - pierW * 0.2, pierY + 6, pierW * 0.16, pierH * 0.92 - 10);
    });
}

function drawZFloatingOrganicTrees() {
    if (!zOrganicTrees.length) return;
    zOrganicTrees.forEach((t) => {
        const sx = t.x - camera.x;
        if (sx < -200 || sx > width + 200) return;
        const unfold = t.unfold * t.unfold * (3 - 2 * t.unfold);
        if (unfold < 0.01) return;
        const h = t.h * (0.35 + unfold * 0.75);
        const sway = Math.sin(performance.now() * 0.0015 + t.seed) * 8 * unfold;
        const trunkW = 5 + unfold * 6;
        const colorL = Math.round(228 * t.tone);
        const colorM = Math.round(214 * t.tone);
        const colorD = Math.round(192 * t.tone);
        ctx.save();
        ctx.translate(sx, t.y + 1);
        ctx.fillStyle = `rgba(${colorL},${colorM},${colorD},0.92)`;
        ctx.beginPath();
        ctx.moveTo(-trunkW * 0.5, 0);
        ctx.bezierCurveTo(
            -trunkW * (0.5 + 0.8 * t.bend), -h * 0.24,
            trunkW * (0.4 + 0.7 * t.bend) + sway * 0.2, -h * 0.58,
            sway * 0.35, -h
        );
        ctx.bezierCurveTo(
            sway * 0.55 + trunkW * (0.7 - 0.4 * t.bend), -h * 0.54,
            -trunkW * (0.3 - 0.4 * t.bend), -h * 0.22,
            trunkW * 0.52, 0
        );
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(110,94,104,0.68)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, -h * 0.04);
        ctx.bezierCurveTo(trunkW * (0.7 + t.bend), -h * 0.28, -trunkW * (0.45 + t.bend), -h * 0.66, sway * 0.35, -h);
        ctx.stroke();

        const leafColor = "rgba(236,226,231,0.9)";
        ctx.fillStyle = leafColor;
        const leafN = 4;
        for (let i = 0; i < leafN; i++) {
            const lt = (i + 1) / (leafN + 1);
            const ly = -h * (0.18 + lt * 0.72);
            const lx = Math.sin(lt * Math.PI * (1.1 + t.bend)) * (12 + 16 * unfold) + sway * 0.22;
            const lw = 10 + unfold * 15 - i * 1.2;
            const lh = 5 + unfold * 8 - i * 0.8;
            ctx.beginPath();
            ctx.moveTo(lx - lw * 0.5, ly);
            ctx.lineTo(lx + lw * 0.52, ly - lh * 0.2);
            ctx.lineTo(lx + lw * 0.18, ly + lh * 0.7);
            ctx.lineTo(lx - lw * 0.64, ly + lh * 0.34);
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();
    });
}

function drawZFloatingPlatforms() {
    if (!zFloatingPlatforms.length) return;
    const bodyPalette = [
        [248, 244, 246],
        [244, 238, 242],
        [241, 235, 238]
    ];
    zFloatingPlatforms.forEach((p, i) => {
        const sx = p.x - camera.x;
        if (sx < -320 || sx > width + 320) return;
        ctx.save();
        ctx.translate(sx, p.y);

        const c = bodyPalette[i % bodyPalette.length];
        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.98)`;
        ctx.beginPath();
        ctx.moveTo(p.poly[0].x, p.poly[0].y);
        for (let k = 1; k < p.poly.length; k++) ctx.lineTo(p.poly[k].x, p.poly[k].y);
        ctx.closePath();
        ctx.fill();

        // 扁平分面：轻微明暗块面，避免大渐
        const cx = p.poly.reduce((sum, n) => sum + n.x, 0) / p.poly.length;
        const cy = p.poly.reduce((sum, n) => sum + n.y, 0) / p.poly.length;
        for (let k = 0; k < p.poly.length; k++) {
            const a = p.poly[k];
            const b = p.poly[(k + 1) % p.poly.length];
            const lit = 0.86 + 0.08 * Math.sin(i * 0.9 + k * 1.2);
            const fr = Math.round(c[0] * lit);
            const fg = Math.round(c[1] * lit);
            const fb = Math.round(c[2] * lit);
            ctx.fillStyle = `rgba(${fr},${fg},${fb},0.32)`;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.closePath();
            ctx.fill();
        }

        // 细折线网格（深灰/暗红
        ctx.strokeStyle = "rgba(116,88,98,0.42)";
        ctx.lineWidth = 0.8;
        p.patchLines.forEach((ln) => {
            ctx.beginPath();
            ctx.moveTo(ln.x0, ln.y0);
            ctx.lineTo(ln.x1, ln.y1);
            ctx.stroke();
        });

        // 外轮
        ctx.strokeStyle = "rgba(92,72,82,0.74)";
        ctx.lineWidth = 1.05;
        ctx.beginPath();
        ctx.moveTo(p.poly[0].x, p.poly[0].y);
        for (let k = 1; k < p.poly.length; k++) ctx.lineTo(p.poly[k].x, p.poly[k].y);
        ctx.closePath();
        ctx.stroke();

        // 伴随碎片
        p.shards.forEach((sPoly, idx) => {
            const tint = idx % 2 === 0 ? "rgba(244,238,241,0.92)" : "rgba(238,230,235,0.9)";
            ctx.fillStyle = tint;
            ctx.beginPath();
            ctx.moveTo(sPoly[0].x, sPoly[0].y);
            for (let m = 1; m < sPoly.length; m++) ctx.lineTo(sPoly[m].x, sPoly[m].y);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "rgba(100,82,92,0.62)";
            ctx.lineWidth = 0.8;
            ctx.stroke();
        });

        ctx.restore();
    });
}

function drawGiantStatueScene2() {
    // 终点双雕像由 drawEndpointTwinStatues() 负责，旧单雕像渲染禁
    if (!ENABLE_GIANT_STATUE) return;
    if (!giantStatueEvent.active) return;

    const sx = giantStatueEvent.statueX - camera.x;
    const w = giantStatueEvent.statueW;

    const topY = giantStatueEvent.statueTopY;

    ctx.save();

function drawGiantStardustPath() {
    if (!giantStatueEvent.active) return;
    const pulseT = giantStatueEvent.anchorPulse;

    if (!giantStatueEvent.activated && !giantStatueEvent.finalJumpStarted) {
        const ax = giantStatueEvent.anchorX - camera.x;
        const ay = giantStatueEvent.anchorY;
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(255,255,255,0.95)";
        ctx.fillStyle = "rgba(255,255,255,0.98)";
        ctx.beginPath();
        ctx.arc(ax, ay, 6.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        for (let i = 0; i < 3; i++) {
            const r = 16 + i * 11 + Math.sin(pulseT + i * 0.9) * 2.5;
            ctx.strokeStyle = `rgba(255,255,255,${0.52 - i * 0.14})`;
            ctx.lineWidth = 1.4 - i * 0.25;
            ctx.beginPath();
            ctx.arc(ax, ay, r, 0, Math.PI * 2);
            ctx.stroke();
        }
        ctx.restore();
    }

    if (!giantStatueEvent.activated && !giantStatueEvent.finalJumpStarted) return;
    const pts = giantStatueEvent.pathPoints;
    const lit = giantStatueEvent.pathLit;
    if (!pts.length) return;

    ctx.save();
    ctx.lineCap = "round";
    for (let i = 0; i < pts.length - 1; i++) {
        const segLit = giantStatueEvent.finalJumpStarted || (lit[i] && lit[i + 1]);
        if (!segLit) continue;
        const a = pts[i];
        const b = pts[i + 1];
        ctx.strokeStyle = "rgba(255,255,255,0.86)";
        ctx.lineWidth = 1.6;
        ctx.shadowBlur = 9;
        ctx.shadowColor = "rgba(255,255,255,0.82)";
        ctx.beginPath();
        ctx.moveTo(a.x - camera.x, a.y);
        ctx.lineTo(b.x - camera.x, b.y);
        ctx.stroke();
    }
    ctx.shadowBlur = 0;
    for (let i = 0; i < pts.length; i++) {
        if (!giantStatueEvent.finalJumpStarted && !lit[i]) continue;
        const p = pts[i];
        const px = p.x - camera.x;
        const py = p.y;
        const tw = Date.now() * 0.008 + i * 0.7;
        const rr = 4.2 + Math.sin(tw) * 0.9;
        ctx.shadowBlur = 18;
        ctx.shadowColor = "rgba(255,255,255,0.96)";
        ctx.fillStyle = "rgba(255,255,255,0.98)";
        ctx.beginPath();
        ctx.arc(px, py, rr, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawBridgeSkyCurtain() {
    return; // 按需求移除背景矩形横竖条天幕
    if (transition.scene2Blend < 0.01) return;
    if (!skyCurtain.active) return;
    if (player.x < SCENE2_ARCH_BRIDGE_START_X - 120) return;

    const elapsed = Math.max(0, performance.now() - (skyCurtain.startedAt || performance.now()));
    const runDist = Math.min(2600, elapsed * 0.9);
    const span = width * 1.4;
    const laneN = 22;
    const dark = "rgba(208,58,74,0.82)";
    const darker = "rgba(186,46,62,0.86)";

    ctx.save();
    for (let i = 0; i < laneN; i++) {
        const seed = i * 1.37 + 0.91;
        const sx = ((i / (laneN - 1)) * span - width * 0.2) + Math.sin(seed * 2.8) * 24;
        const w = 14 + (i % 4) * 10;
        const fallT = Math.max(0, Math.min(1, (runDist - i * 120) / 1400));
        const ease = fallT * fallT * (3 - 2 * fallT);
        const h = (height * (0.35 + (i % 5) * 0.11)) * ease;
        if (h <= 2) continue;

        ctx.fillStyle = (i % 3 === 0) ? darker : dark;
        ctx.fillRect(sx, -8, w, h);

    }

    // 横向拼接梁，随着奔跑逐段下落出现
    for (let j = 0; j < 3; j++) {
        const t = Math.max(0, Math.min(1, (runDist - 520 - j * 420) / 1200));
        if (t <= 0.01) continue;
        const e = t * t * (3 - 2 * t);
        const y = height * (0.18 + j * 0.14) * e;
        const x = width * (0.08 + j * 0.1);
        const w = width * (0.68 - j * 0.12);
        const h = 16 + j * 6;
        ctx.fillStyle = j === 1 ? darker : dark;
        ctx.fillRect(x, y, w, h);
    }
    ctx.restore();
}

function drawFarRectTriPeaks() {
    if (transition.scene2Blend < 0.01) return;
    farRectTriPeaks.forEach(p => {
        const x = p.x - camera.x;
        if (x < -460 || x > width + 460) return;
        const gY = getGroundHeight(p.x, 9999) - p.yLift;
        const topX = x + p.skew * p.h;
        const topY = gY - p.h;
        const halfW = p.w * 0.5;

        // 矩形化三角主
        ctx.fillStyle = `rgba(196,130,142,${p.alpha})`;
        ctx.beginPath();
        ctx.moveTo(topX - halfW * 0.05, topY);
        ctx.lineTo(x + halfW, gY);
        ctx.lineTo(x - halfW, gY);
        ctx.closePath();
        ctx.fill();

        // 切面矩形块，模拟参考图中的大片几何
        ctx.fillStyle = `rgba(222,168,178,${p.alpha * 0.7})`;
        ctx.beginPath();
        ctx.moveTo(topX - halfW * 0.12, topY + p.h * 0.26);
        ctx.lineTo(topX + halfW * 0.33, topY + p.h * 0.22);
        ctx.lineTo(x + halfW * 0.19, gY - p.h * 0.08);
        ctx.lineTo(x - halfW * 0.24, gY - p.h * 0.02);
        ctx.closePath();
        ctx.fill();
    });
}

function drawWindTransitionColumn() {
    if (player.x >= SCENE2_RAMP_START_X - 120) return;

    if (x < -180 || x > width + 180) return;
    const gY = getGroundHeight(windTransition.columnX, 9999);
    const h = height * 0.10;
    const w = h * 0.5;
    const windN = Math.max(0, Math.min(1, windTransition.intensity / 100));
    const sway = Math.sin(performance.now() * 0.004) * 1.1 * windN;

    ctx.save();
    ctx.translate(x + sway, gY);
    ctx.fillStyle = 'rgb(16,16,16)';
    // T 顶横
    ctx.fillRect(-w, -h, w * 2, h * 0.24);

}

function drawWindInkOverlay() {
    const windN = Math.max(0, Math.min(1, windTransition.intensity / 100));
    if (windN < 0.02) return;
    const now = performance.now() * 0.001;
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    for (let i = 0; i < 7; i++) {
        const y = height * (0.12 + i * 0.16) + Math.sin(now * (1.1 + i * 0.2) + i * 1.7) * (12 + i * 8);
        const amp = (52 + i * 19) * windN;
        const xOffset = (now * (340 + i * 125) * windN) % (width + 380) - 190;
        const g = ctx.createLinearGradient(xOffset - amp, y - 24, xOffset + width * 0.75, y + 26);
        g.addColorStop(0, `rgba(70,40,52,${0.04 + windN * 0.08})`);
        g.addColorStop(0.5, `rgba(120,72,88,${0.08 + windN * 0.12})`);
        g.addColorStop(1, 'rgba(20,12,16,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(-220, y - 16);
        ctx.bezierCurveTo(width * 0.24, y - amp * 0.22, width * 0.56, y + amp * 0.18, width + 220, y + 12);
        ctx.lineTo(width + 220, y + 42);
        ctx.bezierCurveTo(width * 0.64, y + amp * 0.28, width * 0.25, y - amp * 0.12, -220, y + 22);
        ctx.closePath();
        ctx.fill();
    }
    ctx.restore();
}

function drawSnowAndFlowers() {
    if (transition.scene2Blend < 0.01) return;
    const baseGroundY = height - groundH;
    snowPiles.forEach(s => {
        if (isSkyPathForbiddenForProps(s.x)) return;
        // 第二关断桥/悬浮空域不画雪堆
        if (s.x >= SCENE2_BROKEN_PLATFORM_START_X) return;
        const sx = s.x - camera.x;
        if (sx < -200 || sx > width + 200) return;
        const gy = getGroundHeight(s.x, 9999);
        if (gy > height + 1000) return;
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.beginPath();
        ctx.moveTo(sx - s.w * 0.5, gy);
        ctx.quadraticCurveTo(sx - s.w * 0.22, gy - s.h * 0.95, sx, gy - s.h);
        ctx.quadraticCurveTo(sx + s.w * 0.24, gy - s.h * 0.9, sx + s.w * 0.5, gy);
        ctx.closePath();
        ctx.fill();
    });
    redFlowers.forEach(f => {
        if (isSkyPathForbiddenForProps(f.x)) return;
        // 明确禁用 50000 之后的白色小花。
        if (f.x >= 50000) return;
        const fx = f.x - camera.x;
        if (fx < -50 || fx > width + 50) return;
        const gy = getGroundHeight(f.x, 9999);
        if (gy > height + 1000) return;
        if (Math.abs(gy - baseGroundY) > height * 4) return;
        const tipX = fx + Math.sin(f.tilt) * 2.6;
        const tipY = gy - f.h;
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(fx, gy);
        ctx.lineTo(tipX, tipY);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.beginPath();
        ctx.arc(tipX, tipY, f.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawOrganicBranch(v) {

        if (getHandObstacleY(v.x) != null) return;
    }
    const t = transition.scene2Blend;
    const branchColor = t > 0 ? lerpColor("000000", "ffffff", t) : "#000";
    const slopeSinkY = (v.x >= SCENE2_RAMP_START_X) ? 12 : 0;
    ctx.save(); ctx.translate(vx, gy + slopeSinkY); ctx.scale(1, v.growth); ctx.fillStyle = branchColor;
    ctx.beginPath(); ctx.moveTo(-v.thickness / 2, 0); 
    ctx.bezierCurveTo(v.curvePoints[1].dx - v.thickness / 2.5, v.curvePoints[1].dy, v.curvePoints[2].dx - v.thickness / 6, v.curvePoints[2].dy, v.curvePoints[3].dx, v.curvePoints[3].dy);
    ctx.bezierCurveTo(v.curvePoints[2].dx + v.thickness / 10, v.curvePoints[2].dy, v.curvePoints[1].dx + v.thickness / 3, v.curvePoints[1].dy, v.thickness / 2, 0);
    ctx.closePath(); ctx.fill();
    ctx.restore();
}

function drawLinedMountain(speed, fill, stroke, baseY, amp, seed) {
    const worldOffset = camera.x * speed; ctx.beginPath(); ctx.moveTo(camera.x - width*5, height * 15);
    const pts = [];
    for (let x = camera.x - width*5; x < camera.x + width*5; x += 38) {
        const posX = x + worldOffset;
        const macro = Math.sin(posX * 0.00062 + seed * 1.17) * 1.15 + Math.sin(posX * 0.0017 + seed * 1.9) * 0.54;
        const jag = Math.sin(posX * 0.012 + seed * 3.7) * 0.22 + Math.sin(posX * 0.028 + seed * 1.6) * 0.12;
        const cusp = (Math.abs(Math.sin(posX * 0.007 + seed * 4.2)) - 0.5) * 0.34;
        const noise = macro + jag + cusp;
        pts.push({x: x - camera.x, y: baseY + noise * (amp * 0.82)});
    }
    pts.forEach(p => ctx.lineTo(p.x, p.y)); ctx.lineTo(camera.x + width*5, height * 15); ctx.fillStyle = fill; ctx.fill();
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); pts.forEach(p => ctx.lineTo(p.x, p.y)); ctx.strokeStyle = stroke; ctx.stroke();
}

function drawVoidFallBgsFromBg1(elapsedMs) {
    if (elapsedMs < VOID_BG1_START_MS || !isImageReady(images.bg1)) return;

    let rawU = (elapsedMs - VOID_BG1_START_MS) / (VOID_FALL_MS - VOID_BG1_START_MS);
    rawU = Math.max(0, Math.min(1, rawU));
    const u = rawU * rawU * (3 - 2 * rawU);

    if (u >= 0.995) {
        ctx.drawImage(images.bg1, 0, 0, width, height);
        return;
    }

    const feather = height * 0.55;
    const rise = u * (height + feather * 0.4);
    const edge = height - rise;

    ctx.save();
    ctx.globalAlpha = 0.1 * Math.pow(u, 0.85);
    ctx.drawImage(images.bg1, 0, 0, width, height);
    ctx.restore();

    const tc = getVoidBlendCanvas();
    const tctx = tc.getContext('2d');
    tctx.clearRect(0, 0, width, height);
    tctx.drawImage(images.bg1, 0, 0, width, height);
    tctx.globalCompositeOperation = 'destination-in';
    const y0 = Math.max(0, edge - feather);
    const g = tctx.createLinearGradient(0, y0, 0, height);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.15, `rgba(255,255,255,${0.08 + u * 0.18})`);
    g.addColorStop(0.38, `rgba(255,255,255,${0.28 + u * 0.32})`);
    g.addColorStop(0.62, `rgba(255,255,255,${0.55 + u * 0.28})`);
    g.addColorStop(0.84, `rgba(255,255,255,${0.82 + u * 0.12})`);
    g.addColorStop(1, 'rgba(255,255,255,1)');
    tctx.fillStyle = g;
    tctx.fillRect(0, 0, width, height);
    tctx.globalCompositeOperation = 'source-over';

    ctx.save();
    ctx.filter = 'blur(4px)';
    ctx.globalAlpha = 0.92 + u * 0.08;
    ctx.drawImage(tc, 0, 0);
    ctx.restore();
    ctx.filter = 'none';

    ctx.save();
    ctx.globalCompositeOperation = 'soft-light';
    ctx.globalAlpha = 0.07 * u;
    ctx.drawImage(images.bg1, 0, 0, width, height);
    ctx.restore();
}

/** 人类式眨眼：快闭慢开，非正弦 */
function getEyeBlinkOpen(nowMs) {
    const c = 4000;
    const p = nowMs % c;
    if (p < 3100) return 1;
    if (p < 3185) {
        const u = (p - 3100) / 85;
        return 1 - u * u;
    }
    if (p < 3235) return 0.04;
    if (p < 3375) {
        const u = (p - 3235) / 140;
        return 0.04 + (1 - 0.04) * (1 - Math.pow(1 - u, 2.4));
    }
    return 1;
}

/**
 * 屏幕正中的几何「眼」：同心�?+ 中心品红�?+ 水平�?+ 虚线外环；眨眼表现为整体缩放/透明度�? * fadeMul：渐显；close01：落地后闭合为线并消失；nowMs：眨眼时钟�? */
function drawGiantVoidEyeScreenCenter(fadeMul, close01, nowMs) {
    if (fadeMul <= 0.02) return;
    const pClose = Math.max(0, close01 || 0);
    const cx = width * 0.5;
    const cy = height * 0.5;
    ctx.save();
    ctx.translate(cx, cy);

    if (pClose >= 0.18) {
        const u = Math.min(1, (pClose - 0.18) / 0.82);
        const halfW = width * 0.22 * (1 - u) * (1 - u * 0.18);
        ctx.globalAlpha = fadeMul * (1 - u * 0.22);
        ctx.strokeStyle = 'rgba(255,250,252,0.94)';
        ctx.lineWidth = Math.max(0.4, 2.8 * (1 - u * 0.88));
        ctx.beginPath();
        ctx.moveTo(-halfW, 0);
        ctx.lineTo(halfW, 0);
        ctx.stroke();
        ctx.restore();
        return;
    }

    const blinkOpen = getEyeBlinkOpen(nowMs) * Math.max(0.12, 1 - pClose * 3.2);
    const ringScale = blinkOpen * (1 - pClose * 0.95);
    const m = Math.min(width, height);

    ctx.save();
    ctx.scale(ringScale, ringScale);

    const glowR = m * 0.2;
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
    glow.addColorStop(0, 'rgba(255, 95, 210, 0.72)');
    glow.addColorStop(0.35, 'rgba(220, 50, 175, 0.38)');
    glow.addColorStop(0.72, 'rgba(150, 30, 120, 0.1)');
    glow.addColorStop(1, 'rgba(60, 8, 45, 0)');
    ctx.fillStyle = glow;
    ctx.globalAlpha = fadeMul * 0.9;
    ctx.beginPath();
    ctx.arc(0, 0, glowR * 1.06, 0, Math.PI * 2);
    ctx.fill();

    const radii = [m * 0.072, m * 0.118, m * 0.168, m * 0.218];
    ctx.lineJoin = 'round';
    radii.forEach((r, i) => {
        ctx.globalAlpha = fadeMul * (0.84 - i * 0.07);
        ctx.strokeStyle = 'rgba(255,255,255,0.93)';
        ctx.lineWidth = i === 0 ? 1.35 : 1.05;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
    });

    ctx.globalAlpha = fadeMul * 0.92;
    ctx.fillStyle = 'rgba(255,255,255,0.97)';
    const nodeR = Math.max(2.2, m * 0.0065);
    const nodeSpecs = [
        [1, 0],
        [1, Math.PI * 0.62],
        [1, Math.PI * 1.25],
        [2, Math.PI * 0.35],
        [2, Math.PI * 0.92],
        [2, Math.PI * 1.7],
        [3, Math.PI * 0.15],
        [3, Math.PI * 1.05]
    ];
    nodeSpecs.forEach(([ri, ang]) => {
        const r = radii[ri];
        ctx.beginPath();
        ctx.arc(Math.cos(ang) * r, Math.sin(ang) * r, nodeR, 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.globalAlpha = fadeMul * 0.78;
    ctx.strokeStyle = 'rgba(255,255,255,0.48)';
    ctx.lineWidth = 0.85;
    ctx.beginPath();
    ctx.moveTo(-m * 0.26, 0);
    ctx.lineTo(m * 0.26, 0);
    ctx.stroke();

    ctx.setLineDash([5, 9]);
    ctx.globalAlpha = fadeMul * 0.4;
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, radii[3] * 1.32, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
    ctx.restore();
}

function draw() {
    sanitizeCameraState();
    // 高清渲染管线：在固定逻辑坐标系上进行 3x 像素绘制
    ctx.setTransform(RENDER_SCALE, 0, 0, RENDER_SCALE, 0, 0);
    ctx.imageSmoothingEnabled = true;
    if ('imageSmoothingQuality' in ctx) ctx.imageSmoothingQuality = 'medium';

    if (voidFall.phase === 'falling') {
        const fel = performance.now() - voidFall.startTime;
        const totalShake = transition.shake + camera.shakeLand;
        const shX = (Math.random() - 0.5) * totalShake;
        const shY = (Math.random() - 0.5) * totalShake * 0.82;
        drawVoidFallBg0Only();
        drawVoidFallDepthGradient();
        drawVoidFallBgsFromBg1(fel);
        drawVoidLineMeteorsScreen();
        drawVoidFallAmbient(fel);
        if (poemData.show && poemData.alpha > 0.001) {
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.globalAlpha = poemData.alpha; ctx.fillStyle = "#fff";
            const startY = poemData.isFirst ? height * 0.15 : height * 0.30;
            const textX = poemData.isFirst ? width / 2 : width / 2 + width * 0.08;
            poemData.lines.forEach((line, i) => {
                ctx.font = "100 20px 'Microsoft YaHei'";
                ctx.fillText(line, textX, startY + i * 48);
            });
            ctx.globalAlpha = 1.0;
        }
        if (fel >= VOID_EYE_MS) {
            const fade = Math.min(1, (fel - VOID_EYE_MS) / 1500);
            drawGiantVoidEyeScreenCenter(fade, 0, performance.now());
        }
        let squatY = 1;
        if (voidFall.fallState === 'hardLanding') squatY = 0.79;
        else if (voidFall.fallState === 'recoverStand' && voidFall.recoverAt > 0) {
            const rp = Math.min(1, (performance.now() - voidFall.recoverAt) / RECOVER_STAND_MS);
            squatY = 0.79 + 0.21 * (rp * rp * (3 - 2 * rp));
        }
        let fallRot = 0, fallSx = 1, fallSy = 1;
        if (voidFall.fallState === 'freeFall' && fel >= VOID_FALL_POSE_DELAY_MS) {
            const sp = Math.min(1, (fel - VOID_FALL_POSE_DELAY_MS) / 480);
            const vN = Math.min(1, Math.abs(player.vy) / VOID_TERM_VELOCITY);
            fallRot = player.facing * (0.11 + vN * 0.2) * sp;
            fallSx = 1 - (0.06 + vN * 0.05) * sp;
            fallSy = 1 + (0.05 + vN * 0.12) * sp;
        }
        ctx.save();
        ctx.translate(width / 2 + shX, height / 2 + shY);
        ctx.scale(camera.zoom, camera.zoom);
        ctx.translate(-width / 2, -height / 2 - camera.y);
        drawLandingDustWorld();
        drawDownhillDustWorld();
        drawVoidCapeBehindPlayer();
        const pImgsV = getPlayableFrames(player.state);
        if (pImgsV && pImgsV[player.frame] && isImageReady(pImgsV[player.frame])) {
            const curImg = pImgsV[player.frame], px = player.x - camera.x + player.width / 2, py = player.y + player.height / 2;
            const { drawW, drawH } = getPlayerDrawSize(curImg, player.state);
            const footOffset = getPlayerFootOffsetByState(player.state);
            const topY = player.height * 0.5 - drawH + player.height * footOffset;
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(player.rotation + fallRot);
            ctx.scale(player.facing * fallSx, fallSy * squatY);
            ctx.drawImage(curImg, -drawW / 2, topY, drawW, drawH);
            ctx.restore();
        }
        ctx.restore();
        return;
    }

    ctx.fillStyle = SKY_COLOR; ctx.fillRect(0, 0, width, height);
    if (isImageReady(images.bg)) ctx.drawImage(images.bg, 0, 0, width, height);
    drawScene1Clouds();
    drawMidHillSun();
    if (transition.scene2Blend > 0.001 && isImageReady(images.bg1)) {
        ctx.globalAlpha = transition.scene2Blend;
        ctx.drawImage(images.bg1, 0, 0, width, height);
        ctx.globalAlpha = 1.0;
    }
    // 旧版代码风大画面已停用，转场由视频层接管
    if (transition.scene2Blend > 0.01) drawWatercolorBlobs();
    
    if (ambientStorm.length) { ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.28; ctx.beginPath(); ambientStorm.forEach(p => { ctx.moveTo(p.x + p.size, p.y); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); }); ctx.fill(); ctx.globalAlpha = 1.0; }
    drawGiantBird();
    if (transition.scene2Blend > 0.01) drawWhiteBirds();

    if (poemData.show && poemData.alpha > 0.001) {
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.globalAlpha = poemData.alpha; ctx.fillStyle = "#fff";
        const startY = poemData.isFirst ? height * 0.15 : height * 0.30;
        const textX = poemData.isFirst ? width / 2 : width / 2 + width * 0.08;
        poemData.lines.forEach((line, i) => { 
            ctx.font = "100 20px 'Microsoft YaHei'"; 
            ctx.fillText(line, textX, startY + i*48); 
        });
        ctx.globalAlpha = 1.0;
    }

    expansionRings.forEach(r => {
        const cx = (typeof r.x === 'number') ? (r.x - camera.x) : (width / 2);
        const cy = (typeof r.y === 'number') ? (r.y - camera.y) : (height / 2);
        const lw = r.lineW || 1.5;
        ctx.save();
        // 模糊外环（柔光层
        ctx.strokeStyle = `rgba(255,245,248,${Math.max(0, r.alpha * 0.32)})`;
        ctx.lineWidth = lw * (1.9 + (r.glowMul || 1) * 0.15);
        ctx.shadowBlur = 6;
        ctx.shadowColor = `rgba(255,245,248,${Math.min(1, r.alpha * 0.85)})`;
        ctx.beginPath();
        ctx.arc(cx, cy, r.r + 0.6, 0, Math.PI * 2);
        ctx.stroke();

        // 核心细线
        ctx.strokeStyle = `rgba(255,245,248,${r.alpha})`;
        ctx.lineWidth = lw;
        ctx.shadowBlur = 3;
        ctx.shadowColor = `rgba(255,245,248,${Math.min(1, r.alpha * 0.8)})`;
        ctx.beginPath();
        ctx.arc(cx, cy, r.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    });
    holyRings.forEach(r => {
        ctx.beginPath();
        ctx.arc(width / 2, height / 2, r.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,235,240,${r.alpha})`;
        ctx.lineWidth = r.lineW;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(width / 2, height / 2, r.r + 14, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,190,205,${r.alpha * 0.7})`;
        ctx.lineWidth = Math.max(1, r.lineW * 0.45);
        ctx.stroke();
    });

    let eyeCloseP = 0;
    if (voidFall.phase === 'eyeClose') {
        eyeCloseP = Math.min(1, (performance.now() - voidFall.eyeCloseStart) / VOID_EYE_CLOSE_MS);
    }
    if (voidFall.phase === 'eyeFollow' || voidFall.phase === 'eyeClose') {
        drawGiantVoidEyeScreenCenter(1, eyeCloseP, performance.now());
    }

    ctx.save();
    const shakeTotal = transition.shake + camera.shakeLand;
    const shakeX = (Math.random() - 0.5) * shakeTotal;
    const shakeY = (Math.random() - 0.5) * shakeTotal * 0.8;
    ctx.translate(width/2 + shakeX, height/2 + shakeY); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-width/2, -height/2 - camera.y);

    // 两关都保留线条山脉（第二关会�?blend 改变配色
    const mtH11 = height * 0.04, mtH15 = height * 0.12;
    for (let i = 0; i < 10; i++) {
        const speed = i < 6 ? 0.008 + i * 0.01 : 0.08 + (i - 6) * 0.06;
        const baseY = height - groundH - (i < 6 ? mtH15 * (0.04 + i / 5 * 0.62) : mtH11 * (0.03 + (i - 6) / 3 * 0.72));
        if (i === 3 && transition.scene2Blend < 0.01) {
            mtn01Instances.forEach(inst => {
                if (isImageReady(images.mtn01)) {
                    const mh = height * 0.13;
                    ctx.drawImage(images.mtn01, inst.x - camera.x, baseY - mh + 40, mh * (images.mtn01.width / images.mtn01.height), mh);
                }

    drawB3ToPts4ForegroundOccluder();
    // 山洞前景层：在人物层之上，覆盖人物
    drawScene1CaveLayer(true);
    drawRampTurnpointColumnsFront();
    drawFloatingShards(true);

    // �?绘制身后跟随的粒子及其白线拖
    player.followingParticles.forEach((p, i) => {
        const pulse = Date.now() * 0.004 + (p.seed || i);
        const allWhite = player.followingParticles.length >= 4;
        const coreHue = 358 + Math.sin(pulse) * 6; // red range
        // 拖尾
        if(p.trail.length > 2) {
            for (let j = 0; j < p.trail.length - 1; j++) {
                const aPt = p.trail[j];
                const bPt = p.trail[j + 1];
                const tSeg = j / (p.trail.length - 1); // 0:靠近粒子本体, 1:尾端
                const segAlpha = (0.62 - tSeg * 0.5) * (0.8 + 0.2 * Math.sin(pulse * 0.9));
                const segWidth = 1.2 - tSeg * 0.95; // 尾端逐渐变细
                if (segWidth <= 0.08 || segAlpha <= 0.02) continue;
                ctx.beginPath();
                ctx.moveTo(aPt.x - camera.x, aPt.y);
                ctx.lineTo(bPt.x - camera.x, bPt.y);
                ctx.strokeStyle = allWhite
                    ? `rgba(255,255,255,${segAlpha})`
                    : `hsla(${coreHue}, 96%, 68%, ${segAlpha})`;
                ctx.lineWidth = segWidth;
                ctx.shadowBlur = 8 * (1 - tSeg);
                ctx.shadowColor = allWhite
                    ? "rgba(255,255,255,0.9)"
                    : `hsla(${coreHue}, 98%, 56%, 0.9)`;
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }
        // 粒子核心
        const px = p.x - camera.x;
        const py = p.y;
        ctx.fillStyle = allWhite ? "rgba(255,255,255,0.98)" : `hsla(${coreHue}, 98%, 70%, 0.98)`;
        ctx.shadowBlur = 16;
        ctx.shadowColor = allWhite ? "rgba(255,255,255,0.98)" : `hsla(${coreHue}, 98%, 56%, 0.98)`;
        ctx.beginPath(); ctx.arc(px, py, 4.2, 0, Math.PI*2); ctx.fill();
        // 红色能量外环
        ctx.strokeStyle = allWhite ? "rgba(255,255,255,0.62)" : `hsla(${coreHue + 8}, 98%, 66%, 0.62)`;
        ctx.lineWidth = 0.9;
        ctx.beginPath(); ctx.arc(px, py, 6.8 + Math.sin(pulse * 1.6) * 0.9, 0, Math.PI*2); ctx.stroke();
        ctx.shadowBlur = 0;
    });

    vegetation.filter(v => v.isForeground && !isSkyPathForbiddenForProps(v.x)).forEach(drawOrganicBranch);
    drawMountainTrees(mountainTreesNear, 0.82);
    
    // �?前景武器渲染
    weapons.filter(w => w.depth <= 0.3).forEach(drawWeapon);

    if (transition.scene2Blend < 0.01) {
        stones.sort((a,b)=>b.depth-a.depth).forEach(rock => {
            const rx = rock.x-camera.x, ry = getGroundHeight(rock.x, 9999); if(rx<-300||rx>width+300) return;
            const base = Math.round(28 + rock.depth * 92);
            ctx.save();
            ctx.translate(rx, ry);
            ctx.scale(rock.scale, rock.scale);
            ctx.rotate(rock.rotation * 0.12);

            const minY = Math.min(...rock.points.map(p => p.y));
            const maxY = Math.max(...rock.points.map(p => p.y));
            const grad = ctx.createLinearGradient(0, minY - 6, 0, maxY + 10);
            grad.addColorStop(0, `rgb(${Math.min(255, base + 26)},${Math.min(255, base + 22)},${Math.min(255, base + 20)})`);
            grad.addColorStop(0.45, `rgb(${base},${base - 2},${base - 4})`);
            grad.addColorStop(1, `rgb(${Math.max(0, base - 28)},${Math.max(0, base - 32)},${Math.max(0, base - 36)})`);

            ctx.beginPath();
            ctx.moveTo(rock.points[0].x, rock.points[0].y);
            rock.points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();

            // 边缘高光与轮
            ctx.strokeStyle = "rgba(255,255,255,0.34)";
            ctx.lineWidth = 1.0;
            ctx.stroke();

            // 底部接地阴影
            ctx.fillStyle = "rgba(20,14,18,0.22)";
            ctx.beginPath();
            ctx.ellipse(0, 6, 15, 5.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // 切面细节线（低透明
            ctx.strokeStyle = "rgba(110,96,104,0.22)";
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(-10, -2);
            ctx.lineTo(8, -6);
            ctx.lineTo(14, 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-12, 4);
            ctx.lineTo(-2, 0);
            ctx.lineTo(9, 5);
            ctx.stroke();
            ctx.restore();
        });
    }
    // 已按需求移除 lv1_ruins_debris01 绘制
    ctx.restore();
    drawLoreOverlay();
    drawWindDebugHUD();
}

resize();
loadImages();
requestAnimationFrame(updateStartMenuEffects);
</script>
</body>
</html>
